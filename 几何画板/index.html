<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>几何画板</title>
    <style>
        :root {
            --bg: #0d1117;
            --bg-2: #161b22;
            --bg-3: #1f262e;
            --border: #30363d;
            --text: #e6edf3;
            --text-2: #8b949e;
            --primary: #2a5caa;
            --primary-2: #1f4787;
            --accent: #00e5ff;
            --danger: #f85149;
            --warn: #d29922;
            --success: #3fb950;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; overflow: hidden; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            font-size: 13px;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== 布局 ===== */
        #app {
            display: flex;
            height: 100vh;
            padding-top: 44px;
        }

        /* ===== 侧边栏 ===== */
        #sidebar {
            width: 220px;
            background: var(--bg-2);
            border-right: 1px solid var(--border);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 12px 0;
            flex-shrink: 0;
        }
        #sidebar::-webkit-scrollbar { width: 6px; }
        #sidebar::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .group {
            margin-bottom: 14px;
        }
        .group-title {
            font-size: 11px;
            color: var(--text-2);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 4px 12px;
            margin-bottom: 4px;
        }
        .tool {
            display: flex;
            align-items: center;
            gap: 8px;
            width: 100%;
            padding: 6px 12px;
            background: transparent;
            border: none;
            color: var(--text);
            text-align: left;
            cursor: pointer;
            font-size: 13px;
            border-left: 3px solid transparent;
            transition: background 0.1s;
        }
        .tool:hover { background: var(--bg-3); }
        .tool.active {
            background: var(--bg-3);
            border-left-color: var(--accent);
            color: var(--accent);
        }
        .tool .icon {
            width: 22px;
            height: 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
            flex-shrink: 0;
        }
        .tool .shortcut {
            margin-left: auto;
            color: var(--text-2);
            font-size: 11px;
            font-family: monospace;
        }

        .divider {
            height: 1px;
            background: var(--border);
            margin: 8px 12px;
        }

        /* ===== 工具下拉菜单 (多边形 等) ===== */
        .tool-wrapper {
            position: relative;
            display: flex;
            width: 100%;
        }
        .tool-wrapper .tool {
            flex: 1;
            border-left: 3px solid transparent;
        }
        .tool-wrapper.active > .tool {
            background: var(--bg-3);
            border-left-color: var(--accent);
            color: var(--accent);
        }
        .tool-wrapper .dropdown-arrow {
            width: 26px;
            flex-shrink: 0;
            background: transparent;
            border: none;
            color: var(--text-2);
            cursor: pointer;
            font-size: 9px;
            transition: background 0.1s, color 0.1s;
        }
        .tool-wrapper .dropdown-arrow:hover {
            background: var(--bg-3);
            color: var(--text);
        }
        .dropdown-popup {
            position: absolute;
            left: 100%;
            top: 0;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 140px;
            z-index: 200;
            display: none;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        }
        .dropdown-popup.dropdown-popup-fixed {
            position: fixed;
            left: auto;
            top: auto;
        }
        .dropdown-popup.open { display: block; }
        .dropdown-popup .item {
            position: relative;
            display: flex;
            align-items: center;
            padding: 6px 14px;
            cursor: pointer;
            font-size: 13px;
            color: var(--text);
            white-space: nowrap;
            user-select: none;
        }
        .dropdown-popup .item:hover { background: var(--bg-3); }
        .dropdown-popup .item.has-submenu::after {
            content: '▶';
            margin-left: 16px;
            color: var(--text-2);
            font-size: 9px;
        }
        .dropdown-popup .submenu {
            display: none;
            position: absolute;
            left: 100%;
            top: -5px;
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 4px 0;
            min-width: 130px;
            z-index: 201;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.5);
        }
        .dropdown-popup .item.has-submenu:hover > .submenu,
        .dropdown-popup .item.has-submenu.expanded > .submenu { display: block; }

        /* ===== 画布区 ===== */
        #canvas-area {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            min-width: 0;
        }
        #board {
            flex: 1;
            width: 100%;
            height: 100%;
            display: block;
            background: #ffffff;
            cursor: crosshair;
        }
        #board.tool-select { cursor: default; }
        #board.tool-pan { cursor: grab; }
        #board.tool-pan.dragging { cursor: grabbing; }
        #board.tool-text { cursor: text; }
        #board.tool-delete { cursor: not-allowed; }

        /* 画布中的图形样式 */
        .point { fill: #1a1a1a; }
        .point.highlight { fill: #ff6b35; }
        .point.selected { fill: #0066ff; }
        .point-label {
            font-size: 14px;
            font-family: "Times New Roman", serif;
            font-style: italic;
            fill: #1a1a1a;
            pointer-events: none;
        }
        .segment, .ray, .line {
            stroke: #1a1a1a;
            stroke-width: 1.6;
            fill: none;
            stroke-linecap: round;
        }
        .segment.dashed, .ray.dashed, .line.dashed {
            stroke-dasharray: 6 4;
        }
        .polygon {
            stroke: #1a1a1a;
            stroke-width: 1.6;
            fill: rgba(173, 216, 230, 0.18);
        }
        .circle {
            stroke: #1a1a1a;
            stroke-width: 1.6;
            fill: none;
        }
        .angle-arc {
            stroke: #cc5500;
            stroke-width: 1.4;
            fill: none;
        }
        .angle-text {
            font-size: 13px;
            fill: #cc5500;
            pointer-events: none;
            font-family: "Times New Roman", serif;
        }
        .measure-text {
            font-size: 12px;
            fill: #0066ff;
            pointer-events: none;
            font-family: "Times New Roman", serif;
        }
        .text-label {
            font-size: 14px;
            fill: #1a1a1a;
            pointer-events: none;
            font-family: "Times New Roman", serif;
        }
        .text-label.large { font-size: 18px; }

        .grid-line { stroke: #e8eaed; stroke-width: 0.5; }
        .grid-line.major { stroke: #d0d7de; stroke-width: 0.8; }
        .grid-axis { stroke: #5a5a5a; stroke-width: 1; }

        .hit-target {
            fill: transparent;
            stroke: transparent;
            stroke-width: 12;
            pointer-events: stroke;
        }
        .hit-target.fill { fill: transparent; stroke: transparent; }
        .selected-outline {
            fill: none;
            stroke: #0066ff;
            stroke-width: 2;
            stroke-dasharray: 4 3;
            pointer-events: none;
        }

        /* ===== 状态栏 ===== */
        #status-bar {
            height: 32px;
            background: var(--bg-2);
            border-top: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 14px;
            gap: 16px;
            font-size: 12px;
            color: var(--text-2);
            flex-shrink: 0;
        }
        #status-bar .item { display: flex; align-items: center; gap: 6px; }
        #status-bar .item b { color: var(--text); font-weight: 500; }
        #status-bar .prompt { color: var(--accent); font-weight: 500; }
        #status-bar .spacer { flex: 1; }

        /* ===== 浮动参数面板 ===== */
        #param-panel {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 260px;
            max-height: calc(100% - 56px);
            background: rgba(255, 255, 255, 0.97);
            border: 1px solid #d0d7de;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.12);
            z-index: 50;
            font-size: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }
        #param-panel[hidden] { display: none; }
        #param-panel header {
            display: flex;
            align-items: center;
            padding: 8px 12px;
            border-bottom: 1px solid #d0d7de;
            background: rgba(246, 248, 250, 0.9);
            font-weight: 500;
            color: #24292f;
            flex-shrink: 0;
        }
        #param-panel header .title { flex: 1; }
        #param-panel header .close {
            border: none;
            background: transparent;
            color: #57606a;
            font-size: 18px;
            cursor: pointer;
            padding: 0 4px;
            line-height: 1;
            font-weight: 400;
        }
        #param-panel header .close:hover { color: #24292f; }
        #param-body {
            padding: 10px 12px;
            overflow-y: auto;
            flex: 1;
        }
        .param-section {
            font-size: 10px;
            font-weight: 600;
            color: #57606a;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin: 10px 0 6px;
            padding-bottom: 4px;
            border-bottom: 1px solid #eaeef2;
        }
        .param-section:first-child { margin-top: 0; }
        .param-row {
            display: flex;
            justify-content: space-between;
            padding: 3px 0;
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
        }
        .param-row .key { color: #57606a; }
        .param-row .val { color: #24292f; }
        .param-row .val.hl { color: #0969da; font-weight: 500; }
        .param-row .val.editable { padding: 0; }
        .param-input {
            width: 100%;
            padding: 2px 6px;
            border: 1px solid transparent;
            border-radius: 3px;
            background: transparent;
            color: #24292f;
            font-family: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
            font-size: 12px;
            text-align: right;
            outline: none;
            transition: border-color 0.1s, background 0.1s;
        }
        .param-input:hover {
            border-color: #d0d7de;
            background: #fff;
        }
        .param-input:focus {
            border-color: #0969da;
            background: #fff;
            box-shadow: 0 0 0 2px rgba(9, 105, 218, 0.15);
        }
        .param-input.invalid {
            border-color: #cf222e;
            background: #ffebe9;
        }
        .param-hint {
            font-size: 10px;
            color: #57606a;
            margin-top: -2px;
            margin-bottom: 4px;
            padding-left: 4px;
        }
        .param-buttons {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 6px;
            margin-top: 4px;
        }
        .param-buttons button {
            padding: 5px 8px;
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #24292f;
            font-family: inherit;
            transition: background 0.1s;
        }
        .param-buttons button:hover { background: #eaeef2; }
        .param-buttons button.active {
            background: #0969da;
            color: white;
            border-color: #0969da;
        }
        .param-buttons button.active:hover { background: #0550ae; }
        .param-actions {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }
        .param-actions button {
            flex: 1;
            padding: 5px 8px;
            background: #f6f8fa;
            border: 1px solid #d0d7de;
            border-radius: 4px;
            font-size: 12px;
            cursor: pointer;
            color: #24292f;
            font-family: inherit;
        }
        .param-actions button:hover { background: #eaeef2; }
        .param-actions button.danger { color: #cf222e; }
        .param-actions button.danger:hover { background: #ffebe9; }

        /* ===== 模态框 ===== */
        .modal-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .modal-backdrop.open { display: flex; }
        .modal {
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            min-width: 380px;
            max-width: 90vw;
            max-height: 90vh;
            overflow: auto;
        }
        .modal h3 { margin-bottom: 12px; color: var(--text); }
        .modal label { display: block; margin: 10px 0 4px; color: var(--text-2); font-size: 12px; }
        .modal input, .modal textarea {
            width: 100%;
            padding: 8px 10px;
            background: var(--bg);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 4px;
            font: inherit;
            font-family: monospace;
        }
        .modal textarea { min-height: 120px; resize: vertical; }
        .modal .row { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
        .btn {
            padding: 6px 14px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
        }
        .btn:hover { background: var(--primary-2); }
        .btn.secondary { background: var(--bg-3); color: var(--text); }
        .btn.secondary:hover { background: var(--border); }
        .btn.danger { background: var(--danger); }

        /* ===== 浮动提示 ===== */
        #toast {
            position: fixed;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--bg-3);
            color: var(--text);
            border: 1px solid var(--border);
            padding: 10px 18px;
            border-radius: 6px;
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        #toast.show { opacity: 1; }
        #toast.error { border-color: var(--danger); color: var(--danger); }

        /* ===== AI 浮动面板 ===== */
        #ai-panel {
            position: fixed;
            top: 56px;
            right: 12px;
            width: 400px;
            max-width: calc(100vw - 24px);
            height: calc(100vh - 80px);
            background: var(--bg-2);
            border: 1px solid var(--border);
            border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
            display: flex;
            flex-direction: column;
            z-index: 200;
            overflow: hidden;
            font: 13px/1.5 inherit;
        }
        #ai-panel[hidden] { display: none; }
        #ai-panel header {
            display: flex; align-items: center; gap: 8px;
            padding: 10px 14px;
            background: var(--bg-3);
            border-bottom: 1px solid var(--border);
        }
        #ai-panel header .title { font-weight: 600; }
        #ai-panel header .model-name { margin-left: auto; color: var(--text-2); font-size: 12px; cursor: pointer; }
        #ai-panel header .model-name:hover { color: var(--accent); }
        #ai-panel header .close {
            background: none; border: none; color: var(--text-2);
            font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
        }
        #ai-panel header .close:hover { color: var(--danger); }

        #ai-messages {
            flex: 1; overflow-y: auto; padding: 12px 14px;
            display: flex; flex-direction: column; gap: 10px;
        }
        #ai-messages::-webkit-scrollbar { width: 6px; }
        #ai-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        .ai-msg { padding: 8px 12px; border-radius: 8px; max-width: 100%; word-wrap: break-word; }
        .ai-msg.user { background: var(--bg-3); align-self: flex-end; max-width: 85%; }
        .ai-msg.assistant { background: rgba(42,92,170,0.15); border: 1px solid rgba(42,92,170,0.3); }
        .ai-msg.system { background: rgba(210,153,34,0.1); border: 1px solid rgba(210,153,34,0.3); color: var(--text-2); font-size: 12px; }
        .ai-msg .role { font-size: 11px; color: var(--text-2); margin-bottom: 4px; }
        .ai-msg .text { white-space: pre-wrap; line-height: 1.55; }
        .ai-msg .text code { background: var(--bg-3); padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 12px; }
        .ai-msg .tool-list { margin-top: 6px; font-size: 11px; color: var(--text-2); }
        .ai-msg .usage { margin-top: 6px; font-size: 10px; color: var(--text-2); opacity: 0.6; }
        .ai-msg .reasoning { margin-bottom: 8px; font-size: 11px; color: var(--text-2); }
        .ai-msg .reasoning summary { cursor: pointer; user-select: none; }
        .ai-msg .reasoning pre { margin: 6px 0 0; padding: 8px 10px; background: var(--bg-3); border-radius: 4px; white-space: pre-wrap; word-wrap: break-word; max-height: 200px; overflow-y: auto; font-family: inherit; }
        .ai-msg .tool-list span { display: inline-block; background: var(--bg-3); padding: 2px 6px; border-radius: 3px; margin: 2px 2px 0 0; }
        .ai-msg.thinking { background: rgba(0,229,255,0.08); border: 1px solid rgba(0,229,255,0.2); color: var(--text-2); }
        .ai-msg.thinking .dot { display: inline-block; animation: aiDot 1.2s infinite; }
        .ai-msg.thinking .dot:nth-child(2) { animation-delay: 0.4s; }
        .ai-msg.thinking .dot:nth-child(3) { animation-delay: 0.8s; }
        @keyframes aiDot { 0%, 60%, 100% { opacity: 0.2; } 30% { opacity: 1; } }

        #ai-input-area {
            border-top: 1px solid var(--border);
            padding: 10px 14px;
            display: flex; flex-direction: column; gap: 8px;
            background: var(--bg-2);
        }
        #ai-input {
            width: 100%; min-height: 60px; max-height: 120px; resize: vertical;
            background: var(--bg-3); color: var(--text); border: 1px solid var(--border);
            border-radius: 6px; padding: 8px 10px; font: inherit;
        }
        #ai-input:focus { outline: none; border-color: var(--primary); }
        #ai-input:disabled { opacity: 0.5; }
        #ai-controls { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        #ai-controls label { display: flex; align-items: center; gap: 4px; color: var(--text-2); font-size: 12px; cursor: pointer; }
        #ai-controls input[type=checkbox] { cursor: pointer; }
        #ai-send {
            background: var(--primary); color: #fff; border: none; padding: 6px 14px;
            border-radius: 5px; cursor: pointer; font-size: 13px; margin-left: auto;
        }
        #ai-send:hover { background: var(--primary-2); }
        #ai-send:disabled { opacity: 0.5; cursor: not-allowed; }
        #ai-stop {
            background: var(--danger); color: #fff; border: none; padding: 6px 14px;
            border-radius: 5px; cursor: pointer; font-size: 13px; margin-left: auto;
        }
        #ai-stop:hover { background: #d83d3d; }
        #ai-status { color: var(--text-2); font-size: 11px; }

        /* 模型选择模态 */
        #ai-model-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 300;
            display: flex; align-items: center; justify-content: center;
        }
        #ai-model-modal[hidden] { display: none; }
        #ai-model-modal .inner {
            background: var(--bg-2); border: 1px solid var(--border); border-radius: 10px;
            width: 480px; max-width: 90vw; max-height: 70vh; overflow-y: auto; padding: 16px;
        }
        #ai-model-modal h3 { margin: 0 0 12px; font-size: 14px; }
        #ai-model-modal .provider-block { margin-bottom: 14px; }
        #ai-model-modal .provider-name { color: var(--text-2); font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
        #ai-model-modal .model-row {
            display: flex; align-items: center; padding: 6px 10px; border-radius: 5px;
            cursor: pointer; transition: background 0.1s;
        }
        #ai-model-modal .model-row:hover { background: var(--bg-3); }
        #ai-model-modal .model-row.active { background: var(--primary-2); color: #fff; }
        #ai-model-modal .model-row .name { font-weight: 500; }
        #ai-model-modal .model-row .id { color: var(--text-2); font-size: 11px; margin-left: 8px; font-family: monospace; }
        #ai-model-modal .model-row .badge { margin-left: auto; font-size: 10px; padding: 2px 6px; border-radius: 3px; background: var(--bg-3); color: var(--text-2); }
        #ai-model-modal .model-row .badge.pro { background: rgba(42,92,170,0.3); color: var(--accent); }
        #ai-model-modal .model-row .badge.recommended { background: rgba(0,229,255,0.25); color: var(--accent); }
        #ai-model-modal .close-row { text-align: right; margin-top: 8px; }

        /* ===== 浮动帮助 ===== */
        .help-icon {
            display: inline-block;
            width: 14px;
            height: 14px;
            line-height: 14px;
            text-align: center;
            font-size: 10px;
            background: var(--border);
            color: var(--text-2);
            border-radius: 50%;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div id="app">
        <aside id="sidebar"></aside>
        <div id="ai-panel" hidden>
            <header>
                <span class="title">🧠 模型解题</span>
                <span class="model-name" id="ai-model-name" title="点击切换模型">未选择</span>
                <button class="close" id="ai-close" title="关闭">×</button>
            </header>
            <div id="ai-messages"></div>
            <div id="ai-input-area">
                <textarea id="ai-input" placeholder="输入题目, 例如: 在△ABC中, AB=AC, ∠A=40°, 求∠B"></textarea>
                <div id="ai-controls">
                    <label><input type="checkbox" id="ai-include-board" checked> 附加画板</label>
                    <span id="ai-status"></span>
                    <button id="ai-send">发送</button>
                    <button id="ai-stop" hidden>停止</button>
                </div>
            </div>
        </div>
        <div id="ai-model-modal" hidden>
            <div class="inner">

(function() {

    ]},
    { group: '文件', items: [

  // 预设多边形: 2 次点击生成（除特别说明）
  const PREDIFINED_SHAPES = {
    'tri-isoceles':       { name: '等腰三角形',   icon: '△',  p1: '底边中点', p2: '顶点' },
    'tri-equilateral':    { name: '等边三角形',   icon: '△',  p1: '中心',     p2: '一个顶点' },
    'quad-parallelogram': { name: '平行四边形',   icon: '▱',  p1: '一个角',   p2: '相邻角' },
    'quad-rectangle':     { name: '矩形',         icon: '▭',  p1: '一个角',   p2: '对角' },
    'quad-rhombus':       { name: '菱形',         icon: '◇',  p1: '一个角',   p2: '相邻角' },
    'quad-square':        { name: '正方形',       icon: '□',  p1: '一个角',   p2: '对角' },
  };
  function shapePrompt(id) {
    const s = PREDIFINED_SHAPES[id];
    return s ? `请依次选择 2 个点: ${s.p1}, ${s.p2}` : '';
  }

  const CONSTRUCTION_DEFS = {
    'midpoint':         { n: 2, types: ['p', 'p'] },
    'bisect':           { n: 3, types: ['p', 'p', 'p'] },
    'perpendicular':    { n: 2, types: ['line-like', 'p'] },
    'parallel':         { n: 2, types: ['line-like', 'p'] },
    'perpbisect':       { n: 2, types: ['p', 'p'] },
    'intersection':     { n: 2, types: ['line-or-circle', 'line-or-circle'] },
    'divide':           { n: 2, types: ['p', 'p'] },
    'measure-length':   { n: 2, types: ['p', 'p'] },
    'measure-angle':    { n: 3, types: ['p', 'p', 'p'] },
  };

  // ==================== 几何工具 ====================
  const G = {
    add: (a, b) => ({ x: a.x + b.x, y: a.y + b.y }),
    sub: (a, b) => ({ x: a.x - b.x, y: a.y - b.y }),
    mul: (a, s) => ({ x: a.x * s, y: a.y * s }),
    dot: (a, b) => a.x * b.x + a.y * b.y,
    cross: (a, b) => a.x * b.y - a.y * b.x,
    len: (a) => Math.hypot(a.x, a.y),
    dist: (a, b) => Math.hypot(a.x - b.x, a.y - b.y),
    norm: (a) => { const l = Math.hypot(a.x, a.y); return l === 0 ? {x:0,y:0} : { x: a.x/l, y: a.y/l }; },
    perp: (a) => ({ x: -a.y, y: a.x }),
    midpoint: (a, b) => ({ x: (a.x + b.x)/2, y: (a.y + b.y)/2 }),
    closestOnSegment: (p, a, b) => {
      const ab = G.sub(b, a);
      const len2 = G.dot(ab, ab);
      if (len2 === 0) return a;
      const t = Math.max(0, Math.min(1, G.dot(G.sub(p, a), ab) / len2));
      return G.add(a, G.mul(ab, t));
    },
    closestOnLine: (p, a, b) => {
      const ab = G.sub(b, a);
      const len2 = G.dot(ab, ab);
      if (len2 === 0) return a;
      return G.add(a, G.mul(ab, G.dot(G.sub(p, a), ab) / len2));
    },
    angleAt: (v, p1, p2) => {
      const u1 = G.sub(p1, v), u2 = G.sub(p2, v);
      const c = G.dot(u1, u2) / (G.len(u1) * G.len(u2));
      return Math.acos(Math.max(-1, Math.min(1, c)));
    },
    lineLineIntersect: (a, b, c, d) => {
      const d1 = G.sub(b, a), d2 = G.sub(d, c);
      const det = G.cross(d1, d2);
      if (Math.abs(det) < 1e-9) return null;
      const t = G.cross(G.sub(c, a), d2) / det;
      return G.add(a, G.mul(d1, t));
    },
    lineCircleIntersect: (a, b, O, r) => {
      const d = G.sub(b, a);
      const f = G.sub(a, O);
      const A = G.dot(d, d);
      const B = 2 * G.dot(f, d);
      const C = G.dot(f, f) - r * r;
      const disc = B * B - 4 * A * C;
      if (disc < 0) return [];
      const sq = Math.sqrt(Math.max(0, disc));
      const t1 = (-B - sq) / (2 * A);
      const t2 = (-B + sq) / (2 * A);
      return [G.add(a, G.mul(d, t1)), G.add(a, G.mul(d, t2))];
    },
    circleCircleIntersect: (O1, r1, O2, r2) => {
      const d = G.dist(O1, O2);
      if (d < 1e-9 || d > r1 + r2 + 1e-9 || d < Math.abs(r1 - r2) - 1e-9) return [];
      const a = (r1 * r1 - r2 * r2 + d * d) / (2 * d);
      const h2 = Math.max(0, r1 * r1 - a * a);
      const h = Math.sqrt(h2);
      const dir = G.norm(G.sub(O2, O1));
      const P = G.add(O1, G.mul(dir, a));
      const perp = G.perp(dir);
      return [G.add(P, G.mul(perp, h)), G.sub(P, G.mul(perp, h))];
    },
    triangleArea: (A, B, C) => Math.abs(G.cross(G.sub(B, A), G.sub(C, A))) / 2,
    circumcenter: (A, B, C) => {
      const a2 = G.dot(A, A), b2 = G.dot(B, B), c2 = G.dot(C, C);
      const D = 2 * (A.x * (B.y - C.y) + B.x * (C.y - A.y) + C.x * (A.y - B.y));
      if (Math.abs(D) < 1e-9) return null;
      return {
        x: (a2 * (B.y - C.y) + b2 * (C.y - A.y) + c2 * (A.y - B.y)) / D,
        y: (a2 * (C.x - B.x) + b2 * (A.x - C.x) + c2 * (B.x - A.x)) / D,
      };
    },
    incenter: (A, B, C) => {
      const a = G.dist(B, C), b = G.dist(A, C), c = G.dist(A, B);
      const s = a + b + c;
      if (s < 1e-9) return null;
      return { x: (a * A.x + b * B.x + c * C.x) / s, y: (a * A.y + b * B.y + c * C.y) / s };
    },
    centroid: (A, B, C) => ({ x: (A.x + B.x + C.x) / 3, y: (A.y + B.y + C.y) / 3 }),
    orthocenter: (A, B, C) => {
      const O = G.circumcenter(A, B, C);
      if (!O) return null;
      return { x: A.x + B.x + C.x - 2 * O.x, y: A.y + B.y + C.y - 2 * O.y };
    },
    bisectorDir: (v, p1, p2) => G.norm(G.add(G.norm(G.sub(p1, v)), G.norm(G.sub(p2, v)))),
    polygonArea: (pts) => {
      let a = 0;
      for (let i = 0; i < pts.length; i++) {
        const j = (i + 1) % pts.length;
        a += pts[i].x * pts[j].y - pts[j].x * pts[i].y;
      }
      return Math.abs(a) / 2;
    },
    polygonPerimeter: (pts) => {
      let p = 0;
      for (let i = 0; i < pts.length; i++) {
        const j = (i + 1) % pts.length;
        p += G.dist(pts[i], pts[j]);
      }
      return p;
    },
  };

  // ==================== ID / 标签 / 工具 ====================
  function newId() { return state.nextId++; }
  function nextLabel() {
    if (state.nextLabelIdx < 26) return String.fromCharCode(65 + state.nextLabelIdx++);
    return 'P' + (state.nextLabelIdx++ - 25);
  }
  function findEl(id) { return state.elements.find(e => e.id === id); }
  function findPoint(id) { const e = findEl(id); return e && e.t === 'p' ? e : null; }
  function pointAt(id) { const p = findPoint(id); return p ? { x: p.x, y: p.y } : null; }
  function isLineLike(el) { return el && (el.t === 'l' || el.t === 'r' || el.t === 's' || el.t === 'g'); }
  function isCircleLike(el) { return el && (el.t === 'c' || el.t === 'g'); }
  function isLineOrCircle(el) { return el && (el.t === 'l' || el.t === 'r' || el.t === 's' || el.t === 'c' || el.t === 'g'); }
  function typeMatches(el, type) {
    if (type === 'p') return el.t === 'p';
    if (type === 'line-like') return isLineLike(el);
    if (type === 'line-or-circle') return isLineOrCircle(el);
    return false;
  }

  // ==================== 序列化 / 历史 ====================
  function serialize() {
    return {
      v: 1,
      view: { ...state.view },
      nextId: state.nextId,
      nextLabelIdx: state.nextLabelIdx,
      elements: state.elements.map(e => {
        const o = { id: e.id, t: e.t };
        for (const k in e) if (k !== 'id' && k !== 't') o[k] = e[k];
        return o;
      }),
    };
  }

  // 紧凑格式: [version, meta, points, elements]
  //   version: 1
  //   meta: [nextLabelIdx, viewX, viewY, viewScale]
  //   points: [[x, y, label?], ...]  label 可省略
  //   elements: 每项 [type, ...args, flags?]
  //     s/r/l: [type, pi, pj]
  //     c:     [type, centerPi, radiusPi]
  //     g:     [type, p0, p1, p2, ...]
  //     a:     [type, vertexPi, p1Pi, p2Pi, text?]
  //     x:     [type, x, y, text, anchorPi?]
  //     m:     [type, p1Pi, p2Pi, text?]
  //   flags: 'D' 派生 / 'd' 虚线(可组合,如 'Dd')
  function serializeCompact() {
    const pointIdx = new Map();
    const points = [];
    for (const el of state.elements) {
      if (el.t === 'p' && !pointIdx.has(el.id)) {
        pointIdx.set(el.id, points.length);
        points.push(el.label ? [el.x, el.y, el.label] : [el.x, el.y]);
      }
    }
    const elements = [];
    for (const el of state.elements) {
      if (el.t === 'p') continue;
      const flags = (el.derived ? 'D' : '') + (el.dashed ? 'd' : '');
      let t;
      if (el.t === 's' || el.t === 'r' || el.t === 'l') {
        t = [el.t, pointIdx.get(el.a), pointIdx.get(el.b)];
      } else if (el.t === 'c') {
        t = [el.t, pointIdx.get(el.center), pointIdx.get(el.radius)];
      } else if (el.t === 'g') {
        // 约束多边形用 'G' + 子类型字母 (e.g., 'Gi' = iso-tri, 'Gs' = square)
        const cCode = { 'iso-tri': 'i', 'equilateral': 'e', 'parallelogram': 'p', 'rectangle': 'r', 'rhombus': 'h', 'square': 's' };
        const tag = el.constraint && cCode[el.constraint] ? 'G' + cCode[el.constraint] : 'g';
        t = [tag, ...el.points.map(id => pointIdx.get(id))];
      } else if (el.t === 'a') {
        t = [el.t, pointIdx.get(el.vertex), pointIdx.get(el.p1), pointIdx.get(el.p2)];
        if (el.text) t.push(el.text);
      } else if (el.t === 'x') {
        t = [el.t, el.x, el.y, el.text];
        if (el.anchor) t.push(pointIdx.get(el.anchor));
      } else if (el.t === 'm') {
        t = [el.t, pointIdx.get(el.a), pointIdx.get(el.b)];
        if (el.text) t.push(el.text);
      }
      if (flags) t.push(flags);
      elements.push(t);
    }
    return [1, [state.nextLabelIdx, state.view.x, state.view.y, state.view.scale], points, elements];
  }

  function deserializeCompact(data) {
    if (!Array.isArray(data) || data.length !== 4 || data[0] !== 1) return null;
    const [, meta, points, elements] = data;
    if (!Array.isArray(meta) || meta.length < 4) return null;
    if (!Array.isArray(points) || !Array.isArray(elements)) return null;
    const [nextLabelIdx, vx, vy, vs] = meta;
    const ids = [];
    const out = [];
    let nextId = 1;
    for (const p of points) {
      if (!Array.isArray(p) || p.length < 2) continue;
      const x = +p[0], y = +p[1];
      if (!isFinite(x) || !isFinite(y)) continue;
      const id = nextId++;
      ids.push(id);
      const el = { id, t: 'p', x, y };
      if (p[2] != null) el.label = String(p[2]);
      out.push(el);
    }
    for (const e of elements) {
      if (!Array.isArray(e) || e.length < 1) continue;
      const t = e[0];
      let rest = e.slice(1);
      let flags = '';
      if (rest.length > 0 && typeof rest[rest.length - 1] === 'string') {
        flags = rest.pop();
      }
      const id = nextId++;
      const el = { id, t };
      if (flags.includes('D')) el.derived = true;
      if (flags.includes('d')) el.dashed = true;
      if (t === 's' || t === 'r' || t === 'l') {
        if (rest.length < 2 || !ids[rest[0]] || !ids[rest[1]]) continue;
        el.a = ids[rest[0]]; el.b = ids[rest[1]];
      } else if (t === 'c') {
        if (rest.length < 2 || !ids[rest[0]] || !ids[rest[1]]) continue;
        el.center = ids[rest[0]]; el.radius = ids[rest[1]];
      } else if (t === 'g' || t.startsWith('G')) {
        const pts = rest.map(i => ids[i]).filter(Boolean);
        if (pts.length < 3) continue;
        el.points = pts;
        el.t = 'g';
        if (t.length === 2) {
          const cDecode = { i: 'iso-tri', e: 'equilateral', p: 'parallelogram', r: 'rectangle', h: 'rhombus', s: 'square' };
          el.constraint = cDecode[t[1]] || null;
        }
      } else if (t === 'a') {
        if (rest.length < 3) continue;
        el.vertex = ids[rest[0]]; el.p1 = ids[rest[1]]; el.p2 = ids[rest[2]];
        if (rest[3] != null) el.text = String(rest[3]);
      } else if (t === 'x') {
        if (rest.length < 3) continue;
        el.x = +rest[0]; el.y = +rest[1]; el.text = String(rest[2]);
        if (rest[3] != null && ids[rest[3]]) el.anchor = ids[rest[3]];
      } else if (t === 'm') {
        if (rest.length < 2) continue;
        el.a = ids[rest[0]]; el.b = ids[rest[1]];
        if (rest[2] != null) el.text = String(rest[2]);
      } else {
        continue;
      }
      out.push(el);
    }
    return {
      v: 1,
      view: { x: +vx || 0, y: +vy || 0, scale: +vs || VIEW_DEFAULT_SCALE },
      nextId,
      nextLabelIdx: +nextLabelIdx || 0,
      elements: out,
    };
  }

  // 尝试解析:老格式(对象) 或 紧凑格式(数组)
  function tryLoadData(input) {
    if (input && Array.isArray(input.elements)) return input;  // 老格式
    if (Array.isArray(input) && input.length === 4) {          // 紧凑格式
      return deserializeCompact(input);
    }
    return null;
  }
  function loadFrom(data) {
    if (!data || !data.elements) return;
    // 保留选择: 若 id 仍存在于新 state, 重新加入 selection
    const prevSelection = [...state.selection];
    state.elements = data.elements.map(e => ({ id: e.id, t: e.t, ...e }));
    state.nextId = data.nextId || (Math.max(0, ...data.elements.map(e => e.id)) + 1);
    state.nextLabelIdx = data.nextLabelIdx || 0;
    state.view = data.view || { x: 0, y: 0, scale: VIEW_DEFAULT_SCALE };
    state.selection.clear();
    for (const id of prevSelection) {
      if (state.elements.find(e => e.id === id)) state.selection.add(id);
    }
    state.pendingVertex = null;
    state.pendingCircleCenter = null;
    state.pendingPoly = [];
    state.toolStep = 0;
    state.toolPicked = [];
    state.shapeDrag = null;
    state.hoverPoint = null;
    render();
  }
  function pushHistory() {
    state.history.push(serialize());
    if (state.history.length > 100) state.history.shift();
    state.redoStack.length = 0;
  }
  function undo() {
    if (state.history.length === 0) { toast('已是最早'); return; }
    state.redoStack.push(serialize());
    loadFrom(state.history.pop());
    toast('撤销');
  }
  function redo() {
    if (state.redoStack.length === 0) { toast('已是最晚'); return; }
    state.history.push(serialize());
    loadFrom(state.redoStack.pop());
    toast('重做');
  }

  // ==================== 元素创建 / 删除 ====================
  function addEl(el) { state.elements.push(el); return el; }
  function createPoint(x, y, label) { return addEl({ id: newId(), t: 'p', x, y, label: label || nextLabel() }); }
  function findOrCreatePointAt(x, y) {
    for (const e of state.elements) {
      if (e.t === 'p' && Math.abs(e.x - x) < 0.5 && Math.abs(e.y - y) < 0.5) return e;
    }
    return createPoint(x, y);
  }
  function deleteEl(id) {
    state.elements = state.elements.filter(e => e.id !== id);
    // 清除引用
    state.elements.forEach(e => {
      if (e.t === 's' || e.t === 'r' || e.t === 'l') {
        if (e.a === id) e.a = null; if (e.b === id) e.b = null;
      } else if (e.t === 'c') {
        if (e.center === id) e.center = null; if (e.radius === id) e.radius = null;
      } else if (e.t === 'g') e.points = e.points.filter(p => p !== id);
      else if (e.t === 'a') {
        if (e.vertex === id) e.vertex = null;
        if (e.p1 === id) e.p1 = null;
        if (e.p2 === id) e.p2 = null;
      } else if (e.t === 'm') {
        if (e.a === id) e.a = null; if (e.b === id) e.b = null;
      } else if (e.t === 'x' && e.anchor === id) e.anchor = null;
    });
    // 清理孤儿元素
    state.elements = state.elements.filter(e => {
      if (e.t === 'p') return true;
      if (e.t === 's' || e.t === 'r' || e.t === 'l') return e.a && e.b;
      if (e.t === 'c') return e.center && e.radius;
      if (e.t === 'g') return e.points.length >= 3;
      if (e.t === 'a') return e.vertex && e.p1 && e.p2;
      if (e.t === 'm') return e.a && e.b;
      if (e.t === 'x') return !e.anchor || e.anchor;
      return true;
    });
    // 清理无引用的点
    cleanupPoints();
    state.selection.delete(id);
  }
  function cleanupPoints() {
    const used = new Set();
    state.elements.forEach(e => {
      if (e.t === 'p') return;
      if (e.t === 's' || e.t === 'r' || e.t === 'l') { used.add(e.a); used.add(e.b); }
      else if (e.t === 'c') { used.add(e.center); used.add(e.radius); }
      else if (e.t === 'g') e.points.forEach(p => used.add(p));
      else if (e.t === 'a') { used.add(e.vertex); used.add(e.p1); used.add(e.p2); }
      else if (e.t === 'm') { used.add(e.a); used.add(e.b); }
      else if (e.t === 'x' && e.anchor) used.add(e.anchor);
    });
    state.elements = state.elements.filter(e => {
      if (e.t !== 'p') return true;
      return used.has(e.id);
    });
  }

  // ==================== 坐标转换 ====================
  const svg = document.getElementById('board');
  function getRect() { return svg.getBoundingClientRect(); }
  function screenToWorld(sx, sy) {
    const r = getRect();
    const cx = r.width / 2, cy = r.height / 2;
    return { x: (sx - cx) / state.view.scale + state.view.x, y: (sy - cy) / state.view.scale + state.view.y };
  }
  function worldToScreen(p) {
    const r = getRect();
    const cx = r.width / 2, cy = r.height / 2;
    return { x: (p.x - state.view.x) * state.view.scale + cx, y: (p.y - state.view.y) * state.view.scale + cy };
  }

  // ==================== 侧边栏 ====================
  const sidebar = document.getElementById('sidebar');
  function closeAllDropdowns() {
    document.querySelectorAll('.dropdown-popup.open').forEach(p => p.classList.remove('open'));
  }

  function renderSidebar() {
    sidebar.innerHTML = '';
    TOOLS.forEach(group => {
      const g = document.createElement('div');
      g.className = 'group';
      const title = document.createElement('div');
      title.className = 'group-title';
      title.textContent = group.name;
      g.appendChild(title);
      group.items.forEach(item => {
        if (item.dropdown) {
          g.appendChild(buildDropdownButton(item));
        } else {
          const btn = document.createElement('button');
          btn.className = 'tool';
          btn.dataset.tool = item.id;
          btn.innerHTML = `<span class="icon">${item.icon}</span><span>${item.name}</span>` +
            (item.shortcut ? `<span class="shortcut">${item.shortcut}</span>` : '');
          btn.addEventListener('click', () => activateTool(item.id));
          g.appendChild(btn);
        }
      });
      sidebar.appendChild(g);
    });
  }

  function buildDropdownButton(item) {
    const wrap = document.createElement('div');
    wrap.className = 'tool-wrapper';
    wrap.dataset.tool = item.id;
    const main = document.createElement('button');
    main.className = 'tool';
    main.innerHTML = `<span class="icon">${item.icon}</span><span>${item.name}</span>`;
    main.addEventListener('click', () => { closeAllDropdowns(); activateTool(item.id); });
    const arrow = document.createElement('button');
    arrow.className = 'dropdown-arrow';
    arrow.innerHTML = '▼';
    arrow.addEventListener('click', e => {
      e.stopPropagation();
      const popup = wrap.querySelector('.dropdown-popup');
      const wasOpen = popup.classList.contains('open');
      closeAllDropdowns();
      if (!wasOpen) {
        const r = wrap.getBoundingClientRect();
        popup.style.left = (r.right + 4) + 'px';
        popup.style.top = r.top + 'px';
        popup.classList.add('open');
      }
    });
    const popup = document.createElement('div');
    popup.className = 'dropdown-popup dropdown-popup-fixed';
    popup.innerHTML = `
      <div class="item" data-action="polygon">任意多边形</div>
      <div class="item has-submenu" data-action="toggle-tri">
        <span>三角形</span>
        <div class="submenu">
          <div class="item" data-action="tri-isoceles">等腰三角形</div>
          <div class="item" data-action="tri-equilateral">等边三角形</div>
        </div>
      </div>
      <div class="item has-submenu" data-action="toggle-quad">
        <span>四边形</span>
        <div class="submenu">
          <div class="item" data-action="quad-parallelogram">平行四边形</div>
          <div class="item" data-action="quad-rectangle">矩形</div>
          <div class="item" data-action="quad-rhombus">菱形</div>
          <div class="item" data-action="quad-square">正方形</div>
        </div>
      </div>
    `;
    popup.querySelectorAll('.item').forEach(it => {
      it.addEventListener('click', e => {
        e.stopPropagation();
        const action = it.dataset.action;
        if (action === 'toggle-tri' || action === 'toggle-quad') {
          it.classList.toggle('expanded');
        } else {
          closeAllDropdowns();
          activateTool(action);
        }
      });
    });
    wrap.appendChild(main);
    wrap.appendChild(arrow);
    wrap.appendChild(popup);
    return wrap;
  }

  function toolDef(id) { return TOOLS.flatMap(g => g.items).find(i => i.id === id); }
  function activateTool(id) {
    if (id === 'export-png') return exportPng();
    if (id === 'export-json') return exportJson();
    if (id === 'share-link') return shareLink();
    if (id === 'import-json') return openImportModal();
    if (id === 'clear') return clearAll();
    if (id === 'toggle-grid') return toggleGrid();
    if (id === 'reset-view') return resetView();
    if (id === 'ai-solver') return aiTogglePanel();

    state.currentTool = id;
    state.pendingVertex = null;
    state.pendingCircleCenter = null;
    state.pendingPoly = [];
    state.toolStep = 0;
    state.toolPicked = [];
    state.shapeDrag = null;
    state.hoverPoint = null;
    state.selection.clear();
    clearPreview();

    document.querySelectorAll('.tool-wrapper, .tool').forEach(b => {
      b.classList.toggle('active', b.dataset.tool === id);
    });

    svg.classList.remove('tool-select', 'tool-pan', 'tool-text', 'tool-delete');
    if (id === 'select') svg.classList.add('tool-select');
    else if (id === 'pan') svg.classList.add('tool-pan');
    else if (id === 'text') svg.classList.add('tool-text');
    else if (id === 'delete') svg.classList.add('tool-delete');

    let def = toolDef(id);
    let name = def ? def.name : (PREDIFINED_SHAPES[id] ? PREDIFINED_SHAPES[id].name : id);
    let prompt = '';
    if (CONSTRUCTION_DEFS[id]) {
      state.toolPicked = [];
      state.toolStep = 0;
      prompt = def.prompt || '';
    } else if (PREDIFINED_SHAPES[id]) {
      prompt = shapePrompt(id);
    } else if (def) {
      prompt = def.prompt || '';
    }
    document.getElementById('status-tool').textContent = name;
    document.getElementById('status-prompt').textContent = prompt;
    closeAllDropdowns();
  }

  // ==================== 渲染 ====================
  function svgEl(name, attrs) {
    const el = document.createElementNS(SVG_NS, name);
    if (attrs) for (const k in attrs) el.setAttribute(k, attrs[k]);
    return el;
  }
  function clearChildren(n) { while (n.firstChild) n.removeChild(n.firstChild); }

  function render() {
    const rect = getRect();
    svg.setAttribute('viewBox', `0 0 ${rect.width} ${rect.height}`);
    svg.setAttribute('width', rect.width);
    svg.setAttribute('height', rect.height);
    clearChildren(svg);
    svg.appendChild(svgEl('rect', { x: 0, y: 0, width: '100%', height: '100%', fill: '#ffffff' }));
    if (state.showGrid) renderGrid();  // (renderGrid appends <g id="grid"> to svg)
    state.elements.forEach(renderElement);
    state.selection.forEach(id => { const e = findEl(id); if (e) renderSelectionOutline(e); });
    renderPreviews();
    document.getElementById('status-count').textContent = state.elements.length;
    renderParamPanel();
  }

  function renderGrid() {
    const rect = getRect();
    const tl = screenToWorld(0, 0);
    const br = screenToWorld(rect.width, rect.height);
    const g = svgEl('g', { id: 'grid' });
    const step = 1, major = 5;
    const startX = Math.floor(tl.x / step) * step;
    const endX = Math.ceil(br.x / step) * step;
    const startY = Math.floor(tl.y / step) * step;
    const endY = Math.ceil(br.y / step) * step;
    for (let x = startX; x <= endX; x += step) {
      const sx = worldToScreen({ x, y: 0 }).x;
      const isMajor = Math.abs(x % major) < 1e-6;
      g.appendChild(svgEl('line', { x1: sx, y1: 0, x2: sx, y2: rect.height,
        class: isMajor ? 'grid-line major' : 'grid-line' }));
    }
    for (let y = startY; y <= endY; y += step) {
      const sy = worldToScreen({ x: 0, y }).y;
      const isMajor = Math.abs(y % major) < 1e-6;
      g.appendChild(svgEl('line', { x1: 0, y1: sy, x2: rect.width, y2: sy,
        class: isMajor ? 'grid-line major' : 'grid-line' }));
    }
    const o = worldToScreen({ x: 0, y: 0 });
    g.appendChild(svgEl('line', { x1: o.x, y1: 0, x2: o.x, y2: rect.height, class: 'grid-axis' }));
    g.appendChild(svgEl('line', { x1: 0, y1: o.y, x2: rect.width, y2: o.y, class: 'grid-axis' }));
    svg.appendChild(g);
  }

  function renderElement(el) {
    if (el.t === 'p') renderPoint(el);
    else if (el.t === 's') renderSegment(el);
    else if (el.t === 'r') renderRay(el);
    else if (el.t === 'l') renderLine(el);
    else if (el.t === 'g') renderPolygon(el);
    else if (el.t === 'c') renderCircle(el);
    else if (el.t === 'a') renderAngle(el);
    else if (el.t === 'x') renderText(el);
    else if (el.t === 'm') renderMeasure(el);
  }

  function isPointSnapped(id) {
    // 在 segment/ray/line 工具下, 选中的端点也要高亮
    if (state.currentTool === 'segment' || state.currentTool === 'ray' || state.currentTool === 'line') {
      if (state.pendingVertex === id) return true;
    }
    return false;
  }

  function renderPoint(p) {
    const s = worldToScreen(p);
    const highlight = state.toolPicked.some(x => x.id === p.id)
      || state.hoverPoint === p.id
      || isPointSnapped(p.id);
    const selected = state.selection.has(p.id);
    const cls = 'point' + (highlight ? ' highlight' : '') + (selected ? ' selected' : '');
    svg.appendChild(svgEl('circle', { cx: s.x, cy: s.y, r: 4, class: cls, 'data-id': p.id }));
    if (p.label) {
      const t = svgEl('text', { x: s.x + 8, y: s.y - 7, class: 'point-label', 'data-id': p.id });
      t.textContent = p.label;
      svg.appendChild(t);
    }
  }

  function lineTwoPts(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    return (a && b) ? { a, b } : null;
  }

  function renderSegment(el) {
    const p = lineTwoPts(el); if (!p) return;
    const a = worldToScreen(p.a), b = worldToScreen(p.b);
    const cls = 'segment' + (el.dashed ? ' dashed' : '');
    const l = svgEl('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, class: cls, 'data-id': el.id });
    if (el.derived) l.style.opacity = '0.55';
    svg.appendChild(l);
  }

  function renderRay(el) {
    const p = lineTwoPts(el); if (!p) return;
    const a = worldToScreen(p.a);
    const FAR = 5000;
    const far = worldToScreen({ x: p.a.x + (p.b.x - p.a.x) / G.dist(p.a, p.b) * FAR, y: p.a.y + (p.b.y - p.a.y) / G.dist(p.a, p.b) * FAR });
    const cls = 'ray' + (el.dashed ? ' dashed' : '');
    const l = svgEl('line', { x1: a.x, y1: a.y, x2: far.x, y2: far.y, class: cls, 'data-id': el.id });
    if (el.derived) l.style.opacity = '0.55';
    svg.appendChild(l);
  }

  function renderLine(el) {
    const p = lineTwoPts(el); if (!p) return;
    const FAR = 5000;
    const d = G.norm(G.sub(p.b, p.a));
    const fa = worldToScreen({ x: p.a.x - d.x * FAR, y: p.a.y - d.y * FAR });
    const fb = worldToScreen({ x: p.a.x + d.x * FAR, y: p.a.y + d.y * FAR });
    const cls = 'line' + (el.dashed ? ' dashed' : '');
    const l = svgEl('line', { x1: fa.x, y1: fa.y, x2: fb.x, y2: fb.y, class: cls, 'data-id': el.id });
    if (el.derived) l.style.opacity = '0.55';
    svg.appendChild(l);
  }

  function renderPolygon(el) {
    const pts = el.points.map(id => pointAt(id)).filter(Boolean);
    if (pts.length < 2) return;
    const sp = pts.map(worldToScreen);
    const dStr = 'M ' + sp.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ') + ' Z';
    svg.appendChild(svgEl('path', { d: dStr, class: 'polygon', 'data-id': el.id }));
  }

  function renderCircle(el) {
    const c = pointAt(el.center), r = pointAt(el.radius);
    if (!c || !r) return;
    const cs = worldToScreen(c);
    const radius = G.dist(c, r) * state.view.scale;
    const cls = 'circle' + (el.dashed ? ' dashed' : '');
    const l = svgEl('circle', { cx: cs.x, cy: cs.y, r: radius, class: cls, 'data-id': el.id });
    if (el.derived) l.style.opacity = '0.55';
    svg.appendChild(l);
  }

  function renderAngle(el) {
    const v = pointAt(el.vertex), p1 = pointAt(el.p1), p2 = pointAt(el.p2);
    if (!v || !p1 || !p2) return;
    const sV = worldToScreen(v);
    const sP1 = worldToScreen(p1);
    const sP2 = worldToScreen(p2);
    // 画两边 (从顶点到 p1, p2), 短臂
    const drawArm = (from, to) => {
      const dx = to.x - from.x, dy = to.y - from.y;
      const len = Math.hypot(dx, dy);
      if (len < 1e-6) return;
      const t = Math.min(40, len) / len;
      svg.appendChild(svgEl('line', {
        x1: from.x, y1: from.y,
        x2: from.x + dx * t, y2: from.y + dy * t,
        class: 'angle-arm', 'stroke-dasharray': '4 3', opacity: '0.7',
      }));
    };
    drawArm(sV, sP1);
    drawArm(sV, sP2);
    const arcR = 30;
    const a1 = Math.atan2(sP1.y - sV.y, sP1.x - sV.x);
    const a2 = Math.atan2(sP2.y - sV.y, sP2.x - sV.x);
    // 调整到 [-pi, pi] 范围
    let da = a2 - a1;
    while (da < -Math.PI) da += 2 * Math.PI;
    while (da > Math.PI) da -= 2 * Math.PI;
    let startA = a1, endA = a2;
    const angDiff = Math.abs(da);
    let largeArc = 0, sweep;
    if (da < 0) { startA = a2; endA = a1; }
    // 短弧(≤180°)走屏幕顺时针 (sweep=1), 长弧(>180°)走逆时针 (sweep=0)
    if (angDiff > Math.PI) { largeArc = 1; sweep = 0; }
    else { sweep = 1; }
    const sx = sV.x + Math.cos(startA) * arcR;
    const sy = sV.y + Math.sin(startA) * arcR;
    const ex = sV.x + Math.cos(endA) * arcR;
    const ey = sV.y + Math.sin(endA) * arcR;
    svg.appendChild(svgEl('path', {
      d: `M ${sx} ${sy} A ${arcR} ${arcR} 0 ${largeArc} ${sweep} ${ex} ${ey}`,
      class: 'angle-arc', fill: 'none',
    }));
    const deg = G.angleAt(v, p1, p2) * 180 / Math.PI;
    const label = el.text || (deg.toFixed(1) + '°');
    if (label) {
      const midA = (startA + endA) / 2;
      const tx = sV.x + Math.cos(midA) * (arcR + 18);
      const ty = sV.y + Math.sin(midA) * (arcR + 18);
      const t = svgEl('text', { x: tx, y: ty, class: 'angle-text', 'text-anchor': 'middle', 'data-id': el.id, style: 'cursor: pointer' });
      t.textContent = label;
      svg.appendChild(t);
    }
  }

  function renderText(el) {
    let pos;
    if (el.anchor) {
      const p = findPoint(el.anchor);
      pos = p ? worldToScreen(p) : worldToScreen({ x: el.x, y: el.y });
    } else {
      pos = worldToScreen({ x: el.x, y: el.y });
    }
    const t = svgEl('text', { x: pos.x + 6, y: pos.y - 6, class: 'text-label' });
    t.textContent = el.text;
    svg.appendChild(t);
  }

  function renderMeasure(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    if (!a || !b) return;
    const mid = G.midpoint(a, b);
    const d = G.norm(G.sub(b, a));
    const off = G.perp(d);
    const labelPos = G.add(mid, G.mul(off, 12 / state.view.scale));
    const ls = worldToScreen(labelPos);
    const t = svgEl('text', { x: ls.x, y: ls.y - 4, class: 'measure-text', 'text-anchor': 'middle', 'data-id': el.id, style: 'cursor: pointer' });
    t.textContent = el.text || G.dist(a, b).toFixed(2);
    svg.appendChild(t);
  }

  function renderSelectionOutline(el) {
    if (el.t === 'p') {
      const s = worldToScreen(el);
      svg.appendChild(svgEl('circle', { cx: s.x, cy: s.y, r: 8, class: 'selected-outline' }));
    } else if (el.t === 's' || el.t === 'r' || el.t === 'l') {
      const p = lineTwoPts(el); if (!p) return;
      const a = worldToScreen(p.a), b = worldToScreen(p.b);
      if (el.t === 'l') {
        const FAR = 5000, d = G.norm(G.sub(p.b, p.a));
        const f1 = worldToScreen({ x: p.a.x - d.x * FAR, y: p.a.y - d.y * FAR });
        const f2 = worldToScreen({ x: p.a.x + d.x * FAR, y: p.a.y + d.y * FAR });
        svg.appendChild(svgEl('line', { x1: f1.x, y1: f1.y, x2: f2.x, y2: f2.y, class: 'selected-outline' }));
      } else if (el.t === 'r') {
        const FAR = 5000, d = G.norm(G.sub(p.b, p.a));
        const f = worldToScreen({ x: p.a.x + d.x * FAR, y: p.a.y + d.y * FAR });
        svg.appendChild(svgEl('line', { x1: a.x, y1: a.y, x2: f.x, y2: f.y, class: 'selected-outline' }));
      } else {
        svg.appendChild(svgEl('line', { x1: a.x, y1: a.y, x2: b.x, y2: b.y, class: 'selected-outline' }));
      }
    } else if (el.t === 'c') {
      const c = pointAt(el.center), r = pointAt(el.radius);
      if (!c || !r) return;
      const cs = worldToScreen(c);
      const radius = G.dist(c, r) * state.view.scale;
      svg.appendChild(svgEl('circle', { cx: cs.x, cy: cs.y, r: radius, class: 'selected-outline' }));
    } else if (el.t === 'g') {
      const pts = el.points.map(id => pointAt(id)).filter(Boolean);
      if (pts.length < 2) return;
      const sp = pts.map(worldToScreen);
      const dStr = 'M ' + sp.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ') + ' Z';
      svg.appendChild(svgEl('path', { d: dStr, class: 'selected-outline' }));
    }
  }

  // ==================== 参数面板 ====================
  const TYPE_NAMES = { p: '点', s: '线段', r: '射线', l: '直线', c: '圆', g: '多边形', a: '角度', x: '文本', m: '测度' };
  const CONSTRAINT_NAMES = { 'iso-tri': '等腰三角形', 'equilateral': '等边三角形', 'parallelogram': '平行四边形', 'rectangle': '矩形', 'rhombus': '菱形', 'square': '正方形' };
  const TRI_CONS = [
    ['tri-altitude',     '高',       '3条高'],
    ['tri-median',       '中线',     '3条中线'],
    ['tri-bisector',     '角平分线', '3条角平分线'],
    ['tri-midsegment',   '中位线',   '3条中位线'],
    ['tri-circumcircle', '外接圆',   '外接圆'],
    ['tri-incircle',     '内切圆',   '内切圆'],
    ['tri-centroid',     '重心',     '重心'],
    ['tri-orthocenter',  '垂心',     '垂心'],
    ['tri-circumcenter', '外心',     '外心'],
    ['tri-incenter',     '内心',     '内心'],
  ];
  // 线段构造
  const SEG_CONS = [
    ['midpoint',   '中点',       '中点'],
    ['perpbisect', '垂直平分线', '垂直平分线'],
  ];
  // 线/射线/直线构造 (需另选一点, 这里仅显示标签占位)
  const LINE_CONS = [];  // 暂不通过面板启用, 因需要选取外部点
  // 圆构造
  const CIRCLE_CONS = [];  // 中心/半径点已是显式点, 无需额外构造

  function escapeHTML(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function renderParamPanel() {
    const panel = document.getElementById('param-panel');
    const body = document.getElementById('param-body');
    const title = document.getElementById('param-title');
    if (state.selection.size === 0) {
      panel.hidden = true;
      body.innerHTML = '';
      title.textContent = '';
      return;
    }
    const id = [...state.selection][0];
    const el = findEl(id);
    if (!el) {
      panel.hidden = true;
      body.innerHTML = '';
      title.textContent = '';
      return;
    }
    panel.hidden = false;
    title.textContent = (TYPE_NAMES[el.t] || el.t) + ' #' + el.id;
    body.innerHTML = buildParamContent(el);
  }

  function buildParamContent(el) {
    switch (el.t) {
      case 'p': return pointParams(el);
      case 's': return segmentParams(el);
      case 'r': return rayParams(el);
      case 'l': return lineParams(el);
      case 'c': return circleParams(el);
      case 'g': return polygonParams(el);
      case 'a': return angleParams(el);
      case 'x': return textParams(el);
      case 'm': return measureParams(el);
    }
    return '';
  }

  function row(key, val, hl) {
    return `<div class="param-row"><span class="key">${escapeHTML(key)}</span><span class="val${hl ? ' hl' : ''}">${val}</span></div>`;
  }
  function rowEdit(key, paramId, value, type = 'number', step = 'any') {
    return `<div class="param-row"><span class="key">${escapeHTML(key)}</span><span class="val editable"><input type="${type}" class="param-input" data-param="${paramId}" value="${escapeHTML(String(value))}" step="${step}"></span></div>`;
  }
  function section(label) {
    return `<div class="param-section">${escapeHTML(label)}</div>`;
  }

  function pointParams(el) {
    return rowEdit('X', 'x', el.x.toFixed(2))
      + rowEdit('Y', 'y', el.y.toFixed(2))
      + rowEdit('标签', 'label', el.label || '', 'text')
      + row('类型', '点');
  }

  function segmentParams(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    if (!a || !b) return '';
    const len = G.dist(a, b);
    const dx = b.x - a.x, dy = b.y - a.y;
    const ang = Math.atan2(dy, dx) * 180 / Math.PI;
    const slope = Math.abs(dx) < 1e-9 ? '∞' : (dy / dx).toFixed(3);
    return rowEdit('长度', 'length', len.toFixed(3))
      + row('斜率', slope)
      + rowEdit('方向角°', 'angle', ang.toFixed(2))
      + section(`端点 A (#${el.a})`)
      + rowEdit('X', 'ax', a.x.toFixed(2))
      + rowEdit('Y', 'ay', a.y.toFixed(2))
      + section(`端点 B (#${el.b})`)
      + rowEdit('X', 'bx', b.x.toFixed(2))
      + rowEdit('Y', 'by', b.y.toFixed(2))
      + segmentConsHTML(el);
  }

  function segmentConsHTML(seg) {
    const cons = seg.constructions || {};
    const buttons = SEG_CONS.map(([id, label, tip]) => {
      const active = !!cons[id];
      return `<button data-cons="${id}" class="${active ? 'active' : ''}" title="${escapeHTML(tip)}">${label}</button>`;
    }).join('');
    return section('构造') + `<div class="param-buttons">${buttons}</div>`;
  }

  function rayParams(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    if (!a || !b) return '';
    const ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    return section(`起点 (#${el.a})`)
      + rowEdit('X', 'ax', a.x.toFixed(2))
      + rowEdit('Y', 'ay', a.y.toFixed(2))
      + rowEdit('方向角°', 'angle', ang.toFixed(2))
      + section(`过点 (#${el.b})`)
      + rowEdit('X', 'bx', b.x.toFixed(2))
      + rowEdit('Y', 'by', b.y.toFixed(2));
  }

  function lineParams(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    if (!a || !b) return '';
    const ang = Math.atan2(b.y - a.y, b.x - a.x) * 180 / Math.PI;
    return rowEdit('方向角°', 'angle', ang.toFixed(2))
      + section(`点 1 (#${el.a})`)
      + rowEdit('X', 'ax', a.x.toFixed(2))
      + rowEdit('Y', 'ay', a.y.toFixed(2))
      + section(`点 2 (#${el.b})`)
      + rowEdit('X', 'bx', b.x.toFixed(2))
      + rowEdit('Y', 'by', b.y.toFixed(2));
  }

  function circleParams(el) {
    const c = pointAt(el.center), r = pointAt(el.radius);
    if (!c || !r) return '';
    const radius = G.dist(c, r);
    return section(`圆心 (#${el.center})`)
      + rowEdit('X', 'cx', c.x.toFixed(2))
      + rowEdit('Y', 'cy', c.y.toFixed(2))
      + rowEdit('半径', 'radius', radius.toFixed(3))
      + row('直径', (radius * 2).toFixed(3))
      + row('周长', (2 * Math.PI * radius).toFixed(3))
      + row('面积', (Math.PI * radius * radius).toFixed(3));
  }

  function polygonParams(el) {
    const pts = el.points.map(id => pointAt(id)).filter(Boolean);
    if (pts.length < 3) {
      return row('顶点数', String(pts.length));
    }
    const area = G.polygonArea(pts);
    const perim = G.polygonPerimeter(pts);
    let sides = '';
    for (let i = 0; i < pts.length; i++) {
      const j = (i + 1) % pts.length;
      sides += row(`边 ${i + 1}`, G.dist(pts[i], pts[j]).toFixed(3));
    }
    let angles = '';
    let angleSum = 0;
    for (let i = 0; i < pts.length; i++) {
      const prev = pts[(i - 1 + pts.length) % pts.length];
      const cur = pts[i];
      const next = pts[(i + 1) % pts.length];
      const rad = G.angleAt(cur, prev, next);
      const deg = rad * 180 / Math.PI;
      angleSum += deg;
      angles += row(`∠${i + 1}`, deg.toFixed(1) + '°');
    }
    let cons = '';
    if (pts.length === 3) cons = triConstructionsHTML(el);
    let verts = '';
    for (let i = 0; i < pts.length; i++) {
      verts += section(`顶点 ${i + 1} (#${el.points[i]})`);
      verts += rowEdit('X', `vx${i}`, pts[i].x.toFixed(2));
      verts += rowEdit('Y', `vy${i}`, pts[i].y.toFixed(2));
    }
    const constraintRow = el.constraint
      ? row('类型', CONSTRAINT_NAMES[el.constraint] || el.constraint)
      : '';
    return constraintRow
      + row('顶点数', String(pts.length))
      + row('周长', perim.toFixed(3))
      + row('面积', area.toFixed(3), true)
      + row('内角和', angleSum.toFixed(1) + '°')
      + section('顶点坐标') + verts
      + section('边长') + sides
      + section('内角') + angles
      + cons;
  }

  function triConstructionsHTML(poly) {
    const cons = poly.constructions || {};
    const buttons = TRI_CONS.map(([id, label, tip]) => {
      const active = !!cons[id];
      return `<button data-cons="${id}" class="${active ? 'active' : ''}" title="${escapeHTML(tip)}">${label}</button>`;
    }).join('');
    return section('三角形构造') + `<div class="param-buttons">${buttons}</div>`;
  }

function angleParams(el) {
    const v = findPoint(el.vertex), p1 = findPoint(el.p1), p2 = findPoint(el.p2);
    if (!v || !p1 || !p2) return '';
    const deg = G.angleAt(v, p1, p2) * 180 / Math.PI;
    const dynamic = deg.toFixed(2) + '°';
    return rowEdit('角度°', 'angle', deg.toFixed(2))
      + rowEdit('标签', 'text', el.text || dynamic, 'text')
      + row('弧度', (deg * Math.PI / 180).toFixed(4))
      + section(`顶点 (#${el.vertex})`)
      + rowEdit('X', 'vx', v.x.toFixed(2))
      + rowEdit('Y', 'vy', v.y.toFixed(2))
      + section(`边 1 (#${el.p1})`)
      + rowEdit('X', 'p1x', p1.x.toFixed(2))
      + rowEdit('Y', 'p1y', p1.y.toFixed(2))
      + section(`边 2 (#${el.p2})`)
      + rowEdit('X', 'p2x', p2.x.toFixed(2))
      + rowEdit('Y', 'p2y', p2.y.toFixed(2));
  }

  function textParams(el) {
    return rowEdit('内容', 'text', el.text || '', 'text')
      + rowEdit('X', 'x', el.x.toFixed(2))
      + rowEdit('Y', 'y', el.y.toFixed(2));
  }

  function measureParams(el) {
    const a = pointAt(el.a), b = pointAt(el.b);
    if (!a || !b) return '';
    const dynamic = G.dist(a, b).toFixed(3);
    return rowEdit('值', 'text', el.text || dynamic, 'text')
      + section(`端点 A (#${el.a})`)
      + rowEdit('X', 'ax', a.x.toFixed(2))
      + rowEdit('Y', 'ay', a.y.toFixed(2))
      + section(`端点 B (#${el.b})`)
      + rowEdit('X', 'bx', b.x.toFixed(2))
      + rowEdit('Y', 'by', b.y.toFixed(2));
  }

  function toggleTriConstruction(poly, consId) {
    if (poly.constructions && poly.constructions[consId]) {
      removeConstruction(poly, consId);
    } else {
      applyConstruction(poly, consId);
    }
  }

  function applyConstruction(poly, consId) {
    const pts = poly.points.map(id => findPoint(id));
    if (pts.length < 3 || pts.some(p => !p)) return;
    const before = state.elements.length;
    executeConstruction(consId, pts);
    const newEls = state.elements.slice(before);
    if (!poly.constructions) poly.constructions = {};
    poly.constructions[consId] = newEls.map(e => e.id);
    renderParamPanel();
  }

  function removeConstruction(poly, consId) {
    if (!poly.constructions || !poly.constructions[consId]) return;
    pushHistory();
    for (const id of poly.constructions[consId]) {
      deleteEl(id);
    }
    delete poly.constructions[consId];
    render();
    renderParamPanel();
  }

  // 关闭按钮: 取消选择
  document.getElementById('param-close').addEventListener('click', () => {
    state.selection.clear();
    render();
  });

  // 构造按钮事件委托
  document.getElementById('param-body').addEventListener('click', e => {
    const btn = e.target.closest('[data-cons]');
    if (!btn) return;
    const id = [...state.selection][0];
    const el = findEl(id);
    if (!el) return;
    const consId = btn.dataset.cons;
    if (el.t === 'g') {
      toggleTriConstruction(el, consId);
    } else if (el.t === 's') {
      toggleSegmentConstruction(el, consId);
    }
  });

  function toggleSegmentConstruction(seg, consId) {
    if (seg.constructions && seg.constructions[consId]) {
      removeSegmentConstruction(seg, consId);
    } else {
      applySegmentConstruction(seg, consId);
    }
  }

  function applySegmentConstruction(seg, consId) {
    const picked = [{ id: seg.a }, { id: seg.b }];
    const before = state.elements.length;
    executeConstruction(consId, picked);
    const newEls = state.elements.slice(before);
    if (!seg.constructions) seg.constructions = {};
    seg.constructions[consId] = newEls.map(e => e.id);
    renderParamPanel();
  }

  function removeSegmentConstruction(seg, consId) {
    if (!seg.constructions || !seg.constructions[consId]) return;
    pushHistory();
    for (const id of seg.constructions[consId]) {
      deleteEl(id);
    }
    delete seg.constructions[consId];
    render();
    renderParamPanel();
  }

  // 参数输入 change 事件委托
  document.getElementById('param-body').addEventListener('change', e => {
    const input = e.target.closest('[data-param]');
    if (!input) return;
    const id = [...state.selection][0];
    const el = findEl(id);
    if (!el) return;
    handleParamChange(el, input.dataset.param, input.value, input);
  });
  // Enter 键也提交
  document.getElementById('param-body').addEventListener('keydown', e => {
    if (e.key !== 'Enter') return;
    const input = e.target.closest('[data-param]');
    if (!input) return;
    input.blur();  // 触发 change
  });

  function handleParamChange(el, paramId, raw, input) {
    const v = input.type === 'number' ? parseFloat(raw) : raw;
    if (input.type === 'number' && !isFinite(v)) {
      input.classList.add('invalid');
      setTimeout(() => input.classList.remove('invalid'), 800);
      return;
    }
    pushHistory();
    let ok = false;
    switch (el.t) {
      case 'p': ok = setPoint(el, paramId, v); break;
      case 's': ok = setSegment(el, paramId, v); break;
      case 'r': ok = setRay(el, paramId, v); break;
      case 'l': ok = setLine(el, paramId, v); break;
      case 'c': ok = setCircle(el, paramId, v); break;
      case 'g': ok = setPolygonVertex(el, paramId, v); break;
      case 'a': ok = setAngle(el, paramId, v); break;
      case 'm': ok = setMeasure(el, paramId, v); break;
      case 'x': ok = setText(el, paramId, v); break;
    }
    if (!ok) {
      // 回滚: 不应推进 history, 重新 pop
      state.history.pop();
      render();
      return;
    }
    render();
  }

  function setPoint(p, k, v) {
    if (k === 'x') { p.x = +v; return true; }
    if (k === 'y') { p.y = +v; return true; }
    if (k === 'label') {
      const s = String(v).slice(0, 4);
      p.label = s || undefined;
      return true;
    }
    return false;
  }

  function setSegment(seg, k, v) {
    const a = findPoint(seg.a), b = findPoint(seg.b);
    if (!a || !b) return false;
    if (k === 'length') {
      if (v < 0) return false;
      const cur = G.dist(a, b);
      if (cur < 1e-9) return false;
      const t = v / cur;
      b.x = a.x + (b.x - a.x) * t;
      b.y = a.y + (b.y - a.y) * t;
      return true;
    }
    if (k === 'angle') {
      const rad = v * Math.PI / 180;
      const len = G.dist(a, b);
      b.x = a.x + Math.cos(rad) * len;
      b.y = a.y + Math.sin(rad) * len;
      return true;
    }
    if (k === 'ax') { a.x = +v; return true; }
    if (k === 'ay') { a.y = +v; return true; }
    if (k === 'bx') { b.x = +v; return true; }
    if (k === 'by') { b.y = +v; return true; }
    return false;
  }

  function setRay(ray, k, v) {
    const a = findPoint(ray.a), b = findPoint(ray.b);
    if (!a || !b) return false;
    if (k === 'angle') {
      const rad = v * Math.PI / 180;
      const len = G.dist(a, b) || 1;
      b.x = a.x + Math.cos(rad) * len;
      b.y = a.y + Math.sin(rad) * len;
      return true;
    }
    if (k === 'ax') { a.x = +v; return true; }
    if (k === 'ay') { a.y = +v; return true; }
    if (k === 'bx') { b.x = +v; return true; }
    if (k === 'by') { b.y = +v; return true; }
    return false;
  }

  function setLine(line, k, v) {
    const a = findPoint(line.a), b = findPoint(line.b);
    if (!a || !b) return false;
    if (k === 'angle') {
      const rad = v * Math.PI / 180;
      const len = G.dist(a, b) || 1;
      b.x = a.x + Math.cos(rad) * len;
      b.y = a.y + Math.sin(rad) * len;
      return true;
    }
    if (k === 'ax') { a.x = +v; return true; }
    if (k === 'ay') { a.y = +v; return true; }
    if (k === 'bx') { b.x = +v; return true; }
    if (k === 'by') { b.y = +v; return true; }
    return false;
  }

  function setCircle(c, k, v) {
    const ctr = findPoint(c.center), r = findPoint(c.radius);
    if (!ctr || !r) return false;
    if (k === 'radius') {
      if (v < 0) return false;
      const cur = G.dist(ctr, r);
      if (cur < 1e-9) return false;
      const t = v / cur;
      r.x = ctr.x + (r.x - ctr.x) * t;
      r.y = ctr.y + (r.y - ctr.y) * t;
      return true;
    }
    if (k === 'cx') { ctr.x = +v; return true; }
    if (k === 'cy') { ctr.y = +v; return true; }
    return false;
  }

  function setPolygonVertex(poly, k, v) {
    const m = k.match(/^v([xy])(\d+)$/);
    if (!m) return false;
    const axis = m[1], idx = +m[2];
    if (idx < 0 || idx >= poly.points.length) return false;
    const pt = findPoint(poly.points[idx]);
    if (!pt) return false;
    const newPos = { x: pt.x, y: pt.y, [axis]: +v };
    if (poly.constraint) {
      applyConstraint(poly, idx, newPos);
    } else {
      pt[axis] = +v;
    }
    return true;
  }

  function setAngle(ang, k, v) {
    const v0 = findPoint(ang.vertex), p1 = findPoint(ang.p1), p2 = findPoint(ang.p2);
    if (!v0 || !p1 || !p2) return false;
    if (k === 'text') { ang.text = String(v); return true; }
    if (k === 'angle') {
      // 旋转 p2 调整角度 (保持 p1 不动)
      const cur = G.angleAt(v0, p1, p2);
      const delta = v * Math.PI / 180 - cur;
      if (Math.abs(delta) < 1e-9) return true;
      const r = G.sub(p2, v0);
      const cs = Math.cos(delta), sn = Math.sin(delta);
      const nr = { x: r.x * cs - r.y * sn, y: r.x * sn + r.y * cs };
      p2.x = v0.x + nr.x;
      p2.y = v0.y + nr.y;
      return true;
    }
    if (k === 'vx') { v0.x = +v; return true; }
    if (k === 'vy') { v0.y = +v; return true; }
    if (k === 'p1x') { p1.x = +v; return true; }
    if (k === 'p1y') { p1.y = +v; return true; }
    if (k === 'p2x') { p2.x = +v; return true; }
    if (k === 'p2y') { p2.y = +v; return true; }
    return false;
  }

  function setMeasure(m, k, v) {
    if (k === 'text') { m.text = String(v); return true; }
    const a = findPoint(m.a), b = findPoint(m.b);
    if (!a || !b) return false;
    if (k === 'ax') { a.x = +v; return true; }
    if (k === 'ay') { a.y = +v; return true; }
    if (k === 'bx') { b.x = +v; return true; }
    if (k === 'by') { b.y = +v; return true; }
    return false;
  }

  function setText(t, k, v) {
    if (k === 'text') { t.text = String(v); return true; }
    if (k === 'x') { t.x = +v; return true; }
    if (k === 'y') { t.y = +v; return true; }
    return false;
  }

  // ==================== 预览 ====================
  let preview = null;
  function setPreview(p) { preview = p; }
  function clearPreview() { preview = null; }

  function renderPreviews() {
    if (!preview) return;
    if (preview.type === 'line' || preview.type === 'segment' || preview.type === 'ray') {
      const a = worldToScreen(preview.a), b = worldToScreen(preview.b);
      let x1 = a.x, y1 = a.y, x2 = b.x, y2 = b.y;
      if (preview.type === 'ray') {
        const FAR = 5000, d = G.norm(G.sub(preview.b, preview.a));
        x2 = a.x + d.x * FAR; y2 = a.y + d.y * FAR;
      } else if (preview.type === 'line') {
        const FAR = 5000, d = G.norm(G.sub(preview.b, preview.a));
        x1 = a.x - d.x * FAR; y1 = a.y - d.y * FAR;
        x2 = a.x + d.x * FAR; y2 = a.y + d.y * FAR;
      }
      svg.appendChild(svgEl('line', { x1, y1, x2, y2, class: 'segment',
        'stroke-dasharray': '4 3', opacity: '0.6' }));
    } else if (preview.type === 'circle') {
      const sa = worldToScreen(preview.center);
      const r = G.dist(preview.center, preview.point) * state.view.scale;
      svg.appendChild(svgEl('circle', { cx: sa.x, cy: sa.y, r, class: 'circle',
        'stroke-dasharray': '4 3', opacity: '0.6' }));
    } else if (preview.type === 'polygon') {
      if (preview.points.length < 1) return;
      const sp = preview.points.map(worldToScreen);
      const dStr = 'M ' + sp.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ');
      svg.appendChild(svgEl('path', { d: dStr, class: 'segment', 'stroke-dasharray': '4 3', opacity: '0.6', fill: 'none' }));
    } else if (preview.type === 'shape') {
      const verts = shapeVertices(preview.toolId, preview.anchor, preview.current);
      if (verts.length >= 3) {
        const sp = verts.map(worldToScreen);
        const dStr = 'M ' + sp.map(p => `${p.x.toFixed(2)},${p.y.toFixed(2)}`).join(' L ') + ' Z';
        svg.appendChild(svgEl('path', { d: dStr, class: 'segment', 'stroke-dasharray': '5 4', 'stroke-width': '2', opacity: '0.75', fill: 'rgba(0, 200, 255, 0.08)' }));
      }
      // Anchor indicator
      const sa = worldToScreen(preview.anchor);
      svg.appendChild(svgEl('circle', { cx: sa.x, cy: sa.y, r: 6, fill: 'none', stroke: '#0066ff', 'stroke-width': 2 }));
    }
  }

  // ==================== 命中测试 ====================
  function hitTest(sx, sy) {
    const w = screenToWorld(sx, sy);
    const scale = state.view.scale;
    let best = null, bestDist = HIT_DIST;
    // text 元素 (m/a/x) 点击测试
    for (const el of state.elements) {
      if (el.t === 'm') {
        const a = pointAt(el.a), b = pointAt(el.b);
        if (!a || !b) continue;
        const mid = G.midpoint(a, b);
        const d = G.norm(G.sub(b, a));
        const off = G.perp(d);
        const labelPos = G.add(mid, G.mul(off, 12 / state.view.scale));
        const ls = worldToScreen(labelPos);
        const textD = Math.hypot(ls.x - sx, ls.y - sy);
        if (textD < 20) { best = el; bestDist = 0; }
      } else if (el.t === 'a') {
        const v = pointAt(el.vertex);
        if (!v) continue;
        const sV = worldToScreen(v);
        const textD = Math.hypot(sV.x - sx, sV.y - sy);
        if (textD < 30) { best = el; bestDist = 0; }
      } else if (el.t === 'x') {
        const p = el.anchor ? pointAt(el.anchor) : null;
        const pos = p ? worldToScreen(p) : worldToScreen({ x: el.x, y: el.y });
        const textD = Math.hypot(pos.x - sx, pos.y - sy);
        if (textD < 20) { best = el; bestDist = 0; }
      }
    }
    for (const el of state.elements) {
      if (el.t === 'p') {
        const d = Math.hypot(el.x - w.x, el.y - w.y) * scale;
        if (d < bestDist) { bestDist = d; best = el; }
      } else if (el.t === 's' || el.t === 'r' || el.t === 'l') {
        // 优先返回点, 避免线段拦截端点
        if (best && best.t === 'p') continue;
        const p = lineTwoPts(el); if (!p) continue;
        const cp = el.t === 's' ? G.closestOnSegment(w, p.a, p.b) : G.closestOnLine(w, p.a, p.b);
        const d = Math.hypot(cp.x - w.x, cp.y - w.y) * scale;
        if (d < HIT_DIST_LINE && d < bestDist) { bestDist = d; best = el; }
      } else if (el.t === 'c') {
        // 优先返回点
        if (best && best.t === 'p') continue;
        const c = pointAt(el.center), r = pointAt(el.radius);
        if (!c || !r) continue;
        const dist = G.dist(w, c);
        const radius = G.dist(c, r);
        const d = Math.abs(dist - radius) * scale;
        if (d < HIT_DIST_LINE && d < bestDist) { bestDist = d; best = el; }
      } else if (el.t === 'g') {
        // 优先返回点, 避免 polygon path 拦截点上的鼠标事件
        if (best && best.t === 'p') continue;
        const pts = el.points.map(id => pointAt(id)).filter(Boolean);
        if (pts.length < 3) continue;
        if (pointInPolygon(w, pts)) { best = el; bestDist = 0; }
      }
    }
    return best;
  }
  function pointInPolygon(p, poly) {
    let inside = false;
    for (let i = 0, j = poly.length - 1; i < poly.length; j = i++) {
      const xi = poly[i].x, yi = poly[i].y;
      const xj = poly[j].x, yj = poly[j].y;
      const intersect = ((yi > p.y) !== (yj > p.y)) &&
        (p.x < (xj - xi) * (p.y - yi) / (yj - yi + 1e-12) + xi);
      if (intersect) inside = !inside;
    }
    return inside;
  }

  // 在世界坐标 w 周围 0.5*scale (px) 内找最近的点
  function findClosestPoint(w, maxDistWorld) {
    let best = null, bestD = maxDistWorld;
    for (const el of state.elements) {
      if (el.t !== 'p') continue;
      const d = Math.hypot(el.x - w.x, el.y - w.y);
      if (d < bestD) { bestD = d; best = el; }
    }
    return best;
  }

  // ==================== 鼠标事件 ====================
  let dragInfo = null;
  let mouseWorld = { x: 0, y: 0 };

  svg.addEventListener('mousemove', e => {
    const r = getRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    mouseWorld = screenToWorld(sx, sy);
    document.getElementById('status-pos').textContent = `${mouseWorld.x.toFixed(1)}, ${mouseWorld.y.toFixed(1)}`;

    if (dragInfo) {
