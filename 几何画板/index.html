      if (dragInfo.type === 'pan') {
        state.view.x -= (e.clientX - dragInfo.lastX) / state.view.scale;
        state.view.y -= (e.clientY - dragInfo.lastY) / state.view.scale;
        dragInfo.lastX = e.clientX; dragInfo.lastY = e.clientY;
        render();
      } else if (dragInfo.type === 'move-point') {
        const el = findEl(dragInfo.id);
        if (el && el.t === 'p') {
          // 查找包含此点的约束多边形, 应用约束保持形状
          const constrained = state.elements.filter(e => e.t === 'g' && e.constraint && e.points.includes(el.id));
          if (constrained.length > 0) {
            const newPos = { x: mouseWorld.x, y: mouseWorld.y };
            for (const poly of constrained) {
              const idx = poly.points.indexOf(el.id);
              applyConstraint(poly, idx, newPos);
            }
          } else {
            el.x = mouseWorld.x; el.y = mouseWorld.y;
          }
          render();
        }
      } else if (dragInfo.type === 'move-element') {
        const el = findEl(dragInfo.id);
        if (el) {
          const dx = mouseWorld.x - dragInfo.lastWX;
          const dy = mouseWorld.y - dragInfo.lastWY;
          moveElementBy(el, dx, dy);
          dragInfo.lastWX = mouseWorld.x;
          dragInfo.lastWY = mouseWorld.y;
          render();
        }
      }
      return;
    }

    // 预览 + 端点吸附提示
    const tool = state.currentTool;
    if (tool === 'segment' || tool === 'ray' || tool === 'line') {
      // hover 端点提示
      if (!state.shapeDrag) {
        const hit = hitTest(sx, sy);
        const newHover = (hit && hit.t === 'p') ? hit.id : null;
        if (newHover !== state.hoverPoint) {
          state.hoverPoint = newHover;
          render();
        }
      }
      if (state.pendingVertex) {
        setPreview({ type: tool, a: pointAt(state.pendingVertex), b: mouseWorld });
        render();
      }
    } else if (tool === 'circle') {
      if (state.pendingCircleCenter) {
        setPreview({ type: 'circle', center: pointAt(state.pendingCircleCenter), point: mouseWorld });
        render();
      }
    } else if (tool === 'polygon') {
      if (state.pendingPoly.length > 0) {
        const pts = state.pendingPoly.map(id => pointAt(id)).filter(Boolean);
        if (pts.length > 0) {
          setPreview({ type: 'polygon', points: [...pts, mouseWorld] });
          render();
        }
      }
    } else if (state.shapeDrag) {
      // 预设形状拖拽中: 更新预览
      state.shapeDrag.moved = true;
      setPreview({ type: 'shape', toolId: state.shapeDrag.toolId, anchor: state.shapeDrag.anchor, current: mouseWorld });
      render();
    }
  });

  svg.addEventListener('mousedown', e => {
    if (e.button !== 0) return;
    const r = getRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    const w = screenToWorld(sx, sy);

    if (state.currentTool === 'pan') {
      dragInfo = { type: 'pan', lastX: e.clientX, lastY: e.clientY };
      svg.classList.add('dragging');
      return;
    }

    if (state.currentTool === 'select') {
      let hit = hitTest(sx, sy);
      // 点击到 text.measure-text / text.angle-text / text.text-label 时, 选中对应元素
      if (!hit && e.target.tagName === 'text') {
        const id = parseInt(e.target.getAttribute('data-id'));
        if (id) hit = findEl(id);
      }
      if (hit) {
        state.selection.clear();
        state.selection.add(hit.id);
        if (hit.t === 'p') {
          dragInfo = { type: 'move-point', id: hit.id };
        } else {
          dragInfo = { type: 'move-element', id: hit.id, lastWX: w.x, lastWY: w.y };
        }
        pushHistory();
        render();
      } else {
        state.selection.clear();
        dragInfo = { type: 'pan', lastX: e.clientX, lastY: e.clientY };
        render();
      }
      return;
    }

    if (state.currentTool === 'delete') {
      const hit = hitTest(sx, sy);
      if (hit) { pushHistory(); deleteEl(hit.id); render(); }
      return;
    }

    if (state.currentTool === 'point') {
      pushHistory();
      createPoint(w.x, w.y);
      render();
      return;
    }

    if (state.currentTool === 'text') {
      openTextModal(w.x, w.y);
      return;
    }

    if (state.currentTool === 'segment' || state.currentTool === 'ray' || state.currentTool === 'line') {
      // 端点选取: 优先 hit, 否则找最近点 (snap 0.5 世界单位 ≈ 20px)
      let pid = null;
      const hit = hitTest(sx, sy);
      if (hit && hit.t === 'p') pid = hit.id;
      else {
        const snap = findClosestPoint(w, 0.5);
        if (snap) pid = snap.id;
      }
      const tt = state.currentTool;
      if (!state.pendingVertex) {
        // 第一个点
        if (pid) {
          state.pendingVertex = pid;
          render();
        } else {
          pushHistory();
          const p = createPoint(w.x, w.y);
          state.pendingVertex = p.id;
          render();
        }
      } else {
        // 第二个点
        if (!pid) {
          pushHistory();
          pid = createPoint(w.x, w.y).id;
        }
        if (pid === state.pendingVertex) { toast('请选择不同的点'); return; }
        pushHistory();
        addEl({ id: newId(), t: tt === 'segment' ? 's' : (tt === 'ray' ? 'r' : 'l'), a: state.pendingVertex, b: pid });
        state.pendingVertex = null;
        state.hoverPoint = null;
        clearPreview();
        render();
      }
      return;
    }

    if (state.currentTool === 'circle') {
      const hit = hitTest(sx, sy);
      if (!state.pendingCircleCenter) {
        if (hit && hit.t === 'p') state.pendingCircleCenter = hit.id;
        else { pushHistory(); const p = createPoint(w.x, w.y); state.pendingCircleCenter = p.id; render(); }
      } else {
        let pid;
        if (hit && hit.t === 'p') pid = hit.id;
        else { pushHistory(); pid = createPoint(w.x, w.y).id; }
        if (pid === state.pendingCircleCenter) { toast('请选择不同的点'); return; }
        pushHistory();
        addEl({ id: newId(), t: 'c', center: state.pendingCircleCenter, radius: pid });
        state.pendingCircleCenter = null;
        clearPreview();
        render();
      }
      return;
    }

    if (state.currentTool === 'polygon') {
      const hit = hitTest(sx, sy);
      // 已有 3+ 个点时, 点击首点则完成
      if (state.pendingPoly.length >= 3 && hit && hit.t === 'p' && hit.id === state.pendingPoly[0]) {
        finishPolygon();
        return;
      }
      let pid;
      if (hit && hit.t === 'p') pid = hit.id;
      else { pushHistory(); pid = createPoint(w.x, w.y).id; render(); }
      // 避免连续重复同一 ID
      if (state.pendingPoly[state.pendingPoly.length - 1] !== pid) {
        state.pendingPoly.push(pid);
      }
      return;
    }

    if (state.currentTool === 'angle') {
      // 两种模式: 选 2 条线 (推荐) 或 选 3 个点
      // - 点中 line-like 元素 (s/r/l) -> 加入 linePicked
      // - 点中点 -> 切到 point 模式, 走 3 点流程
      const hit = hitTest(sx, sy);
      const isLine = hit && (hit.t === 's' || hit.t === 'r' || hit.t === 'l');
      // 若已在点模式 (pendingVertex 已设) 但点中线, 重置为选线模式
      if (isLine && state.pendingVertex) {
        state.pendingVertex = null;
        state.toolPicked = [];
      }
      if (isLine) {
        // 选线模式: 第 1/2 次点击选线
        if (!state.toolPicked[0] || (state.toolPicked[0] && !state.toolPicked[0].t)) {
          // 还没选过任何东西
          state.toolPicked = [{ id: hit.id, t: hit.t }];
          toast('请选择第 2 条直线 / 射线 / 线段');
          return;
        } else if (state.toolPicked[0] && state.toolPicked[0].t) {
          // 已有第 1 条线, 选第 2 条
          if (hit.id === state.toolPicked[0].id) { toast('请选择不同的线'); return; }
          // 计算交点
          const L1 = findEl(state.toolPicked[0].id);
          const L2 = findEl(hit.id);
          const a1 = pointAt(L1.a), b1 = pointAt(L1.b);
          const a2 = pointAt(L2.a), b2 = pointAt(L2.b);
          if (!a1 || !b1 || !a2 || !b2) { toast('线缺少端点'); return; }
          const inter = G.lineLineIntersect(a1, b1, a2, b2);
          if (!inter) { toast('两线平行, 无交点'); state.toolPicked = []; return; }
          // 在交点处建一个新点作为 vertex
          // p1 / p2: 沿 L1 / L2 方向, 距 vertex 1 世界单位的点
          const dir1 = G.norm(G.sub(b1, a1));
          const dir2 = G.norm(G.sub(b2, a2));
          const p1Pt = G.add(inter, G.mul(dir1, 1));
          const p2Pt = G.add(inter, G.mul(dir2, 1));
          pushHistory();
          const vPt = createPoint(inter.x, inter.y);
          const p1El = createPoint(p1Pt.x, p1Pt.y);
          const p2El = createPoint(p2Pt.x, p2Pt.y);
          addEl({ id: newId(), t: 'a', vertex: vPt.id, p1: p1El.id, p2: p2El.id });
          state.toolPicked = [];
          render();
          return;
        }
      }
      // 走点模式: 3 个点
      let pid = null;
      if (hit && hit.t === 'p') pid = hit.id;
      else {
        const snap = findClosestPoint(w, 0.5);
        if (snap) pid = snap.id;
      }
      if (!state.pendingVertex) {
        if (pid) {
          state.pendingVertex = pid;
        } else { pushHistory(); const p = createPoint(w.x, w.y); state.pendingVertex = p.id; render(); }
      } else if (!state.toolPicked[0] || !state.toolPicked[0].t) {
        // 第 2 次点 (顶点): 可能是从选线模式切换, 先清空
        state.toolPicked = [];
        if (pid) {
          if (pid === state.pendingVertex) { toast('请选择不同的点'); return; }
          state.toolPicked.push({ id: pid });
        } else { pushHistory(); const p = createPoint(w.x, w.y); state.toolPicked.push({ id: p.id }); render(); }
      } else {
        // 第 3 次点 (p2)
        if (!pid) { pushHistory(); pid = createPoint(w.x, w.y).id; }
        if (pid === state.pendingVertex) { toast('p1 和 p2 不能相同'); return; }
        if (pid === state.toolPicked[0].id) { toast('顶点和 p2 不能相同'); return; }
        const v = pointAt(state.toolPicked[0].id);
        const p1 = pointAt(state.pendingVertex);
        const p2 = pointAt(pid);
        if (v && p1 && p2) {
          const cross = (p1.x - v.x) * (p2.y - v.y) - (p1.y - v.y) * (p2.x - v.x);
          if (Math.abs(cross) < 1e-9) { toast('三点共线, 无法构造角'); return; }
        }
        pushHistory();
        addEl({ id: newId(), t: 'a', vertex: state.toolPicked[0].id, p1: state.pendingVertex, p2: pid });
        state.pendingVertex = null;
        state.toolPicked = [];
        render();
      }
      return;
    }

    if (PREDIFINED_SHAPES[state.currentTool]) {
      // 点击 + 拖拽: mousedown 记录 anchor, mouseup 时按拖动距离或默认尺寸创建
      state.shapeDrag = { toolId: state.currentTool, anchor: w, moved: false };
      setPreview({ type: 'shape', toolId: state.currentTool, anchor: w, current: w });
      render();
      return;
    }

    if (CONSTRUCTION_DEFS[state.currentTool]) {
      const def = CONSTRUCTION_DEFS[state.currentTool];
      const wantType = def.types[state.toolPicked.length];
      let hit = hitTest(sx, sy);
      // 如果需要点，优先找最近的点（即使有更近的线）
      if (wantType === 'p') {
        const pHit = findClosestPoint(w, 0.5);
        if (pHit) hit = pHit;
        if (!hit) {
          pushHistory();
          hit = createPoint(w.x, w.y);
        }
      } else {
        if (!hit) {
          toast('请点击一个' + (wantType === 'line-like' ? '线' : '对象'));
          return;
        }
        if (!typeMatches(hit, wantType)) {
          toast('类型不匹配: 需要 ' + wantType);
          return;
        }
      }
      state.toolPicked.push(hit);
      if (state.toolPicked.length >= def.n) {
        executeConstruction(state.currentTool, state.toolPicked);
        state.toolPicked = [];
      }
      render();
      return;
    }
  });

  function finalizeShapeDrag() {
    if (!state.shapeDrag) return;
    const { toolId, anchor, moved } = state.shapeDrag;
    let current = mouseWorld;
    if (!moved) {
      // 未拖动: 使用默认尺寸
      const d = SHAPE_DEFAULT_OFFSETS[toolId] || { x: 2, y: 0 };
      current = { x: anchor.x + d.x, y: anchor.y + d.y };
    }
    executePredefinedShape(toolId, anchor, current);
    state.shapeDrag = null;
    clearPreview();
    render();
  }

  function onGlobalMouseUp() {
    if (dragInfo) {
      svg.classList.remove('dragging');
      dragInfo = null;
    }
    if (state.shapeDrag) finalizeShapeDrag();
  }
  // 监听 window 而不是 svg, 这样在 svg 外释放也能完成拖动
  window.addEventListener('mouseup', onGlobalMouseUp);
  svg.addEventListener('mouseup', onGlobalMouseUp);

  svg.addEventListener('dblclick', e => {
    if (state.currentTool === 'polygon' && state.pendingPoly.length >= 3) {
      finishPolygon();
    } else {
      const r = getRect();
      const sx = e.clientX - r.left, sy = e.clientY - r.top;
      const hit = hitTest(sx, sy);
      if (hit && hit.t === 'p') openLabelModal(hit);
    }
  });

  svg.addEventListener('wheel', e => {
    e.preventDefault();
    const r = getRect();
    const sx = e.clientX - r.left, sy = e.clientY - r.top;
    const before = screenToWorld(sx, sy);
    const factor = e.deltaY < 0 ? 1.15 : 1 / 1.15;
    state.view.scale = Math.max(2, Math.min(800, state.view.scale * factor));
    const after = screenToWorld(sx, sy);
    state.view.x += before.x - after.x;
    state.view.y += before.y - after.y;
    render();
  }, { passive: false });

  // ==================== 元素操作 ====================
  function moveElementBy(el, dx, dy) {
    if (el.t === 'p') { el.x += dx; el.y += dy; return; }
    if (el.t === 's' || el.t === 'r' || el.t === 'l') {
      [el.a, el.b].forEach(id => { const p = findPoint(id); if (p) { p.x += dx; p.y += dy; } });
    } else if (el.t === 'c') {
      [el.center, el.radius].forEach(id => { const p = findPoint(id); if (p) { p.x += dx; p.y += dy; } });
    } else if (el.t === 'g') {
      el.points.forEach(id => { const p = findPoint(id); if (p) { p.x += dx; p.y += dy; } });
    } else if (el.t === 'a') {
      [el.vertex, el.p1, el.p2].forEach(id => { const p = findPoint(id); if (p) { p.x += dx; p.y += dy; } });
    } else if (el.t === 'm') {
      [el.a, el.b].forEach(id => { const p = findPoint(id); if (p) { p.x += dx; p.y += dy; } });
    } else if (el.t === 'x') {
      el.x += dx; el.y += dy;
      if (el.anchor) { const p = findPoint(el.anchor); if (p) { p.x += dx; p.y += dy; } }
    }
  }

  // ==================== 构造执行 ====================
  function finishPolygon() {
    if (state.pendingPoly.length < 3) return;
    // 过滤掉被删除/无效的点
    const validIds = state.pendingPoly.filter(id => findPoint(id));
    if (validIds.length < 3) { state.pendingPoly = []; clearPreview(); return; }
    pushHistory();
    addEl({ id: newId(), t: 'g', points: validIds });
    state.pendingPoly = [];
    clearPreview();
    render();
  }

  // 预设形状: 给定 2 个世界坐标点, 返回约束计算后的所有顶点 (world coords)
  function shapeVertices(toolId, p1, p2) {
    switch (toolId) {
      case 'tri-isoceles': {
        const mid = p1, apex = p2;
        const dir = G.norm(G.sub(apex, mid));
        const perp = G.perp(dir);
        const h = G.dist(mid, apex);
        const halfBase = 0.6 * h;
        return [
          G.add(mid, G.mul(perp, -halfBase)),
          G.add(mid, G.mul(perp, halfBase)),
          apex,
        ];
      }
      case 'tri-equilateral': {
        const c = p1, v = p2;
        const r = G.dist(c, v);
        const a0 = Math.atan2(v.y - c.y, v.x - c.x);
        return [
          v,
          { x: c.x + r * Math.cos(a0 + 2 * Math.PI / 3), y: c.y + r * Math.sin(a0 + 2 * Math.PI / 3) },
          { x: c.x + r * Math.cos(a0 + 4 * Math.PI / 3), y: c.y + r * Math.sin(a0 + 4 * Math.PI / 3) },
        ];
      }
      case 'quad-parallelogram': {
        const c1 = p1, c2 = p2;
        const v = G.sub(c2, c1);
        const len = G.len(v);
        const ang = Math.PI / 3;
        const wLen = 0.8 * len;
        const w = { x: Math.cos(ang) * wLen, y: Math.sin(ang) * wLen };
        return [c1, c2, { x: c2.x + w.x, y: c2.y + w.y }, { x: c1.x + w.x, y: c1.y + w.y }];
      }
      case 'quad-rectangle':
        return [p1, { x: p2.x, y: p1.y }, p2, { x: p1.x, y: p2.y }];
      case 'quad-rhombus': {
        const c1 = p1, c2 = p2;
        const v = G.sub(c2, c1);
        const ang = Math.PI / 3;
        const w = { x: v.x * Math.cos(ang) - v.y * Math.sin(ang), y: v.x * Math.sin(ang) + v.y * Math.cos(ang) };
        return [c1, c2, { x: c2.x + w.x, y: c2.y + w.y }, { x: c1.x + w.x, y: c1.y + w.y }];
      }
      case 'quad-square': {
        const c1 = p1, c3 = p2;
        const center = G.midpoint(c1, c3);
        const halfDiag = G.dist(c1, c3) / 2;
        const ang = Math.atan2(c3.y - c1.y, c3.x - c1.x);
        const startAng = ang + Math.PI / 4;
        return [0, 1, 2, 3].map(i => ({
          x: center.x + halfDiag * Math.cos(startAng + i * Math.PI / 2),
          y: center.y + halfDiag * Math.sin(startAng + i * Math.PI / 2),
        }));
      }
    }
    return [];
  }

  // 点击但未拖动时的默认尺寸 (从 anchor 到第二点的偏移)
  const SHAPE_DEFAULT_OFFSETS = {
    'tri-isoceles':     { x: 0,   y: -3 },
    'tri-equilateral':  { x: 2,   y: 0 },
    'quad-parallelogram': { x: 2.5, y: 0 },
    'quad-rectangle':   { x: 2,   y: -2 },
    'quad-rhombus':     { x: 2,   y: 0 },
    'quad-square':      { x: 2,   y: -2 },
  };

  function executePredefinedShape(id, p1, p2) {
    // p1, p2 是世界坐标 (不再用 ID, 由调用方负责传入)
    const vertices = shapeVertices(id, p1, p2);
    if (vertices.length < 3) return;
    pushHistory();
    const ids = vertices.map(v => createPoint(v.x, v.y).id);
    const cMap = {
      'tri-isoceles': 'iso-tri',
      'tri-equilateral': 'equilateral',
      'quad-parallelogram': 'parallelogram',
      'quad-rectangle': 'rectangle',
      'quad-rhombus': 'rhombus',
      'quad-square': 'square',
    };
    addEl({ id: newId(), t: 'g', points: ids, constraint: cMap[id] || null });
  }

  // === 约束编辑: 拖动预设图形的顶点时, 保持形状类型 ===
  // points: [{x, y}, ...]   draggedIdx: 拖动的顶点在数组中的索引   newPos: {x, y}
  function isoTriConstraint(points, draggedIdx, newPos) {
    // [baseLeft, baseRight, apex]
    const [bL, bR, A] = points;
    const M = G.midpoint(bL, bR);
    const baseDir = G.norm(G.sub(bR, bL));
    const perpDir = G.perp(baseDir);
    const oldT = G.dot(G.sub(A, M), perpDir);
    if (draggedIdx === 0 || draggedIdx === 1) {
      // 拖动底边端点: 保持另一端点固定, 顶点重新计算到新 base 的垂直方向
      const other = points[draggedIdx === 0 ? 1 : 0];
      const newP0 = draggedIdx === 0 ? newPos : other;
      const newP1 = draggedIdx === 1 ? newPos : other;
      const newM = G.midpoint(newP0, newP1);
      // 保持 baseDir 方向一致 (总从 points[0] 指向 points[1]), 避免 idx 0/1 不对称
      const newBaseDir = G.norm(G.sub(newP1, newP0));
      const newPerpDir = G.perp(newBaseDir);
      const newA = G.add(newM, G.mul(newPerpDir, oldT));
      return [newP0, newP1, newA];
    } else {
      // 拖动顶点: 投影到底边的垂直平分线上
      const newA = G.add(M, G.mul(perpDir, G.dot(G.sub(newPos, M), perpDir)));
      return [bL, bR, newA];
    }
  }

  function equilateralConstraint(points, draggedIdx, newPos) {
    // [v1, v2, v3] 任意顺序, 但保持中心固定
    const C = {
      x: (points[0].x + points[1].x + points[2].x) / 3,
      y: (points[0].y + points[1].y + points[2].y) / 3,
    };
    const R = G.dist(points[0], C);
    const newDir = G.norm(G.sub(newPos, C));
    const newDragged = G.add(C, G.mul(newDir, R));
    const oldAng = Math.atan2(points[draggedIdx].y - C.y, points[draggedIdx].x - C.x);
    const newAng = Math.atan2(newDragged.y - C.y, newDragged.x - C.x);
    const dAng = newAng - oldAng;
    return points.map((p, i) => {
      if (i === draggedIdx) return newDragged;
      const r = G.dist(p, C);
      const a = Math.atan2(p.y - C.y, p.x - C.x) + dAng;
      return { x: C.x + r * Math.cos(a), y: C.y + r * Math.sin(a) };
    });
  }

  function rectangleConstraint(points, draggedIdx, newPos) {
    // [TL, TR, BR, BL] 轴对齐. 自由: TL(idx0) 和 BR(idx2)
    const [TL, TR, BR, BL] = points;
    if (draggedIdx === 0) {
      return [newPos, { x: BR.x, y: newPos.y }, BR, { x: newPos.x, y: BR.y }];
    } else if (draggedIdx === 2) {
      return [TL, { x: newPos.x, y: TL.y }, newPos, { x: TL.x, y: newPos.y }];
    } else if (draggedIdx === 1) {
      return [TL, { x: BR.x, y: TL.y }, BR, BL];
    } else {
      return [TL, TR, BR, { x: TL.x, y: BR.y }];
    }
  }

  function squareConstraint(points, draggedIdx, newPos) {
    // [v0, v1, v2, v3] CCW 90°间隔. 中心+半径固定, 旋转由被拖顶点决定.
    const C = {
      x: (points[0].x + points[1].x + points[2].x + points[3].x) / 4,
      y: (points[0].y + points[1].y + points[2].y + points[3].y) / 4,
    };
    const R = G.dist(points[0], C);
    const offs = [0, Math.PI / 2, Math.PI, -Math.PI / 2];
    const oldAng = Math.atan2(points[draggedIdx].y - C.y, points[draggedIdx].x - C.x);
    const oldTheta = oldAng - offs[draggedIdx];
    const newAng = Math.atan2(newPos.y - C.y, newPos.x - C.x);
    const newTheta = newAng - offs[draggedIdx];
    return offs.map(off => ({
      x: C.x + R * Math.cos(newTheta + off),
      y: C.y + R * Math.sin(newTheta + off),
    }));
  }

  function parallelogramConstraint(points, draggedIdx, newPos) {
    // [c1, c2, c3, c4] CCW. 自由: c1, vec1, vec2
    const [c1, c2, c3, c4] = points;
    const v1 = G.sub(c2, c1);
    const v2 = G.sub(c4, c1);
    if (draggedIdx === 0) {
      return [newPos, G.add(newPos, v1), G.add(newPos, G.add(v1, v2)), G.add(newPos, v2)];
    } else if (draggedIdx === 1) {
      const nv1 = G.sub(newPos, c1);
      return [c1, newPos, G.add(newPos, v2), c4];
    } else if (draggedIdx === 2) {
      const totalMag = G.len(G.add(v1, v2));
      const newMag = G.dist(newPos, c1);
      const scale = totalMag > 1e-9 ? newMag / totalMag : 1;
      const nv1 = G.mul(v1, scale);
      const nv2 = G.mul(v2, scale);
      return [c1, G.add(c1, nv1), G.add(c1, G.add(nv1, nv2)), G.add(c1, nv2)];
    } else {
      const nv2 = G.sub(newPos, c1);
      return [c1, c2, G.add(c2, nv2), newPos];
    }
  }

  function rhombusConstraint(points, draggedIdx, newPos) {
    // [c1, c2, c3, c4] CCW. |vec1| = |vec2| (菱形边等长)
    const [c1, c2, c3, c4] = points;
    const v1 = G.sub(c2, c1);
    const v2 = G.sub(c4, c1);
    const L = G.len(v1);  // 边长 (=|v2|)
    if (draggedIdx === 0) {
      return [newPos, G.add(newPos, v1), G.add(newPos, G.add(v1, v2)), G.add(newPos, v2)];
    } else if (draggedIdx === 1) {
      // 拖 c2: 保持 c1, c4. vec1 新方向, 长度保持 L
      const dir = G.norm(G.sub(newPos, c1));
      const nv1 = G.mul(dir, L);
      const c2n = G.add(c1, nv1);
      return [c1, c2n, G.add(c2n, v2), c4];
    } else if (draggedIdx === 2) {
      // 拖 c3 (对角 c1): 保持 c1, c2. vec2 新方向, 长度 L
      const dir = G.norm(G.sub(newPos, c2));
      const nv2 = G.mul(dir, L);
      const c4n = G.sub(newPos, v1);
      return [c1, c2, newPos, c4n];
    } else {
      const dir = G.norm(G.sub(newPos, c1));
      const nv2 = G.mul(dir, L);
      const c4n = G.add(c1, nv2);
      return [c1, c2, G.add(c2, nv2), c4n];
    }
  }

  function applyConstraint(poly, draggedIdx, newPos) {
    const points = poly.points.map(id => {
      const p = findPoint(id);
      return p ? { x: p.x, y: p.y } : null;
    });
    if (points.some(p => !p)) return false;
    let newPoints;
    switch (poly.constraint) {
      case 'iso-tri':       newPoints = isoTriConstraint(points, draggedIdx, newPos); break;
      case 'equilateral':   newPoints = equilateralConstraint(points, draggedIdx, newPos); break;
      case 'parallelogram': newPoints = parallelogramConstraint(points, draggedIdx, newPos); break;
      case 'rectangle':     newPoints = rectangleConstraint(points, draggedIdx, newPos); break;
      case 'rhombus':       newPoints = rhombusConstraint(points, draggedIdx, newPos); break;
      case 'square':        newPoints = squareConstraint(points, draggedIdx, newPos); break;
      default: return false;
    }
    if (!newPoints) return false;
    poly.points.forEach((id, i) => {
      const p = findPoint(id);
      if (p && newPoints[i]) { p.x = newPoints[i].x; p.y = newPoints[i].y; }
    });
    return true;
  }

  function executeConstruction(id, picked) {
    const ref = picked.map(p => p.id);
    if (id === 'midpoint') {
      const a = pointAt(ref[0]), b = pointAt(ref[1]);
      pushHistory();
      createPoint(G.midpoint(a, b).x, G.midpoint(a, b).y);
    } else if (id === 'bisect') {
      const v = pointAt(ref[0]), p1 = pointAt(ref[1]), p2 = pointAt(ref[2]);
      const dir = G.bisectorDir(v, p1, p2);
      if (G.len(dir) < 1e-9) { toast('无法构造角平分线'); return; }
      const far = G.add(v, G.mul(dir, 200));
      pushHistory();
      const farPoint = createPoint(far.x, far.y);
      addEl({ id: newId(), t: 'r', a: ref[0], b: farPoint.id, derived: true, dashed: true });
    } else if (id === 'perpendicular') {
      const line = picked[0], pt = picked[1];
      const a = pointAt(line.a), b = pointAt(line.b);
      const P = pointAt(pt.id);
      const d = G.norm(G.sub(b, a));
      const Pfoot = G.closestOnLine(P, a, b);
      const na = G.add(Pfoot, G.mul(G.perp(d), 100));
      const nb = G.add(Pfoot, G.mul(G.perp(d), -100));
      pushHistory();
      const p1 = createPoint(na.x, na.y);
      const p2 = createPoint(nb.x, nb.y);
      addEl({ id: newId(), t: 'l', a: p1.id, b: p2.id, derived: true, dashed: true });
    } else if (id === 'parallel') {
      const line = picked[0], pt = picked[1];
      const a = pointAt(line.a), b = pointAt(line.b);
      const P = pointAt(pt.id);
      const d = G.norm(G.sub(b, a));
      const na = G.add(P, G.mul(d, 100));
      const nb = G.sub(P, G.mul(d, 100));
      pushHistory();
      const p1 = createPoint(na.x, na.y);
      const p2 = createPoint(nb.x, nb.y);
      addEl({ id: newId(), t: 'l', a: p1.id, b: p2.id, derived: true, dashed: true });
    } else if (id === 'perpbisect') {
      const a = pointAt(ref[0]), b = pointAt(ref[1]);
      const m = G.midpoint(a, b);
      const d = G.norm(G.sub(b, a));
      const p1 = G.add(m, G.mul(G.perp(d), 100));
      const p2 = G.add(m, G.mul(G.perp(d), -100));
      pushHistory();
      const pa = createPoint(p1.x, p1.y);
      const pb = createPoint(p2.x, p2.y);
      createPoint(m.x, m.y);
      addEl({ id: newId(), t: 'l', a: pa.id, b: pb.id, derived: true, dashed: true });
    } else if (id === 'intersection') {
      const pts = computeIntersection(picked[0], picked[1]);
      if (pts.length === 0) { toast('无交点'); return; }
      pushHistory();
      pts.forEach(p => createPoint(p.x, p.y));
    } else if (id === 'divide') {
      const a = pointAt(ref[0]), b = pointAt(ref[1]);
      openDivideModal(a, b);
    } else if (id === 'tri-altitude') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const verts = [A, B, C];
      const opps = [[B, C], [C, A], [A, B]];
      pushHistory();
      for (let i = 0; i < 3; i++) {
        const V = verts[i], P = opps[i][0], Q = opps[i][1];
        const foot = G.closestOnLine(V, P, Q);
        const d = G.sub(Q, P);
        const t = G.dot(G.sub(foot, P), d) / G.dot(d, d);
        const tt = Math.max(0, Math.min(1, t));
        const F = G.add(P, G.mul(d, tt));
        const fId = createPoint(F.x, F.y);
        addEl({ id: newId(), t: 's', a: ref[i], b: fId.id, derived: true, dashed: true });
      }
    } else if (id === 'tri-median') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const opps = [[B, C], [C, A], [A, B]];
      pushHistory();
      for (let i = 0; i < 3; i++) {
        const m = G.midpoint(opps[i][0], opps[i][1]);
        const mId = createPoint(m.x, m.y);
        addEl({ id: newId(), t: 's', a: ref[i], b: mId.id, derived: true, dashed: true });
      }
    } else if (id === 'tri-bisector') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const verts = [A, B, C];
      const opps = [[B, C], [C, A], [A, B]];
      pushHistory();
      for (let i = 0; i < 3; i++) {
        const V = verts[i], P = opps[i][0], Q = opps[i][1];
        const dir = G.bisectorDir(V, P, Q);
        if (G.len(dir) < 1e-9) continue;
        const int = G.lineLineIntersect(V, G.add(V, dir), P, Q);
        if (!int) continue;
        const fId = createPoint(int.x, int.y);
        addEl({ id: newId(), t: 's', a: ref[i], b: fId.id, derived: true, dashed: true });
      }
    } else if (id === 'tri-midsegment') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const mBC = G.midpoint(B, C), mCA = G.midpoint(C, A), mAB = G.midpoint(A, B);
      pushHistory();
      const p1 = createPoint(mBC.x, mBC.y);
      const p2 = createPoint(mCA.x, mCA.y);
      const p3 = createPoint(mAB.x, mAB.y);
      addEl({ id: newId(), t: 's', a: p1.id, b: p2.id, derived: true, dashed: true });
      addEl({ id: newId(), t: 's', a: p2.id, b: p3.id, derived: true, dashed: true });
      addEl({ id: newId(), t: 's', a: p3.id, b: p1.id, derived: true, dashed: true });
    } else if (id === 'tri-circumcircle') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const O = G.circumcenter(A, B, C);
      if (!O) { toast('三点共线'); return; }
      pushHistory();
      const oId = createPoint(O.x, O.y);
      const rId = createPoint(A.x, A.y);
      addEl({ id: newId(), t: 'c', center: oId.id, radius: rId.id, derived: true, dashed: true });
    } else if (id === 'tri-incircle') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const I = G.incenter(A, B, C);
      if (!I) { toast('无法构造'); return; }
      const a = G.dist(B, C), b = G.dist(A, C), c = G.dist(A, B);
      const s = (a + b + c) / 2;
      const area = G.triangleArea(A, B, C);
      const r = s > 0 ? area / s : 0;
      const dir = G.norm(G.sub(B, A));
      const onC = G.add(I, G.mul(G.perp(dir), r));
      pushHistory();
      const iId = createPoint(I.x, I.y);
      const rId = createPoint(onC.x, onC.y);
      addEl({ id: newId(), t: 'c', center: iId.id, radius: rId.id, derived: true, dashed: true });
    } else if (id === 'tri-centroid') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const Cp = G.centroid(A, B, C);
      pushHistory();
      createPoint(Cp.x, Cp.y);
    } else if (id === 'tri-orthocenter') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const H = G.orthocenter(A, B, C);
      if (!H) { toast('三点共线'); return; }
      pushHistory();
      createPoint(H.x, H.y);
    } else if (id === 'tri-circumcenter') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const O = G.circumcenter(A, B, C);
      if (!O) { toast('三点共线'); return; }
      pushHistory();
      createPoint(O.x, O.y);
    } else if (id === 'tri-incenter') {
      const A = pointAt(ref[0]), B = pointAt(ref[1]), C = pointAt(ref[2]);
      const I = G.incenter(A, B, C);
      if (!I) return;
      pushHistory();
      createPoint(I.x, I.y);
    } else if (id === 'measure-length') {
      const a = pointAt(ref[0]), b = pointAt(ref[1]);
      pushHistory();
      addEl({ id: newId(), t: 'm', a: ref[0], b: ref[1] });
    } else if (id === 'measure-angle') {
      // ref[0] = p1, ref[1] = vertex, ref[2] = p2 (与角度标工具一致)
      const p1 = pointAt(ref[0]), v = pointAt(ref[1]), p2 = pointAt(ref[2]);
      if (ref[0] === ref[1] || ref[1] === ref[2] || ref[0] === ref[2]) { toast('三个点必须不同'); return; }
      const cross = (p1.x - v.x) * (p2.y - v.y) - (p1.y - v.y) * (p2.x - v.x);
      if (Math.abs(cross) < 1e-9) { toast('三点共线, 无法构造角'); return; }
      pushHistory();
      addEl({ id: newId(), t: 'a', vertex: ref[1], p1: ref[0], p2: ref[2] });
    }
    render();
  }

  function computeIntersection(e1, e2) {
    const e1Line = isLineLike(e1);
    const e2Line = isLineLike(e2);
    if (e1Line && e2Line) {
      const a1 = pointAt(e1.a), b1 = pointAt(e1.b);
      const a2 = pointAt(e2.a), b2 = pointAt(e2.b);
      const p = G.lineLineIntersect(a1, b1, a2, b2);
      return p ? [p] : [];
    }
    if ((e1Line && e2.t === 'c') || (e2Line && e1.t === 'c')) {
      const line = e1Line ? e1 : e2;
      const circ = e1Line ? e2 : e1;
      const a = pointAt(line.a), b = pointAt(line.b);
      const O = pointAt(circ.center);
      const r = G.dist(pointAt(circ.center), pointAt(circ.radius));
      return G.lineCircleIntersect(a, b, O, r);
    }
    if (e1.t === 'c' && e2.t === 'c') {
      const O1 = pointAt(e1.center), r1 = G.dist(pointAt(e1.center), pointAt(e1.radius));
      const O2 = pointAt(e2.center), r2 = G.dist(pointAt(e2.center), pointAt(e2.radius));
      return G.circleCircleIntersect(O1, r1, O2, r2);
    }
    return [];
  }

  function exportPng() {
    const rect = getRect();
    const clone = svg.cloneNode(true);
    clone.querySelectorAll('.selected-outline').forEach(n => n.remove());
    clone.setAttribute('xmlns', SVG_NS);
    const xml = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([xml], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      c.width = rect.width; c.height = rect.height;
      c.getContext('2d').drawImage(img, 0, 0);
      c.toBlob(b => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(b);
        a.download = 'geometry-' + Date.now() + '.png';
        a.click();
        setTimeout(() => URL.revokeObjectURL(a.href), 1000);
      }, 'image/png');
      URL.revokeObjectURL(url);
      toast('已导出 PNG');
    };
    img.onerror = () => { URL.revokeObjectURL(url); toast('导出失败'); };
    img.src = url;
  }

  // ==================== 键盘 ====================
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    const k = e.key;
    const ctrl = e.ctrlKey || e.metaKey;
    if (ctrl && k === 'z' && !e.shiftKey) { e.preventDefault(); undo(); return; }
    if (ctrl && (k === 'y' || (k === 'z' && e.shiftKey))) { e.preventDefault(); redo(); return; }
    if (k === 'Delete' || k === 'Backspace') {
      if (state.selection.size > 0) {
        pushHistory();
        [...state.selection].forEach(deleteEl);
        render();
        e.preventDefault();
      }
      return;
    }
    if (k === 'Escape') {
      state.pendingVertex = null;
      state.pendingCircleCenter = null;
      state.pendingPoly = [];
      state.toolPicked = [];
      state.shapeDrag = null;
      clearPreview();
      activateTool('select');
      render();
      return;
    }
    if (k === 'Enter' && state.currentTool === 'polygon' && state.pendingPoly.length >= 3) {
      finishPolygon();
      return;
    }
    // Enter 完成预设形状拖拽 (使用默认尺寸)
    if (k === 'Enter' && state.shapeDrag) {
      finalizeShapeDrag();
      return;
    }
    if (k === 'g' || k === 'G') { toggleGrid(); return; }
    if (k === 'v' || k === 'V') activateTool('select');
    else if (k === 'h' || k === 'H') activateTool('pan');
    else if (k === 'p' || k === 'P') activateTool('point');
    else if (k === 'l' || k === 'L') activateTool('segment');
    else if (k === 'r' || k === 'R') activateTool('ray');
    else if (k === 't' || k === 'T') activateTool('line');
    else if (k === 'c' || k === 'C') activateTool('circle');
    else if (k === 'a' || k === 'A') activateTool('angle');
    else if (k === 'x' || k === 'X') activateTool('text');
    else if (k === 'd' || k === 'D') activateTool('delete');
  });

  async function aiSend() {
    const input = document.getElementById('ai-input');
    const problem = input.value.trim();
    if (!problem) return;
    const token = localStorage.getItem('userToken') || (document.cookie.match(/(?:^|; )userToken=([^;]+)/) || [])[1];
    if (!token) {
      aiAppendError('请先登录后再使用模型解题');
      return;
    }

    const includeBoard = document.getElementById('ai-include-board').checked;

    aiAppendMsg('user', problem);
    input.value = '';
    input.disabled = true;
    document.getElementById('ai-send').hidden = true;
    document.getElementById('ai-stop').hidden = false;
    document.getElementById('ai-status').textContent = '调用中…';
    aiShowThinking();

    aiRecvText = '';
    aiRecvToolCalls = [];
    aiRecvMsgEl = null;
    aiRecvUsage = null;

    // 完整对话 (含 tool messages) 用于多轮调用
    const conversationMessages = [...aiMessages, { role: 'user', content: problem }];
    let iterText = '';
    let totalUsage = null;
    const MAX_ITER = 8; // 最多 8 轮 tool calling
    let lastError = null;
    let finalData = null;
    let didCall = false; // 是否至少成功调用了一次 (拿到响应)

    for (let iter = 0; iter < MAX_ITER; iter++) {
      // 每次重序列化画板 (label→id 转换由 aiApplyToolCall 内部做)
      const boardState = includeBoard ? serializeCompact() : null;

      let resp, data;
      try {
        if (iter === 0) aiAbortCtrl = new AbortController();
        const status = document.getElementById('ai-status');
        status.textContent = iter === 0 ? '调用中…' : `第 ${iter + 1} 轮…`;
        resp = await fetch(`${AI_API_BASE}/api/geometry/solve`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
          body: JSON.stringify({
            problem, model: aiCurrentModel,
            messages: conversationMessages, boardState
          }),
          signal: aiAbortCtrl.signal
        });
      } catch (e) {
        lastError = '请求失败: ' + e.message;
        break;
      }

      if (!resp.ok) {
        let msg = `HTTP ${resp.status}`;
        try {
          const j = await resp.json();
          if (j.message) msg = j.message;
        } catch {}
        lastError = msg;
        break;
      }

      try {
        data = await resp.json();
      } catch (e) {
        lastError = '解析响应失败: ' + e.message;
        break;
      }

      if (!data.success) {
        lastError = data.message || '请求失败';
        break;
      }

      didCall = true;

      // reasoning → thinking 元素
      if (data.reasoning) {
        aiHandleEvent({ type: 'reasoning', text: data.reasoning });
      }

      // 收集 tool_calls 文本 (累积展示)
      const tcs = data.tool_calls || [];
      const toolResultMessages = [];

      for (const tc of tcs) {
        // 应用到画板, 收集结果文本
        const resultText = aiApplyToolCallWithResult(tc.name, tc.args || {});
        aiHandleEvent({ type: 'tool_call', id: tc.id, name: tc.name, args: tc.args || {} });
        toolResultMessages.push({
          role: 'tool',
          tool_call_id: tc.id,
          content: resultText
        });
      }

      if (data.text) {
        iterText += (iterText ? '\n\n' : '') + data.text;
      }

      // 累计 usage
      if (data.usage) {
        if (!totalUsage) {
          totalUsage = { ...data.usage };
        } else {
          totalUsage.input_tokens = (totalUsage.input_tokens || 0) + (data.usage.input_tokens || 0);
          totalUsage.output_tokens = (totalUsage.output_tokens || 0) + (data.usage.output_tokens || 0);
          totalUsage.credits_used = (totalUsage.credits_used || 0) + (data.usage.credits_used || 0);
        }
      }

      // 没有 tool_calls → 模型已给出最终回复, 跳出
      if (tcs.length === 0) {
        // 即使没 tool_calls, 也把 assistant 消息加入 conversation (供多轮)
        conversationMessages.push({
          role: 'assistant',
          content: data.text || null
        });
        finalData = data;
        break;
      }

      // 把这一轮 assistant 消息 + tool 结果加入 conversation, 继续下一轮
      conversationMessages.push({
        role: 'assistant',
        content: data.text || null,
        tool_calls: tcs.map(tc => ({
          id: tc.id,
          type: 'function',
          function: { name: tc.name, arguments: JSON.stringify(tc.args || {}) }
        }))
      });
      conversationMessages.push(...toolResultMessages);
    }

    // 出错
    if (lastError) {
      aiRecvMsgEl && aiRecvMsgEl.remove();
      aiAppendError(lastError);
      aiCleanup();
      return;
    }
    if (!didCall) {
      // 没有跑任何一次调用
      aiRecvMsgEl && aiRecvMsgEl.remove();
      aiAppendError('未收到模型响应');
      aiCleanup();
      return;
    }

    // 写入 aiMessages (持久化, 供后续多轮)
    aiMessages = conversationMessages;

    // 把最终文本喂给 UI
    if (iterText) {
      aiHandleEvent({ type: 'text', text: iterText });
    }
    if (totalUsage) {
      aiHandleEvent({
        type: 'usage',
        ...totalUsage,
        tool_calls: aiRecvToolCalls.length
      });
    }

    aiFinalize();
  }

  // 应用 tool_call 并返回文本描述 (供 role: 'tool' 消息发回模型)
  function aiApplyToolCallWithResult(name, args) {
    try {
      const result = aiApplyToolCall(name, args);
      // 优先用工具返回值, 否则给个通用描述
      if (typeof result === 'string' && result) return result;
      return aiDescribeToolCall(name, args);
    } catch (e) {
      return `失败: ${e.message}`;
    }
  }
  function aiDescribeToolCall(name, args) {
    switch (name) {
      case 'add_point': return `已创建点 ${args.label || '?'} (${args.x}, ${args.y})`;
      case 'add_segment': return `已创建线段 ${args.p1}-${args.p2}`;
      case 'add_ray': return `已创建射线 ${args.p1}→${args.p2}`;
      case 'add_line': return `已创建直线 ${args.p1}-${args.p2}`;
      case 'add_circle': return `已创建圆 圆心=${args.center} 半径点=${args.radius}`;
      case 'add_polygon': return `已创建多边形 (${(args.points || []).join('-')})`;
      case 'add_angle': return `已创建角度 ∠${args.vertex}${args.p1}${args.p2}`;
      case 'add_text': return `已添加文本 "${args.text}" @(${args.x}, ${args.y})`;
      case 'measure_length': return `已测长度 |${args.p1}${args.p2}|`;
      case 'measure_angle': return `已测角度 ∠${args.vertex}${args.p1}${args.p2}`;
      case 'construct_midpoint': return `已构造中点`;
      case 'construct_perpbisect': return `已构造垂直平分线`;
      case 'construct_bisect': return `已构造角平分线`;
      case 'construct_perpendicular': return `已构造垂线`;
      case 'construct_parallel': return `已构造平行线`;
      case 'construct_intersection': return `已构造交点`;
      case 'delete': return `已删除点 ${args.label}`;
      case 'clear_board': return `已清空画板`;
      case 'finish': return '已完成';
      default: return `已执行 ${name}`;
    }
  }

  function aiCleanup() {
    aiAbortCtrl = null;
    document.getElementById('ai-input').disabled = false;
    document.getElementById('ai-send').hidden = false;
    document.getElementById('ai-stop').hidden = true;
    document.getElementById('ai-status').textContent = '';
    aiRecvMsgEl = null;
    aiThinkingEl = null;
  }

  function aiFinalize() {
    if (aiThinkingEl && aiThinkingEl.parentNode) aiThinkingEl.remove();
    let finalEl = aiRecvMsgEl;
    if (!finalEl && (aiRecvText || aiRecvToolCalls.length)) {
      finalEl = aiRecvText
        ? aiAppendMsg('assistant', aiRecvText)
        : aiAppendMsg('assistant', '');
    }
    if (finalEl) {
      if (aiRecvToolCalls.length) aiAppendToolList(finalEl, aiRecvToolCalls);
      if (aiRecvUsage) {
        const u = document.createElement('div');
        u.className = 'usage';
        u.textContent = `${aiRecvUsage.model} · ${aiRecvUsage.credits_used ?? '?'} credits · ${aiRecvUsage.tool_calls ?? aiRecvToolCalls.length} tools`;
        finalEl.appendChild(u);
      }
    }
    if (finalEl || aiRecvToolCalls.length) {
      aiMessages.push({
        role: 'assistant',
        content: aiRecvText || (aiRecvToolCalls.length ? '(执行了 ' + aiRecvToolCalls.length + ' 个工具)' : '(无回复)'),
        tool_calls: aiRecvToolCalls.length ? aiRecvToolCalls : undefined
      });
    } else {
      aiAppendError('模型未返回任何内容 (可能不支持 tool_calling, 请换模型)');
    }
    aiCleanup();
  }

  function aiHandleEvent(evt) {
    if (window.GEOMETRY_DEBUG) console.log('[geo] evt:', evt.type, JSON.stringify(evt).slice(0, 80));
    if (evt.type === 'text') {
      aiRecvText += evt.text;
      if (aiRecvMsgEl) {
        const t = aiRecvMsgEl.querySelector('.text');
        if (t) t.textContent = aiRecvText;
        const box = document.getElementById('ai-messages');
        box.scrollTop = box.scrollHeight;
      } else {
        // 第一条 text 时: 把 thinking 折叠进 details, 然后创建 assistant div
        if (aiThinkingEl) {
          const thinkingText = aiThinkingEl.querySelector('.text').textContent;
          aiThinkingEl.remove();
          aiThinkingEl = null;
          // 手动创建 div (不要用 aiAppendMsg, 避免重复 .text)
          const box = document.getElementById('ai-messages');
          const div = document.createElement('div');
          div.className = 'ai-msg assistant';
          const r = document.createElement('div');
          r.className = 'role';
          r.textContent = 'AI';
          div.appendChild(r);
          if (thinkingText && thinkingText !== '●' && !/^[●\s.]+$/.test(thinkingText)) {
            const det = document.createElement('details');
            det.className = 'reasoning';
            const sum = document.createElement('summary');
            sum.textContent = '💭 思考过程';
            det.appendChild(sum);
            const pre = document.createElement('pre');
            pre.textContent = thinkingText;
            det.appendChild(pre);
            div.appendChild(det);
          }
          const t = document.createElement('div');
          t.className = 'text';
          t.textContent = aiRecvText;
          div.appendChild(t);
          box.appendChild(div);
          box.scrollTop = box.scrollHeight;
          aiRecvMsgEl = div;
        } else {
          aiRecvMsgEl = aiAppendMsg('assistant', aiRecvText);
        }
      }
    } else if (evt.type === 'reasoning') {
      // 推理内容: 显示在 thinking 元素内 (替换初始 dots)
      if (aiThinkingEl) {
        const t = aiThinkingEl.querySelector('.text');
        if (t.dataset.gotReal === undefined) {
          // 第一次: 清掉 dots, 替换为真实推理
          t.textContent = evt.text;
          t.dataset.gotReal = '1';
        } else {
          t.textContent += evt.text;
        }
        const box = document.getElementById('ai-messages');
        box.scrollTop = box.scrollHeight;
      }
    } else if (evt.type === 'tool_call') {
      // 注意: tool 已在调用方 aiApplyToolCallWithResult 中执行过, 这里只更新 UI
      aiRecvToolCalls.push({ id: evt.id, name: evt.name, args: evt.args });
      if (aiRecvMsgEl) {
        let list = aiRecvMsgEl.querySelector('.tool-list');
        if (!list) {
          list = document.createElement('div');
          list.className = 'tool-list';
          aiRecvMsgEl.appendChild(list);
        }
        const tag = document.createElement('span');
        tag.textContent = evt.name;
        list.appendChild(tag);
      }
    } else if (evt.type === 'usage') {
      aiRecvUsage = evt;
      document.getElementById('ai-status').textContent =
        evt.credits_used != null ? `${evt.model} · ${evt.credits_used} credits` : evt.model;
    } else if (evt.type === 'error') {
      aiAppendError(evt.message);
    } else if (evt.type === 'done') {
      // 留到 aiSend 末尾统一处理
    }
  }

  // ==================== 工具: 标签 <-> 元素 ====================
  // 前端内部用 id, 模型用 label; 转换层在 aiApplyToolCall 里
  function aiFindPointByLabel(label) {
    if (!label) return null;
    return state.elements.find(e => e.t === 'p' && (e.label || aiAutoLabelOf(e)) === label);
  }
  function aiAutoLabelOf(p) {
    // 与 addPoint 相同的标签生成规则 (字母 A, B, C...; AA, AB... after Z)
    const n = state.nextLabelIdx;
    return aiIndexToLabel(n);
  }
  function aiIndexToLabel(n) {
    if (n < 26) return String.fromCharCode(65 + n);
    // 简单双字母
    return String.fromCharCode(65 + Math.floor(n / 26) - 1) + String.fromCharCode(65 + n % 26);
  }
  function aiNextLabel() {
    const used = new Set();
    for (const el of state.elements) {
      if (el.t === 'p' && el.label) used.add(el.label);
    }
    let n = state.nextLabelIdx;
    while (used.has(aiIndexToLabel(n))) n++;
    return aiIndexToLabel(n);
  }
  function aiAllocateLabel(desired) {
    // desired: 模型想用的标签. 若空, 用 nextLabelIdx; 若冲突, 后缀数字.
    if (!desired) return aiNextLabel();
    const used = new Set();
    for (const el of state.elements) {
      if (el.t === 'p' && el.label) used.add(el.label);
    }
    if (!used.has(desired)) return desired;
    // 冲突: 加数字后缀
    let i = 2;
    while (used.has(desired + i)) i++;
    return desired + i;
  }
  function aiFindLineByLabels(p1L, p2L) {
    if (!p1L || !p2L) return null;
    for (const el of state.elements) {
      if (el.t !== 's' && el.t !== 'r' && el.t !== 'l') continue;
      const aL = aiGetPointLabel(el.a);
      const bL = aiGetPointLabel(el.b);
      if ((aL === p1L && bL === p2L) || (aL === p2L && bL === p1L)) return el;
    }
    return null;
  }
  function aiGetPointLabel(id) {
    const p = state.elements.find(e => e.id === id);
    return p ? p.label : null;
  }

  // ==================== 工具: 应用 tool_call ====================
  function aiApplyToolCall(name, args) {
    pushHistory();
    switch (name) {
      case 'add_point': return aiTcAddPoint(args);
      case 'add_segment': return aiTcAddSegment(args);
      case 'add_ray': return aiTcAddRay(args);
      case 'add_line': return aiTcAddLine(args);
      case 'add_circle': return aiTcAddCircle(args);
      case 'add_polygon': return aiTcAddPolygon(args);
      case 'add_angle': return aiTcAddAngle(args);
      case 'add_text': return aiTcAddText(args);
      case 'measure_length': return aiTcMeasureLength(args);
      case 'measure_angle': return aiTcMeasureAngle(args);
      case 'construct_midpoint': return aiTcMidpoint(args);
      case 'construct_perpbisect': return aiTcPerpbisect(args);
      case 'construct_bisect': return aiTcBisect(args);
      case 'construct_perpendicular': return aiTcPerpendicular(args);
      case 'construct_parallel': return aiTcParallel(args);
      case 'construct_intersection': return aiTcIntersection(args);
      case 'delete': return aiTcDelete(args);
      case 'clear_board': return aiTcClearBoard();
      case 'finish': return; // 收尾由 aiSend 末尾处理
      default: throw new Error('未知工具: ' + name);
    }
  }
  function aiTcAddPoint(args) {
    if (typeof args.x !== 'number' || typeof args.y !== 'number') throw new Error('需要 x, y');
    const lbl = aiAllocateLabel(args.label);
    const id = ++state.nextId;
    const p = { id, t: 'p', x: args.x, y: args.y, label: lbl };
    state.elements.push(p);
    if (lbl === aiIndexToLabel(state.nextLabelIdx)) {
      // 用掉了 nextLabelIdx, 推进
      state.nextLabelIdx++;
    }
    render();
    return lbl;
  }
  function aiTcAddSegment(args) { return aiTcAddLineLike(args, 's'); }
  function aiTcAddRay(args) { return aiTcAddLineLike(args, 'r'); }
  function aiTcAddLine(args) { return aiTcAddLineLike(args, 'l'); }
  function aiTcAddLineLike(args, t) {
    const a = aiFindPointByLabel(args.p1);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !b) throw new Error(`找不到点 ${args.p1} 或 ${args.p2}`);
    // 避免重复
    for (const el of state.elements) {
      if (el.t !== t) continue;
      if ((el.a === a.id && el.b === b.id) || (el.a === b.id && el.b === a.id)) {
        return; // 重复
      }
    }
    const id = ++state.nextId;
    state.elements.push({ id, t, a: a.id, b: b.id, dashed: !!args.dashed });
    render();
  }
  function aiTcAddCircle(args) {
    const c = aiFindPointByLabel(args.center);
    const r = aiFindPointByLabel(args.radius);
    if (!c || !r) throw new Error('找不到圆心或半径点');
    const id = ++state.nextId;
    state.elements.push({ id, t: 'c', center: c.id, radius: r.id, dashed: !!args.dashed });
    render();
  }
  function aiTcAddPolygon(args) {
    if (!Array.isArray(args.points) || args.points.length < 3) throw new Error('points 至少 3 个');
    const pts = args.points.map(l => aiFindPointByLabel(l)).filter(Boolean);
    if (pts.length < 3) throw new Error('至少 3 个点存在');
    const id = ++state.nextId;
    const el = { id, t: 'g', points: pts.map(p => p.id) };
    if (args.constraint) el.constraint = args.constraint;
    state.elements.push(el);
    render();
  }
  function aiTcAddAngle(args) {
    const a = aiFindPointByLabel(args.p1);
    const v = aiFindPointByLabel(args.vertex);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !v || !b) throw new Error('角度需要 3 个点');
    const id = ++state.nextId;
    state.elements.push({ id, t: 'a', vertex: v.id, p1: a.id, p2: b.id });
    render();
  }
  function aiTcAddText(args) {
    if (typeof args.x !== 'number' || typeof args.y !== 'number' || !args.text) throw new Error('需要 x, y, text');
    const id = ++state.nextId;
    const el = { id, t: 'x', x: args.x, y: args.y, text: String(args.text) };
    if (args.anchor) {
      const p = aiFindPointByLabel(args.anchor);
      if (p) el.anchor = p.id;
    }
    state.elements.push(el);
    render();
  }
  function aiTcMeasureLength(args) {
    const a = aiFindPointByLabel(args.p1);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !b) throw new Error('找不到测度点');
    const id = ++state.nextId;
    state.elements.push({ id, t: 'm', a: a.id, b: b.id });
    render();
  }
  function aiTcMeasureAngle(args) {
    const a = aiFindPointByLabel(args.p1);
    const v = aiFindPointByLabel(args.vertex);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !v || !b) throw new Error('角度测度需要 3 个点');
    const id = ++state.nextId;
    state.elements.push({ id, t: 'a', vertex: v.id, p1: a.id, p2: b.id });
    render();
  }
  function aiTcMidpoint(args) {
    const a = aiFindPointByLabel(args.p1);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !b) throw new Error('找不到点');
    const mid = G.midpoint(a, b);
    const lbl = aiAllocateLabel(args.label);
    const id = ++state.nextId;
    state.elements.push({ id, t: 'p', x: mid.x, y: mid.y, label: lbl, derived: true });
    if (lbl === aiIndexToLabel(state.nextLabelIdx)) state.nextLabelIdx++;
    render();
    return lbl;
  }
  function aiTcPerpbisect(args) {
    const a = aiFindPointByLabel(args.p1);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !b) throw new Error('找不到点');
    // 找或建 p1-p2 线段
    let seg = state.elements.find(el => el.t === 's' &&
      ((el.a === a.id && el.b === b.id) || (el.a === b.id && el.b === a.id)));
    if (!seg) {
      const sid = ++state.nextId;
      seg = { id: sid, t: 's', a: a.id, b: b.id, dashed: true, derived: true };
      state.elements.push(seg);
    }
    // 中点 (作为 vertex), 沿垂线方向两点
    const mid = G.midpoint(a, b);
    const dir = G.sub(b, a);
    const perp = { x: -dir.y, y: dir.x };
    const len = G.len(dir);
    if (len < 1e-9) throw new Error('两点重合');
    const u = { x: perp.x / len, y: perp.y / len };
    const p1 = { x: mid.x + u.x * 10, y: mid.y + u.y * 10 };
    const p2 = { x: mid.x - u.x * 10, y: mid.y - u.y * 10 };
    const vp1Id = ++state.nextId, vp2Id = ++state.nextId;
    state.elements.push({ id: vp1Id, t: 'p', x: p1.x, y: p1.y, derived: true });
    state.elements.push({ id: vp2Id, t: 'p', x: p2.x, y: p2.y, derived: true });
    const lid = ++state.nextId;
    state.elements.push({ id: lid, t: 'l', a: vp1Id, b: vp2Id, dashed: true, derived: true });
    render();
  }
  function aiTcBisect(args) {
    const a = aiFindPointByLabel(args.p1);
    const v = aiFindPointByLabel(args.vertex);
    const b = aiFindPointByLabel(args.p2);
    if (!a || !v || !b) throw new Error('角平分线需要 3 个点');
    const dir1 = G.sub(a, v);
    const dir2 = G.sub(b, v);
    const u1 = G.norm(dir1);
    const u2 = G.norm(dir2);
    if (!u1 || !u2) throw new Error('顶点重合');
    const bisDir = { x: u1.x + u2.x, y: u1.y + u2.y };
    if (G.len(bisDir) < 1e-9) throw new Error('两方向相反, 角平分线未定义');
    const u = G.norm(bisDir);
    const p1 = { x: v.x + u.x * 10, y: v.y + u.y * 10 };
    const pid = ++state.nextId;
    state.elements.push({ id: pid, t: 'p', x: p1.x, y: p1.y, derived: true });
    const rid = ++state.nextId;
    state.elements.push({ id: rid, t: 'r', a: v.id, b: pid, dashed: true, derived: true });
    render();
  }
  function aiTcPerpendicular(args) {
    return aiTcPerpOrPara(args, true);
  }
  function aiTcParallel(args) {
    return aiTcPerpOrPara(args, false);
  }
  function aiTcPerpOrPara(args, isPerp) {
    const line = args.line;
    if (!line || !line.p1 || !line.p2) throw new Error('line 需要 p1, p2');
    const la = aiFindPointByLabel(line.p1);
    const lb = aiFindPointByLabel(line.p2);
    const pt = aiFindPointByLabel(args.point);
    if (!la || !lb || !pt) throw new Error('点不存在');
    const dir = G.sub(lb, la);
    const u = isPerp ? { x: -dir.y, y: dir.x } : dir;
    const len = G.len(dir) || 1;
    const norm = { x: u.x / len, y: u.y / len };
    const p1 = { x: pt.x + norm.x * 10, y: pt.y + norm.y * 10 };
    const p2 = { x: pt.x - norm.x * 10, y: pt.y - norm.y * 10 };
    const pid1 = ++state.nextId, pid2 = ++state.nextId;
    state.elements.push({ id: pid1, t: 'p', x: p1.x, y: p1.y, derived: true });
    state.elements.push({ id: pid2, t: 'p', x: p2.x, y: p2.y, derived: true });
    const lid = ++state.nextId;
    state.elements.push({ id: lid, t: 'l', a: pid1, b: pid2, dashed: true, derived: true });
    render();
  }
  function aiTcIntersection(args) {
    // 简化: 仅支持 线-线 交点. 解析 {el1, el2} 形式: {p1, p2} 表示线
    function parseLine(o) {
      if (o && o.p1 && o.p2) {
        const a = aiFindPointByLabel(o.p1);
        const b = aiFindPointByLabel(o.p2);
        if (a && b) return { type: 'line', a, b };
      }
      return null;
    }
    const e1 = parseLine(args.el1);
    const e2 = parseLine(args.el2);
    if (!e1 || !e2) throw new Error('仅支持线-线交点');
    const p = G.lineLineIntersect(e1.a, e1.b, e2.a, e2.b);
    if (!p) throw new Error('两线平行');
    const lbl = aiAllocateLabel(args.label);
    const id = ++state.nextId;
    state.elements.push({ id, t: 'p', x: p.x, y: p.y, label: lbl, derived: true });
    if (lbl === aiIndexToLabel(state.nextLabelIdx)) state.nextLabelIdx++;
    render();
    return lbl;
  }
  function aiTcDelete(args) {
    const p = aiFindPointByLabel(args.label);
    if (!p) throw new Error('找不到点 ' + args.label);
    state.elements = state.elements.filter(e => e.id !== p.id);
    render();
  }
  function aiTcClearBoard() {
    state.elements = [];
    state.nextId = 1;
    state.nextLabelIdx = 0;
    state.selection.clear();
    state.pendingVertex = null;
    state.pendingCircleCenter = null;
    state.pendingPoly = [];
    state.toolStep = 0;
    state.toolPicked = [];
    state.shapeDrag = null;
    state.hoverPoint = null;
    render();
  }

  // ==================== 初始化 ====================
  function init() {
    renderSidebar();
    activateTool('select');
    render();
    loadFromUrl();
  }
  // 测试钩子 (e2e 验证)
  window.__geo = {
    state,
    addPoint: (x, y, l) => aiApplyToolCall('add_point', { x, y, label: l }),
    addSegment: (p1, p2, dashed) => aiApplyToolCall('add_segment', { p1, p2, dashed }),
    addRay: (p1, p2, dashed) => aiApplyToolCall('add_ray', { p1, p2, dashed }),
    addLine: (p1, p2, dashed) => aiApplyToolCall('add_line', { p1, p2, dashed }),
    addCircle: (c, r, dashed) => aiApplyToolCall('add_circle', { center: c, radius: r, dashed }),
    addPolygon: (pts, c) => aiApplyToolCall('add_polygon', { points: pts, constraint: c }),
    addAngle: (p1, v, p2) => aiApplyToolCall('add_angle', { p1, vertex: v, p2 }),
    addText: (x, y, text, a) => aiApplyToolCall('add_text', { x, y, text, anchor: a }),
    measureLength: (p1, p2) => aiApplyToolCall('measure_length', { p1, p2 }),
    measureAngle: (p1, v, p2) => aiApplyToolCall('measure_angle', { p1, vertex: v, p2 }),
    midpoint: (p1, p2) => aiApplyToolCall('construct_midpoint', { p1, p2 }),
    perpbisect: (p1, p2) => aiApplyToolCall('construct_perpbisect', { p1, p2 }),
    bisect: (p1, v, p2) => aiApplyToolCall('construct_bisect', { p1, vertex: v, p2 }),
    perpendicular: (l1, l2, pt) => aiApplyToolCall('construct_perpendicular', { line: { p1: l1, p2: l2 }, point: pt }),
    parallel: (l1, l2, pt) => aiApplyToolCall('construct_parallel', { line: { p1: l1, p2: l2 }, point: pt }),
    intersection: (a, b, c, d) => aiApplyToolCall('construct_intersection', { el1: { p1: a, p2: b }, el2: { p1: c, p2: d } }),
    delete: (l) => aiApplyToolCall('delete', { label: l }),
    clear: () => aiApplyToolCall('clear_board', {}),
    state: () => state,
    applyToolCall: aiApplyToolCall
  };
  init();
})();
</script>
