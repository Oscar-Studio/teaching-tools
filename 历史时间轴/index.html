<html lang="zh-CN">
<head>

    <style>
        :root {
            --bg-primary: #0d1117;
            --bg-secondary: #161b22;
            --bg-card: #21262d;
            --border-color: #30363d;
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --politics: #f85149;
            --diplomacy: #58a6ff;
            --economy: #3fb950;
            --tech: #a371f7;
            --social: #d29922;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            user-select: none;
        }

        header {
            text-align: center;
            padding: 25px 20px 15px;
        }

        header h1 {
            font-size: 1.8em;
            background: linear-gradient(135deg, var(--diplomacy), var(--tech));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        header p {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 0.9em;
        }

        .chart-outer {
            overflow-x: auto;
            overflow-y: hidden;
            cursor: grab;
            padding-bottom: 20px;
        }

        .chart-outer:active {
            cursor: grabbing;
        }

        .chart-wrapper {
            padding: 0 30px 40px;
            width: max-content;
        }

        .timeline-header {
            display: flex;
            margin-left: 120px;
            border-bottom: 2px solid var(--border-color);
            padding-bottom: 10px;
        }

        .year-tick {
            flex: 0 0 110px;
            text-align: center;
            font-size: 0.85em;
            color: var(--text-secondary);
        }

        .timeline-grid {
            display: flex;
        }

        .row-labels {
            display: flex;
            flex-direction: column;
            width: 120px;
            flex-shrink: 0;
        }

        .row-label {
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 15px;
            font-weight: bold;
            font-size: 0.9em;
            border-bottom: 1px solid var(--border-color);
            transition: display 0.3s;
        }

        .row-label.hidden {
            display: none;
        }

        .row-label.politics { color: var(--politics); }
        .row-label.diplomacy { color: var(--diplomacy); }
        .row-label.economy { color: var(--economy); }
        .row-label.tech { color: var(--tech); }
        .row-label.social { color: var(--social); }

        .chart-area {
            position: relative;
        }

        .chart-row {
            height: 60px;
            position: relative;
            border-bottom: 1px solid var(--border-color);
            transition: display 0.3s;
        }

        .chart-row.hidden {
            display: none;
        }

        .grid-line {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 1px;
            background: var(--border-color);
            opacity: 0.5;
        }

        .event-bar {
            position: absolute;
            height: 36px;
            top: 12px;
            border-radius: 6px;
            padding: 0 10px;
            display: flex;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            font-size: 0.8em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: white;
            font-weight: 500;
        }

        .event-bar:hover {
            transform: scaleY(1.15);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            z-index: 100;
        }

        .event-bar.politics { background: var(--politics); }
        .event-bar.diplomacy { background: var(--diplomacy); }
        .event-bar.economy { background: var(--economy); }
        .event-bar.tech { background: var(--tech); }
        .event-bar.social { background: var(--social); }

        .tooltip {
            position: fixed;
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 15px;
            max-width: 350px;
            z-index: 1000;
            display: none;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            pointer-events: none;
        }

        .tooltip.active {
            display: block;
        }

        .tooltip h3 {
            font-size: 1em;
            margin-bottom: 10px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .tooltip-item {
            margin-bottom: 8px;
        }

        .tooltip-label {
            color: var(--text-secondary);
            font-size: 0.75em;
            margin-bottom: 2px;
        }

        .tooltip-value {
            font-size: 0.9em;
            line-height: 1.4;
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 20px;
            padding: 15px;
            flex-wrap: wrap;
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            padding: 6px 12px;
            border-radius: 6px;
            transition: all 0.2s;
            font-size: 0.9em;
        }

        .legend-item:hover {
            background: var(--bg-card);
        }

        .legend-item.inactive {
            opacity: 0.35;
        }

        .legend-dot {
            width: 14px;
            height: 14px;
            border-radius: 4px;
        }

        .legend-dot.politics { background: var(--politics); }
        .legend-dot.diplomacy { background: var(--diplomacy); }
        .legend-dot.economy { background: var(--economy); }
        .legend-dot.tech { background: var(--tech); }
        .legend-dot.social { background: var(--social); }

        .time-ruler {
            position: relative;
            height: 30px;
            margin-left: 120px;
            border-top: 2px solid var(--border-color);
        }

        .time-ruler::before {
            content: '';
            position: absolute;
            left: 0;
            right: 0;
            top: -6px;
            height: 10px;
            background: repeating-linear-gradient(
                to right,
                transparent,
                transparent 109px,
                var(--border-color) 109px,
                var(--border-color) 110px
            );
        }

        .time-arrow {
            position: absolute;
            right: -15px;
            top: -10px;
            width: 0;
            height: 0;
            border-top: 8px solid transparent;
            border-bottom: 8px solid transparent;
            border-left: 12px solid var(--text-secondary);
        }

        .drag-hint {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.8em;
            padding: 5px;
            opacity: 0.7;
        }
    </style>
</head>

            ]},
            { year: 1997, duration: 1, category: 'diplomacy', title: '香港回归', brief: '1997.7.1', details: [
                { label: '意义', value: '标志着中国人民洗雪了百年国耻，"一国两制"构想取得成功' },
                { label: '英雄人物', value: '邓小平' }
            ]},
            { year: 1999, duration: 1, category: 'diplomacy', title: '澳门回归', brief: '1999.12.20', details: [
                { label: '意义', value: '"一国两制"再次成功实践' }
            ]},
            { year: 2001, duration: 1, category: 'economy', title: '加入WTO', brief: '2001', details: [
                { label: '意义', value: '标志着中国对外开放进入新阶段' }
            ]},
            { year: 2002, duration: 1, category: 'politics', title: '中共十六大', brief: '三个代表', details: [
                { label: '内容', value: '"三个代表"重要思想被确立为党的指导思想并写入党章' }
            ]},
            { year: 2003, duration: 1, category: 'tech', title: '神舟五号', brief: '杨利伟', details: [
                { label: '意义', value: '中国成为世界上第三个独立掌握载人航天技术的国家' },
                { label: '英雄人物', value: '杨利伟（中国第一位航天员）' }
            ]}
        ];

        // Build year header
        const yearHeader = document.getElementById('yearHeader');
        for (let y = START_YEAR; y <= END_YEAR; y++) {
            const tick = document.createElement('div');
            tick.className = 'year-tick';
            tick.textContent = y;
            yearHeader.appendChild(tick);
        }

        // Build grid lines
        const chartArea = document.getElementById('chartArea');
        const rows = chartArea.querySelectorAll('.chart-row');
        const rowLabels = document.querySelectorAll('.row-label');
        const totalYears = END_YEAR - START_YEAR + 1;

        for (let i = 0; i < totalYears; i++) {
            rows.forEach(row => {
                const line = document.createElement('div');
                line.className = 'grid-line';
                line.style.left = (i * YEAR_WIDTH) + 'px';
                row.appendChild(line);
            });
        }

        // Place event bars
        const tooltip = document.getElementById('tooltip');

        eventsData.forEach(event => {
            const rowIndex = ['diplomacy', 'politics', 'economy', 'tech', 'social'].indexOf(event.category);
            const row = rows[rowIndex];

            const bar = document.createElement('div');
            bar.className = `event-bar ${event.category}`;
            bar.textContent = event.title;

            const left = (event.year - START_YEAR) * YEAR_WIDTH;
            const width = Math.max(event.duration * YEAR_WIDTH - 4, 40);

            bar.style.left = left + 'px';
            bar.style.width = width + 'px';

            bar.addEventListener('mouseenter', (e) => {
                const titleEl = document.createElement('h3');
                titleEl.textContent = event.title;
                tooltip.innerHTML = '';
                tooltip.appendChild(titleEl);
                event.details.forEach(d => {
                    const itemDiv = document.createElement('div');
                    itemDiv.className = 'tooltip-item';
                    const labelDiv = document.createElement('div');
                    labelDiv.className = 'tooltip-label';
                    labelDiv.textContent = d.label;
                    const valueDiv = document.createElement('div');
                    valueDiv.className = 'tooltip-value';
                    valueDiv.textContent = d.value;
                    itemDiv.appendChild(labelDiv);
                    itemDiv.appendChild(valueDiv);
                    tooltip.appendChild(itemDiv);
                });
                tooltip.classList.add('active');
            });

            bar.addEventListener('mousemove', (e) => {
                tooltip.style.left = (e.clientX + 15) + 'px';
                tooltip.style.top = (e.clientY + 15) + 'px';
            });

            bar.addEventListener('mouseleave', () => {
                tooltip.classList.remove('active');
            });

            row.appendChild(bar);
        });

        // Drag to scroll
        const chartOuter = document.getElementById('chartOuter');
        let isDown = false;
        let startX;
        let scrollLeft;

        chartOuter.addEventListener('mousedown', (e) => {
            if (e.target.classList.contains('event-bar')) return;
            isDown = true;
            chartOuter.style.cursor = 'grabbing';
            startX = e.pageX - chartOuter.offsetLeft;
            scrollLeft = chartOuter.scrollLeft;
        });

        chartOuter.addEventListener('mouseleave', () => {
            isDown = false;
            chartOuter.style.cursor = 'grab';
        });

        chartOuter.addEventListener('mouseup', () => {
            isDown = false;
            chartOuter.style.cursor = 'grab';
        });

        chartOuter.addEventListener('mousemove', (e) => {
            if (!isDown) return;
            e.preventDefault();
            const x = e.pageX - chartOuter.offsetLeft;
            const walk = (x - startX) * 1.5;
            chartOuter.scrollLeft = scrollLeft - walk;
        });

        // Legend click to filter row + label
        const hiddenCats = new Set();
        const catToRow = {};
        const catToLabel = {};

        rows.forEach(row => catToRow[row.dataset.cat] = row);
        rowLabels.forEach(label => catToLabel[label.dataset.cat] = label);

        document.querySelectorAll('.legend-item').forEach(item => {
            item.addEventListener('click', () => {
                const cat = item.dataset.cat;

                if (hiddenCats.has(cat)) {
                    hiddenCats.delete(cat);
                    catToRow[cat].classList.remove('hidden');
                    catToLabel[cat].classList.remove('hidden');
                    item.classList.remove('inactive');
                } else {
                    hiddenCats.add(cat);
                    catToRow[cat].classList.add('hidden');
                    catToLabel[cat].classList.add('hidden');
                    item.classList.add('inactive');
                }
            });
        });
    </script>
    <script src="../_shared/tool-header.js" defer></script>
</body>
</html>
