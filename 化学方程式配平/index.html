<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>化学方程式配平工具</title>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --success-color: #28a745;
            --error-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            color: var(--dark-color);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(0, 229, 255, 0.3);
        }

        .subtitle {
            color: var(--text-secondary);
            font-size: 1.1em;
        }

        .content {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 10px;
            box-shadow: var(--card-shadow);
            border: var(--card-border);
        }

        .input-section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 10px;
            color: var(--text-secondary);
        }

        .equation-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: stretch;
            gap: 12px;
            margin-bottom: 12px;
        }

        .side-input {
            display: flex;
            flex-direction: column;
        }

        .side-input .side-label {
            font-size: 0.85em;
            color: var(--text-secondary);
            margin-bottom: 6px;
            text-align: center;
        }

        .arrow-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            color: var(--secondary-color);
            text-shadow: 0 0 12px rgba(0, 229, 255, 0.45);
            padding: 0 4px;
            user-select: none;
        }

        .equation-input {
            width: 100%;
            padding: 16px 14px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 5px;
            color: var(--dark-color);
            font-size: 1.1em;
            font-family: 'Courier New', Courier, monospace;
            transition: all 0.3s;
        }

        .equation-input:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.2);
        }

        .examples {
            font-size: 0.9em;
            color: var(--text-secondary);
            margin-top: 8px;
            line-height: 1.6;
        }

        .examples .example-link {
            color: var(--secondary-color);
            cursor: pointer;
            margin-right: 12px;
            text-decoration: underline;
            text-decoration-style: dotted;
        }

        .examples .example-link:hover {
            color: #fff;
        }

        .button-container {
            text-align: center;
            margin-bottom: 20px;
        }

        .balance-btn {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 12px 40px;
            border-radius: 25px;
            font-size: 1.1em;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(42, 92, 170, 0.4);
        }

        .balance-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42, 92, 170, 0.6);
        }

        .balance-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
            color: var(--secondary-color);
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid rgba(0, 229, 255, 0.1);
            border-left-color: var(--secondary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background: rgba(42, 92, 170, 0.1);
            border-radius: 8px;
            border-left: 4px solid var(--secondary-color);
        }

        .result-section h3 {
            color: var(--secondary-color);
            margin-bottom: 15px;
        }

        .balanced-equation {
            font-size: 1.5em;
            font-family: 'Courier New', Courier, monospace;
            color: var(--dark-color);
            word-break: break-all;
            line-height: 1.4;
        }

        .error {
            display: none;
            color: var(--error-color);
            background: rgba(231, 76, 60, 0.1);
            padding: 15px;
            border-radius: 5px;
            margin-top: 20px;
            text-align: center;
            border: 1px solid rgba(231, 76, 60, 0.3);
        }

        .login-prompt {
            display: none;
            text-align: center;
            margin-top: 16px;
            padding: 14px;
            background: rgba(0, 229, 255, 0.06);
            border: 1px dashed rgba(0, 229, 255, 0.4);
            border-radius: 8px;
            color: var(--text-secondary);
        }

        .login-prompt a {
            color: var(--secondary-color);
            text-decoration: underline;
            cursor: pointer;
        }

        footer {
            text-align: center;
            margin-top: auto;
            padding-top: 40px;
            color: var(--text-secondary);
            font-size: 0.9em;
        }

        @media (max-width: 640px) {
            .equation-row {
                grid-template-columns: 1fr;
                gap: 8px;
            }
            .arrow-wrap {
                font-size: 1.6em;
                padding: 4px 0;
            }
        }
    </style>

</head>


<body>
    <div class="container">
        <header>
            <h1>化学方程式配平工具</h1>
            <div class="subtitle">左右填入反应物和生成物，AI 自动配平方程式</div>
        </header>

        <div class="content">
            <div class="input-section">
                <label>输入未配平的化学方程式：</label>
                <div class="equation-row">
                    <div class="side-input">
                        <div class="side-label">反应物</div>
                        <input type="text" id="reactants" class="equation-input" placeholder="例如: H2 + O2" autocomplete="off">
                    </div>
                    <div class="arrow-wrap" title="反应方向">→</div>
                    <div class="side-input">
                        <div class="side-label">生成物</div>
                        <input type="text" id="products" class="equation-input" placeholder="例如: H2O" autocomplete="off">
                    </div>
                </div>
                <div class="examples">
                    示例:
                    <span class="example-link" data-r="H2 + O2" data-p="H2O">H2 + O2 → H2O</span>
                    <span class="example-link" data-r="Fe + O2" data-p="Fe2O3">Fe + O2 → Fe2O3</span>
                    <span class="example-link" data-r="CH4 + O2" data-p="CO2 + H2O">CH4 + O2 → CO2 + H2O</span>
                    <span class="example-link" data-r="Al + HCl" data-p="AlCl3 + H2">Al + HCl → AlCl3 + H2</span>
                </div>
            </div>

            <div class="button-container">
                <button id="balanceBtn" class="balance-btn">
                    <span>配平方程式</span>
                </button>
            </div>

            <div id="loginPrompt" class="login-prompt">
                请先 <a id="loginLink">登录</a> 后再使用配平功能（使用 DeepSeek V4-flash 模型）。
            </div>

            <div id="loading" class="loading">
                <div class="spinner"></div>
                <p>正在使用 DeepSeek V4-flash 配平方程式，请稍候...</p>
            </div>

            <div id="error" class="error">
                发生错误，请检查网络连接或稍后重试。
            </div>

            <div id="resultSection" class="result-section">
                <h3>配平后的方程式：</h3>
                <div id="balancedEquation" class="balanced-equation"></div>
                <div id="explanation"></div>
            </div>
        </div>

        <footer>
            <p>本工具使用 DeepSeek V4-flash 进行化学方程式配平（需登录） | 仅供教育用途</p>
        </footer>
    </div>

    <script>
        const API_BASE = 'https://api.oscarstudio.cn';
        const MODEL = 'deepseek-v4-flash';

        // ====== 登录态管理 ======
        function getCookie(name) {
            const v = `; ${document.cookie}`;
            const parts = v.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        function getToken() {
            return localStorage.getItem('userToken') || getCookie('userToken');
        }

        function isLoggedIn() {
            return !!getToken();
        }

        // ====== 初始化 ======
        document.addEventListener('DOMContentLoaded', function () {
            const reactantsInput = document.getElementById('reactants');
            const productsInput = document.getElementById('products');
            const balanceBtn = document.getElementById('balanceBtn');
            const loading = document.getElementById('loading');
            const resultSection = document.getElementById('resultSection');
            const balancedEquation = document.getElementById('balancedEquation');
            const errorDiv = document.getElementById('error');
            const loginPrompt = document.getElementById('loginPrompt');
            const loginLink = document.getElementById('loginLink');

            // 未登录时给出跳转登录入口
            loginLink.addEventListener('click', () => {
                window.open('https://api.oscarstudio.cn/auth', '_blank');
            });

            // 示例点击：填入两侧
            document.querySelectorAll('.example-link').forEach(el => {
                el.addEventListener('click', () => {
                    reactantsInput.value = el.dataset.r;
                    productsInput.value = el.dataset.p;
                    reactantsInput.focus();
                });
            });

            balanceBtn.addEventListener('click', async () => {
                if (!isLoggedIn()) {
                    showLoginPrompt();
                    return;
                }

                const reactants = reactantsInput.value.trim();
                const products = productsInput.value.trim();

                if (!reactants || !products) {
                    showError('请在两侧分别填入反应物和生成物');
                    return;
                }
                if (!/[A-Za-z]/.test(reactants) || !/[A-Za-z]/.test(products)) {
                    showError('请输入有效的化学式（需包含元素符号）');
                    return;
                }

                const equation = `${reactants} → ${products}`;

                loading.style.display = 'block';
                resultSection.style.display = 'none';
                errorDiv.style.display = 'none';
                loginPrompt.style.display = 'none';
                balanceBtn.disabled = true;

                try {
                    const data = await callChatAPI(equation);
                    const content = data.choices?.[0]?.message?.content?.trim();
                    if (!content) {
                        throw new Error(data.message || 'API 返回的数据格式不正确');
                    }
                    displayResult(content);
                } catch (err) {
                    showError('配平失败: ' + err.message);
                } finally {
                    loading.style.display = 'none';
                    balanceBtn.disabled = false;
                }
            });

            // 回车提交（在任一输入框按 Enter 触发）
            [reactantsInput, productsInput].forEach(el => {
                el.addEventListener('keypress', e => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        balanceBtn.click();
                    }
                });
            });

            // ====== API 调用 ======
            async function callChatAPI(equation) {
                const response = await fetch(`${API_BASE}/api/chat`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${getToken()}`
                    },
                    body: JSON.stringify({
                        model: MODEL,
                        messages: [
                            {
                                role: 'system',
                                content: '你是化学专家，专门配平化学方程式。请直接返回配平后的方程式（含 → 箭头），不要添加任何额外文本、解释或代码块标记，只返回最终结果。'
                            },
                            {
                                role: 'user',
                                content: `请配平以下化学方程式: ${equation}`
                            }
                        ],
                        temperature: 0.2,
                        max_tokens: 150
                    })
                });

                if (!response.ok) {
                    let msg = `API 请求失败: ${response.status}`;
                    try {
                        const err = await response.json();
                        if (err && err.message) msg = err.message;
                    } catch (_) {}
                    throw new Error(msg);
                }
                return response.json();
            }

            function displayResult(text) {
                balancedEquation.textContent = text;
                resultSection.style.display = 'block';
                resultSection.scrollIntoView({ behavior: 'smooth' });
            }

            function showError(message) {
                errorDiv.textContent = message;
                errorDiv.style.display = 'block';
                loading.style.display = 'none';
                resultSection.style.display = 'none';
                loginPrompt.style.display = 'none';
            }

            function showLoginPrompt() {
                loginPrompt.style.display = 'block';
                errorDiv.style.display = 'none';
                resultSection.style.display = 'none';
                loading.style.display = 'none';
            }
        });
    </script>
    <p><a href="https://beian.miit.gov.cn/" target="_blank">粤ICP备2026012488号-1</a></p>
    
    <script src="../_shared/tool-header.js" defer></script>
</body>

</html>
