<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>骰子模拟器 - 教学工具</title>
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --success-color: #28a745;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--dark-color);
        }

        .container {
            width: 100%;
            max-width: 600px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .dice-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            margin: 40px 0;
            flex-wrap: wrap;
        }

        .dice {
            width: 120px;
            height: 120px;
            background: linear-gradient(145deg, #f0f0f0, #d0d0d0);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 4rem;
            font-weight: bold;
            color: #333;
            box-shadow: 
                5px 5px 15px rgba(0, 0, 0, 0.3),
                -2px -2px 10px rgba(255, 255, 255, 0.1);
            cursor: pointer;
            transition: transform 0.3s ease;
            user-select: none;
        }

        .dice:hover {
            transform: scale(1.05);
        }

        .dice.rolling {
            animation: roll 0.5s ease-out;
        }

        @keyframes roll {
            0% { transform: rotate(0deg) scale(1); }
            25% { transform: rotate(90deg) scale(0.8); }
            50% { transform: rotate(180deg) scale(1.1); }
            75% { transform: rotate(270deg) scale(0.9); }
            100% { transform: rotate(360deg) scale(1); }
        }

        .dice-inner {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .dot {
            position: absolute;
            width: 20px;
            height: 20px;
            background: #333;
            border-radius: 50%;
            display: none;
        }

        /* 骰子点数样式 */
        .dice[data-face="1"] .dot:nth-child(1) { display: block; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dice[data-face="2"] .dot:nth-child(1) { display: block; top: 20%; left: 20%; }
        .dice[data-face="2"] .dot:nth-child(2) { display: block; top: 80%; left: 80%; }
        .dice[data-face="3"] .dot:nth-child(1) { display: block; top: 20%; left: 20%; }
        .dice[data-face="3"] .dot:nth-child(2) { display: block; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dice[data-face="3"] .dot:nth-child(3) { display: block; top: 80%; left: 80%; }
        .dice[data-face="4"] .dot:nth-child(1) { display: block; top: 20%; left: 20%; }
        .dice[data-face="4"] .dot:nth-child(2) { display: block; top: 20%; left: 80%; }
        .dice[data-face="4"] .dot:nth-child(3) { display: block; top: 80%; left: 20%; }
        .dice[data-face="4"] .dot:nth-child(4) { display: block; top: 80%; left: 80%; }
        .dice[data-face="5"] .dot:nth-child(1) { display: block; top: 20%; left: 20%; }
        .dice[data-face="5"] .dot:nth-child(2) { display: block; top: 20%; left: 80%; }
        .dice[data-face="5"] .dot:nth-child(3) { display: block; top: 50%; left: 50%; transform: translate(-50%, -50%); }
        .dice[data-face="5"] .dot:nth-child(4) { display: block; top: 80%; left: 20%; }
        .dice[data-face="5"] .dot:nth-child(5) { display: block; top: 80%; left: 80%; }
        .dice[data-face="6"] .dot:nth-child(1) { display: block; top: 20%; left: 20%; }
        .dice[data-face="6"] .dot:nth-child(2) { display: block; top: 20%; left: 80%; }
        .dice[data-face="6"] .dot:nth-child(3) { display: block; top: 50%; left: 20%; transform: translate(-50%, -50%); }
        .dice[data-face="6"] .dot:nth-child(4) { display: block; top: 50%; left: 80%; transform: translate(-50%, -50%); }
        .dice[data-face="6"] .dot:nth-child(5) { display: block; top: 80%; left: 20%; }
        .dice[data-face="6"] .dot:nth-child(6) { display: block; top: 80%; left: 80%; }

        .settings {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .setting-item {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .setting-item label {
            color: var(--text-secondary);
        }

        .setting-item input {
            width: 60px;
            padding: 8px;
            border-radius: 6px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            font-size: 1rem;
            text-align: center;
        }

        .btn {
            padding: 15px 35px;
            border: none;
            border-radius: 10px;
            font-size: 1.2rem;
            cursor: pointer;
            transition: all 0.3s ease;
            margin: 5px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 20px rgba(42, 92, 170, 0.4);
        }

        .result {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 229, 255, 0.1);
            border-radius: 10px;
            font-size: 1.5rem;
            display: none;
        }

        .result.show {
            display: block;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-number {
            font-size: 3rem;
            font-weight: bold;
            color: var(--secondary-color);
        }

        footer {
            margin-top: 40px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .history {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            max-height: 150px;
            overflow-y: auto;
        }

        .history h3 {
            color: var(--text-secondary);
            margin-bottom: 10px;
            font-size: 1rem;
        }

        .history-list {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .history-item {
            padding: 5px 12px;
            background: var(--card-bg);
            border-radius: 5px;
            font-size: 0.9rem;
        }
    </style>

</head>

<body>
    <div class="container">
        <h1>🎲 骰子模拟器</h1>
        <p class="subtitle">点击骰子或按钮开始投掷</p>

        <div class="settings">
            <div class="setting-item">
                <label>骰子数量:</label>
                <input type="number" id="diceCount" value="2" min="1" max="6">
            </div>
            <div class="setting-item">
                <label>最大点数:</label>
                <input type="number" id="maxPoint" value="6" min="2" max="20">
            </div>
        </div>

        <div class="dice-container" id="diceContainer">
            <!-- 骰子会在这里生成 -->
        </div>

        <button class="btn btn-primary" onclick="rollDice()">🎲 投掷骰子</button>

        <div class="result" id="result">
            <div>结果</div>
            <div class="result-number" id="resultNumber">0</div>
            <div id="resultDetail"></div>
        </div>

        <div class="history" id="history">
            <h3>历史记录</h3>
            <div class="history-list" id="historyList"></div>
        </div>
    </div>

    <footer>
        <p>骰子模拟器 &copy; 2026 - Designed by Oscar</p>
    </footer>

    <script>
        let diceValues = [];
        let history = [];

        function createDice() {
            const count = parseInt(document.getElementById('diceCount').value) || 2;
            const container = document.getElementById('diceContainer');
            container.innerHTML = '';
            
            diceValues = [];
            
            for (let i = 0; i < count; i++) {
                const dice = document.createElement('div');
                dice.className = 'dice';
                dice.id = `dice-${i}`;
                dice.onclick = () => rollSingleDice(i);
                
                // 添加点数显示
                dice.innerHTML = '<div class="dice-inner"></div>';
                
                // 添加6个点
                for (let j = 0; j < 6; j++) {
                    const dot = document.createElement('div');
                    dot.className = 'dot';
                    dice.appendChild(dot);
                }
                
                container.appendChild(dice);
                diceValues.push(1);
            }
            
            updateDiceDisplay();
        }

        function updateDiceDisplay() {
            const maxPoint = parseInt(document.getElementById('maxPoint').value) || 6;
            
            diceValues.forEach((value, index) => {
                const dice = document.getElementById(`dice-${index}`);
                const displayValue = (value - 1) % maxPoint + 1;
                dice.setAttribute('data-face', displayValue);
            });
        }

        function rollSingleDice(index) {
            const dice = document.getElementById(`dice-${index}`);
            const maxPoint = parseInt(document.getElementById('maxPoint').value) || 6;
            
            dice.classList.add('rolling');
            
            // 动画
            let rolls = 0;
            const interval = setInterval(() => {
                diceValues[index] = Math.floor(Math.random() * maxPoint) + 1;
                updateDiceDisplay();
                rolls++;
                
                if (rolls >= 10) {
                    clearInterval(interval);
                    diceValues[index] = Math.floor(Math.random() * maxPoint) + 1;
                    updateDiceDisplay();
                    dice.classList.remove('rolling');
                    showResult();
                }
            }, 50);
        }

        function rollDice() {
            const maxPoint = parseInt(document.getElementById('maxPoint').value) || 6;
            const diceElements = document.querySelectorAll('.dice');
            
            diceElements.forEach(dice => dice.classList.add('rolling'));
            
            // 动画
            let rolls = 0;
            const interval = setInterval(() => {
                diceValues = diceValues.map(() => Math.floor(Math.random() * maxPoint) + 1);
                updateDiceDisplay();
                rolls++;
                
                if (rolls >= 10) {
                    clearInterval(interval);
                    diceValues = diceValues.map(() => Math.floor(Math.random() * maxPoint) + 1);
                    updateDiceDisplay();
                    diceElements.forEach(dice => dice.classList.remove('rolling'));
                    showResult();
                }
            }, 50);
        }

        function showResult() {
            const resultDiv = document.getElementById('result');
            const resultNumber = document.getElementById('resultNumber');
            const resultDetail = document.getElementById('resultDetail');
            
            const total = diceValues.reduce((a, b) => a + b, 0);
            
            resultNumber.textContent = total;
            resultDetail.textContent = diceValues.join(' + ');
            
            resultDiv.classList.add('show');
            
            // 添加到历史
            addToHistory(total);
        }

        function addToHistory(total) {
            history.unshift({
                value: total,
                detail: [...diceValues],
                time: new Date().toLocaleTimeString()
            });
            
            if (history.length > 10) {
                history.pop();
            }
            
            renderHistory();
        }

        function renderHistory() {
            const list = document.getElementById('historyList');
            list.innerHTML = history.map(item => 
                `<div class="history-item">${item.detail.join('+')} = ${item.value}</div>`
            ).join('');
        }

        // 监听设置变化
        document.getElementById('diceCount').addEventListener('change', createDice);
        document.getElementById('maxPoint').addEventListener('change', updateDiceDisplay);

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                rollDice();
            }
        });

        // 初始化
        createDice();
    </script>
</body>

</html>
