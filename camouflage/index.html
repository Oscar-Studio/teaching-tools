<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保护色实验 - Oscar Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #2A5CAA, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
        }
        /* Settings */
        .settings {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            align-items: flex-end;
        }
        .setting-item {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .setting-item label {
            font-size: 0.85rem;
            color: #8b949e;
        }
        .setting-item input[type="number"] {
            padding: 8px 12px;
            border-radius: 8px;
            border: 1px solid #30363d;
            background: #0d1117;
            color: #fff;
            font-size: 1rem;
            outline: none;
            width: 100px;
        }
        .setting-item input[type="number"]:focus {
            border-color: #00E5FF;
        }
        .bg-color-select {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .bg-color-select label {
            font-size: 0.85rem;
            color: #8b949e;
        }
        .bg-options {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
        }
        .bg-option {
            width: 28px;
            height: 28px;
            border-radius: 6px;
            border: 2px solid transparent;
            cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }
        .bg-option:hover { transform: scale(1.15); }
        .bg-option.selected { border-color: #fff; }
        .btn-start {
            padding: 10px 30px;
            background: linear-gradient(135deg, #2A5CAA, #6A00FF);
            color: #fff;
            border: none;
            border-radius: 20px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-start:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(106,0,255,0.3);
        }
        /* Game Area */
        #gameArea {
            position: relative;
            width: min(90vw, 700px);
            height: min(70vh, 500px);
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid #30363d;
            margin-bottom: 15px;
            cursor: crosshair;
        }
        /* Paper pieces */
        .paper {
            position: absolute;
            border-radius: 4px;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        .paper:hover { transform: scale(1.1); }
        /* Timer bar */
        #timerBar {
            width: min(90vw, 700px);
            height: 6px;
            background: #21262d;
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 10px;
        }
        #timerFill {
            height: 100%;
            background: linear-gradient(90deg, #00E5FF, #6A00FF);
            width: 100%;
            transition: width 0.05s linear;
        }
        /* Round info */
        #roundInfo {
            color: #8b949e;
            font-size: 0.95rem;
            margin-bottom: 10px;
            text-align: center;
            min-height: 24px;
        }
        /* Chart */
        #chartContainer {
            width: min(90vw, 700px);
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            display: none;
        }
        #chartContainer h2 {
            font-size: 1.2rem;
            margin-bottom: 15px;
            color: #00E5FF;
        }
        #chartCanvas {
            width: 100%;
            height: 300px;
            display: block;
        }
        /* Stats summary */
        .stats-summary {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            margin-top: 15px;
        }
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: #8b949e;
        }
        .stat-dot {
            width: 12px;
            height: 12px;
            border-radius: 3px;
        }
        /* Replicate flash */
        @keyframes replicateFlash {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.4); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
        .paper.replicating {
            animation: replicateFlash 0.5s ease;
        }
        .back-link {
            margin-top: 15px;
            color: #00E5FF;
            text-decoration: none;
            font-size: 0.9rem;
        }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🦎 生物保护色实验</h1>
    <p class="subtitle">
        纯色背景下不同颜色的纸片代表不同生物。<br>
        3秒内点击你看到的纸片——越显眼越容易被发现而被"淘汰"。<br>
        剩下25%时幸存者复制3份恢复原数，最终看谁活到最后！
    </p>

    <div class="settings" id="settingsPanel">
        <div class="setting-item">
            <label>颜色种类</label>
            <input type="number" id="numColors" value="5" min="2" max="10">
        </div>
        <div class="setting-item">
            <label>纸片总数</label>
            <input type="number" id="totalPieces" value="20" min="4" step="4">
        </div>
        <div class="setting-item">
            <label>实验轮数</label>
            <input type="number" id="numRounds" value="8" min="3" max="20">
        </div>
        <div class="bg-color-select">
            <label>背景颜色</label>
            <div class="bg-options" id="bgOptions"></div>
        </div>
        <button class="btn-start" id="btnStart">开始实验</button>
    </div>

    <div id="timerBar"><div id="timerFill"></div></div>
    <div id="roundInfo"></div>
    <div id="gameArea"></div>

    <div id="chartContainer">
        <h2>📊 各颜色纸片数量变化</h2>
        <canvas id="chartCanvas"></canvas>
        <div class="stats-summary" id="statsSummary"></div>
    </div>

    <a class="back-link" href="../index.html">← 返回工具集</a>

<script>
// Color utilities
function generateColors(n) {
    const palette = [
        '#FF6B6B','#4ECDC4','#FFE66D','#95E1D3','#F38181',
        '#AA96DA','#FCBAD3','#A8D8EA','#FF9F43','#6C5CE7',
        '#00CEC9','#FD79A8','#A29BFE','#FAB1A0','#74B9FF'
    ];
    const shuffled = [...palette].sort(() => Math.random() - 0.5);
    return shuffled.slice(0, n);
}

function colorDist(c1, c2) {
    const r1=parseInt(c1.slice(1,3),16),g1=parseInt(c1.slice(3,5),16),b1=parseInt(c1.slice(5,7),16);
    const r2=parseInt(c2.slice(1,3),16),g2=parseInt(c2.slice(3,5),16),b2=parseInt(c2.slice(5,7),16);
    return Math.sqrt((r1-r2)**2+(g1-g2)**2+(b1-b2)**2);
}

function nearColors(baseHex, colors, threshold) {
    return colors.filter(c => colorDist(c, baseHex) >= threshold);
}

function generateBgOptions(cardColors) {
    // Background options: each card color + colors similar to them (dist 40-100)
    const options = new Set(['#888888']); // neutral gray option
    cardColors.forEach(c => options.add(c));
    cardColors.forEach(c => {
        // Add a lighter and darker variant
        const r = parseInt(c.slice(1,3),16);
        const g = parseInt(c.slice(3,5),16);
        const b = parseInt(c.slice(5,7),16);
        // lighter
        const lr = Math.min(255, Math.round(r + 60));
        const lg = Math.min(255, Math.round(g + 60));
        const lb = Math.min(255, Math.round(b + 60));
        options.add('#'+[lr,lg,lb].map(x=>x.toString(16).padStart(2,'0')).join(''));
        // darker
        const dr = Math.max(0, Math.round(r - 60));
        const dg = Math.max(0, Math.round(g - 60));
        const db = Math.max(0, Math.round(b - 60));
        options.add('#'+[dr,dg,db].map(x=>x.toString(16).padStart(2,'0')).join(''));
    });
    return [...options].slice(0, 12);
}

// State
let state = {};
let timerInterval = null;
let timeLeft = 3;
let pieces = [];
let paperId = 0;
let roundActive = false;
let selectedBgColor = '#888888';

const gameArea = document.getElementById('gameArea');
const timerFill = document.getElementById('timerFill');
const roundInfo = document.getElementById('roundInfo');
const chartContainer = document.getElementById('chartContainer');
const statsSummary = document.getElementById('statsSummary');
const settingsPanel = document.getElementById('settingsPanel');
const bgOptions = document.getElementById('bgOptions');

// Build background options when color count changes
function buildBgOptions() {
    const numColors = parseInt(document.getElementById('numColors').value) || 5;
    const previewColors = generateColors(numColors);
    const opts = generateBgOptions(previewColors);
    bgOptions.innerHTML = '';
    opts.forEach(color => {
        const btn = document.createElement('div');
        btn.className = 'bg-option' + (color === selectedBgColor ? ' selected' : '');
        btn.style.background = color;
        btn.dataset.color = color;
        btn.title = color;
        btn.addEventListener('click', () => {
            bgOptions.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
            btn.classList.add('selected');
            selectedBgColor = color;
        });
        bgOptions.appendChild(btn);
    });
}

// Init background options on load
buildBgOptions();
document.getElementById('numColors').addEventListener('input', buildBgOptions);

function recordHistory(label) {
    state.colors.forEach(c => {
        state.history[c].push({ label, count: pieces.filter(p => p.alive && p.color === c).length });
    });
}

function initGame() {
    const bgColor = selectedBgColor;
    const numColors = parseInt(document.getElementById('numColors').value);
    const totalPieces = parseInt(document.getElementById('totalPieces').value);
    const numRounds = parseInt(document.getElementById('numRounds').value);

    const baseCount = Math.floor(totalPieces / numColors);
    const remainder = totalPieces % numColors;

    const colors = generateColors(numColors);
    // Ensure no color is too close to background
    const finalColors = colors.map(c => {
        if (colorDist(c, bgColor) < 35) {
            // shift it away
            let r=parseInt(c.slice(1,3),16),g=parseInt(c.slice(3,5),16),b=parseInt(c.slice(5,7),16);
            r = Math.min(255, r + 80); g = Math.min(255, g + 80); b = Math.min(255, b + 80);
            return '#'+[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('');
        }
        return c;
    });

    state = {
        bgColor,
        colors: finalColors,
        numRounds,
        currentRound: 0,
        originalTotal: totalPieces,
        history: {},
        replicated: false  // tracks if we already replicated this experiment
    };
    finalColors.forEach(c => { state.history[c] = []; });

    // Distribute pieces evenly
    let distribution = finalColors.map(() => baseCount);
    for (let i = 0; i < remainder; i++) {
        distribution[Math.floor(Math.random() * numColors)]++;
    }

    pieces = [];
    finalColors.forEach((color, ci) => {
        for (let i = 0; i < distribution[ci]; i++) {
            pieces.push({ id: paperId++, color, x: 0, y: 0, w: 0, h: 0, alive: true });
        }
    });

    chartContainer.style.display = 'none';
    settingsPanel.style.display = 'none';
    document.getElementById('timerBar').style.display = 'block';
    gameArea.style.background = bgColor;

    // Record initial state
    recordHistory('初始');

    startRound();
}

function placePieces() {
    const W = gameArea.clientWidth;
    const H = gameArea.clientHeight;
    const size = Math.max(22, Math.min(34, W * H / 2500));

    pieces.forEach(p => {
        if (!p.alive) return;
        let x, y, tries = 0;
        do {
            x = Math.random() * (W - size);
            y = Math.random() * (H - size);
            tries++;
        } while (tries < 40 && pieces.some(other =>
            other.alive && other.id !== p.id &&
            Math.abs(other.x - x) < size * 0.8 && Math.abs(other.y - y) < size * 0.8
        ));
        p.x = x; p.y = y; p.w = size; p.h = size;
    });
}

function renderPieces() {
    gameArea.innerHTML = '';
    pieces.forEach(p => {
        if (!p.alive) return;
        const el = document.createElement('div');
        el.className = 'paper';
        el.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;background:${p.color};opacity:0.9;`;
        el.dataset.id = p.id;
        el.addEventListener('click', () => onPaperClick(p.id));
        gameArea.appendChild(el);
    });
}

function startRound() {
    const alive = pieces.filter(p => p.alive);

    // Check if experiment should end (no pieces left)
    if (alive.length === 0) {
        endGame();
        return;
    }

    // Check if we've done all rounds
    if (state.currentRound >= state.numRounds) {
        endGame();
        return;
    }

    state.currentRound++;
    roundActive = true;

    const aliveCount = pieces.filter(p => p.alive).length;
    roundInfo.textContent = `第 ${state.currentRound} / ${state.numRounds} 轮 | 剩余 ${aliveCount} 张纸片`;

    placePieces();
    renderPieces();

    // Start 3-second timer
    timeLeft = 3;
    timerFill.style.width = '100%';
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 0.05;
        timerFill.style.width = Math.max(0, (timeLeft / 3 * 100)) + '%';
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (roundActive) {
                roundActive = false;
                // Time's up: random piece "escapes" (not clicked)
                const alive = pieces.filter(p => p.alive);
                if (alive.length > 0) {
                    const victim = alive[Math.floor(Math.random() * alive.length)];
                    victim.alive = false;
                    renderPieces();
                }
                setTimeout(() => afterRound(), 400);
            }
        }
    }, 50);
}

function onPaperClick(id) {
    if (!roundActive) return;
    roundActive = false;
    clearInterval(timerInterval);

    const p = pieces.find(x => x.id === id);
    if (p && p.alive) {
        p.alive = false;
        renderPieces();
    }
    setTimeout(() => afterRound(), 300);
}

function afterRound() {
    const alive = pieces.filter(p => p.alive);
    const threshold = Math.floor(state.originalTotal * 0.25);

    if (alive.length <= threshold && alive.length > 0 && !state.replicated) {
        // === REPLICATION ===
        state.replicated = true;
        roundInfo.textContent = `🎉 幸存者复制！`;
        document.querySelectorAll('.paper').forEach(el => el.classList.add('replicating'));

        setTimeout(() => {
            // Each survivor produces 3 copies (so 4 total per survivor)
            const W = gameArea.clientWidth;
            const H = gameArea.clientHeight;
            const size = Math.max(22, Math.min(34, W * H / 2500));
            const newPieces = [];

            state.colors.forEach(color => {
                const survivors = alive.filter(p => p.color === color);
                survivors.forEach(s => {
                    for (let i = 0; i < 3; i++) {
                        let x, y, tries = 0;
                        do {
                            x = Math.random() * (W - size);
                            y = Math.random() * (H - size);
                            tries++;
                        } while (tries < 25 && newPieces.some(np =>
                            Math.abs(np.x - x) < size && Math.abs(np.y - y) < size
                        ));
                        newPieces.push({ id: paperId++, color, x, y, w: size, h: size, alive: true });
                    }
                });
            });

            pieces = [...pieces.filter(p => p.alive), ...newPieces];
            placePieces();
            renderPieces();

            // Record post-replicate counts
            recordHistory(`R${state.currentRound}后`);

            const newCount = pieces.filter(p => p.alive).length;
            roundInfo.textContent = `🎉 幸存者复制3份！ | 现在 ${newCount} 张`;
            setTimeout(() => startRound(), 1800);
        }, 500);
    } else {
        // Record after round
        recordHistory(`R${state.currentRound}`);
        setTimeout(() => startRound(), 400);
    }
}

function endGame() {
    roundInfo.textContent = '实验结束！';
    document.getElementById('timerBar').style.display = 'none';
    gameArea.innerHTML = '';

    drawChart();
    chartContainer.style.display = 'block';

    statsSummary.innerHTML = state.colors.map((c, i) => {
        const entries = state.history[c];
        const final = entries.length > 0 ? entries[entries.length - 1].count : 0;
        return `<div class="stat-item"><div class="stat-dot" style="background:${c}"></div>${i+1}号色: ${final}张</div>`;
    }).join('');

    settingsPanel.style.display = 'flex';

    requestAnimationFrame(() => requestAnimationFrame(() => {
        requestAnimationFrame(drawChart);
    }));
}

function drawChart() {
    const canvas = document.getElementById('chartCanvas');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0 || rect.height === 0) return;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    const colors = state.colors;
    const allEntries = [];
    colors.forEach(c => allEntries.push(...state.history[c]));
    const allCounts = allEntries.map(e => e.count);
    const maxVal = Math.max(...allCounts, 1);

    const padL = 42, padR = 20, padT = 30, padB = 42;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    // Grid
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
        ctx.fillStyle = '#8b949e';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal * (1 - i / 4)), padL - 5, y + 4);
    }

    // Build ordered label list from first color's history
    const labels = state.colors[0] ? state.history[state.colors[0]].map(e => e.label) : [];
    const n = labels.length;
    if (n === 0) return;

    // X labels
    ctx.textAlign = 'center';
    labels.forEach((label, i) => {
        const x = padL + (chartW / (n - 1)) * i;
        ctx.fillText(label, x, H - padB + 16);
    });

    // Lines
    colors.forEach(color => {
        const entries = state.history[color];
        if (!entries || entries.length === 0) return;

        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        entries.forEach((entry, i) => {
            const x = padL + (chartW / (n - 1)) * i;
            const y = padT + chartH - (entry.count / maxVal) * chartH;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Dots
        entries.forEach((entry, i) => {
            const x = padL + (chartW / (n - 1)) * i;
            const y = padT + chartH - (entry.count / maxVal) * chartH;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        });
    });

    // Legend: color swatches at top right
    const legendX = padL + chartW - 80;
    ctx.font = '11px Segoe UI';
    colors.forEach((color, i) => {
        const ly = padT + 14 + i * 16;
        ctx.fillStyle = color;
        ctx.fillRect(legendX, ly - 9, 10, 10);
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'left';
        ctx.fillText(`${i+1}号`, legendX + 14, ly);
    });
}

document.getElementById('btnStart').addEventListener('click', () => {
    const numColors = parseInt(document.getElementById('numColors').value);
    const totalPieces = parseInt(document.getElementById('totalPieces').value);
    if (numColors < 2) { alert('颜色种类至少2种'); return; }
    if (totalPieces < numColors) { alert('纸片总数至少等于颜色种类数'); return; }
    initGame();
});
</script>
</body>
</html>
