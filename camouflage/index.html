<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>保护色实验 - Oscar Studio</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0d1117;
            color: #fff;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #2A5CAA, #00E5FF);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #8b949e;
            font-size: 0.9rem;
            margin-bottom: 20px;
            text-align: center;
            max-width: 600px;
            line-height: 1.5;
        }
        .settings {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 20px;
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 12px;
            padding: 20px;
            align-items: flex-end;
        }
        .setting-item { display: flex; flex-direction: column; gap: 6px; }
        .setting-item label { font-size: 0.85rem; color: #8b949e; }
        .setting-item input[type="number"] {
            padding: 8px 12px; border-radius: 8px; border: 1px solid #30363d;
            background: #0d1117; color: #fff; font-size: 1rem; outline: none; width: 100px;
        }
        .setting-item input[type="number"]:focus { border-color: #00E5FF; }
        .bg-color-select { display: flex; flex-direction: column; gap: 6px; }
        .bg-color-select label { font-size: 0.85rem; color: #8b949e; }
        .bg-options { display: flex; gap: 6px; flex-wrap: wrap; max-width: 280px; }
        .bg-option {
            width: 28px; height: 28px; border-radius: 6px;
            border: 2px solid transparent; cursor: pointer;
            transition: border-color 0.2s, transform 0.2s;
        }
        .bg-option:hover { transform: scale(1.15); }
        .bg-option.selected { border-color: #fff; }
        .btn-start {
            padding: 10px 30px; background: linear-gradient(135deg, #2A5CAA, #6A00FF);
            color: #fff; border: none; border-radius: 20px; font-size: 1rem;
            font-weight: 600; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s;
        }
        .btn-start:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(106,0,255,0.3); }
        #gameArea {
            position: relative; width: min(90vw, 700px); height: min(70vh, 500px);
            border-radius: 12px; overflow: hidden; border: 2px solid #30363d;
            margin-bottom: 15px; cursor: crosshair;
        }
        .paper {
            position: absolute; border-radius: 4px; cursor: pointer;
            transition: transform 0.1s; user-select: none;
        }
        .paper:hover { transform: scale(1.1); }
        #timerBar {
            width: min(90vw, 700px); height: 6px;
            background: #21262d; border-radius: 3px; overflow: hidden; margin-bottom: 10px;
        }
        #timerFill {
            height: 100%; background: linear-gradient(90deg, #00E5FF, #6A00FF);
            width: 100%; transition: width 0.05s linear;
        }
        #roundInfo { color: #8b949e; font-size: 0.95rem; margin-bottom: 10px; text-align: center; min-height: 24px; }
        #chartContainer {
            width: min(90vw, 700px); background: #161b22;
            border: 1px solid #30363d; border-radius: 12px; padding: 20px; display: none;
        }
        #chartContainer h2 { font-size: 1.2rem; margin-bottom: 15px; color: #00E5FF; }
        #chartCanvas { width: 100%; height: 300px; display: block; }
        .stats-summary { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; margin-top: 15px; }
        .stat-item { display: flex; align-items: center; gap: 6px; font-size: 0.85rem; color: #8b949e; }
        .stat-dot { width: 12px; height: 12px; border-radius: 3px; }
        @keyframes replicateFlash {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.5); opacity: 0.5; }
            100% { transform: scale(1); opacity: 1; }
        }
        .paper.replicating { animation: replicateFlash 0.6s ease; }
        .back-link { margin-top: 15px; color: #00E5FF; text-decoration: none; font-size: 0.9rem; }
        .back-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <h1>🦎 生物保护色实验</h1>
    <p class="subtitle">
        纯色背景下不同颜色的纸片代表不同生物。<br>
        3秒内点击你看到的纸片——越显眼越容易被发现而被"淘汰"。<br>
        剩下25%时幸存者复制3份恢复原数，最终看谁活到最后！
    </p>

    <div class="settings" id="settingsPanel">
        <div class="setting-item">
            <label>颜色种类</label>
            <input type="number" id="numColors" value="5" min="2" max="10">
        </div>
        <div class="setting-item">
            <label>纸片总数</label>
            <input type="number" id="totalPieces" value="20" min="4" step="4">
        </div>
        <div class="setting-item">
            <label>实验轮数</label>
            <input type="number" id="numRounds" value="8" min="3" max="20">
        </div>
        <div class="bg-color-select">
            <label>背景颜色（点击选择）</label>
            <div class="bg-options" id="bgOptions"></div>
        </div>
        <button class="btn-start" id="btnStart">开始实验</button>
    </div>

    <div id="timerBar"><div id="timerFill"></div></div>
    <div id="roundInfo"></div>
    <div id="gameArea"></div>

    <div id="chartContainer">
        <h2>📊 各颜色纸片数量变化</h2>
        <canvas id="chartCanvas"></canvas>
        <div class="stats-summary" id="statsSummary"></div>
    </div>

    <a class="back-link" href="../index.html">← 返回工具集</a>

<script>
// ─── Color Utilities ──────────────────────────────────────────────────────────
const PALETTE = [
    '#FF6B6B','#4ECDC4','#FFE66D','#95E1D3','#F38181',
    '#AA96DA','#FCBAD3','#A8D8EA','#FF9F43','#6C5CE7',
    '#00CEC9','#FD79A8','#A29BFE','#FAB1A0','#74B9FF'
];

function shuffle(arr) {
    return [...arr].sort(() => Math.random() - 0.5);
}

function parseHex(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
}

function toHex(r, g, b) {
    return '#' + [r,g,b].map(v => Math.max(0, Math.min(255, Math.round(v))).toString(16).padStart(2,'0')).join('');
}

function colorDist(c1, c2) {
    const [r1,g1,b1] = parseHex(c1);
    const [r2,g2,b2] = parseHex(c2);
    return Math.sqrt((r1-r2)**2 + (g1-g2)**2 + (b1-b2)**2);
}

// Shift a color in a given direction (offset RGB by up to range each channel)
function shiftColor(hex, range) {
    const [r,g,b] = parseHex(hex);
    const dr = (Math.random() - 0.5) * range * 2;
    const dg = (Math.random() - 0.5) * range * 2;
    const db = (Math.random() - 0.5) * range * 2;
    return toHex(r + dr, g + dg, b + db);
}

// Lighter variant of a color
function lighter(hex, amt) {
    const [r,g,b] = parseHex(hex);
    return toHex(r + amt, g + amt, b + amt);
}

// Darker variant of a color
function darker(hex, amt) {
    const [r,g,b] = parseHex(hex);
    return toHex(r - amt, g - amt, b - amt);
}

// Generate candidate card colors
function generateCardColors(n) {
    return shuffle(PALETTE).slice(0, n);
}

// Generate background options derived from card colors:
// For each card color, create: lighter variant, darker variant, and a random-shifted variant
// These are all "similar to" the card colors but may differ from each other
function generateBgOptions(cardColors) {
    const opts = new Set();
    cardColors.forEach(c => {
        opts.add(lighter(c, 50));
        opts.add(darker(c, 50));
        opts.add(shiftColor(c, 50));
        // Also add moderately similar
        opts.add(lighter(c, 30));
        opts.add(darker(c, 30));
        opts.add(shiftColor(c, 30));
    });
    return shuffle([...opts]).slice(0, 15);
}

// ─── State ───────────────────────────────────────────────────────────────────
let state = {};
let timerInterval = null;
let pieces = [];
let paperId = 0;
let roundActive = false;

// Candidate card colors for current settings (reset when settings change)
let candidateCardColors = [];

const gameArea = document.getElementById('gameArea');
const timerFill = document.getElementById('timerFill');
const roundInfo = document.getElementById('roundInfo');
const chartContainer = document.getElementById('chartContainer');
const statsSummary = document.getElementById('statsSummary');
const settingsPanel = document.getElementById('settingsPanel');
const bgOptionsEl = document.getElementById('bgOptions');

let selectedBgColor = null;

// ─── Build background options from preview card colors ────────────────────────
function buildBgOptions() {
    const numColors = Math.max(2, parseInt(document.getElementById('numColors').value) || 5);
    candidateCardColors = generateCardColors(numColors);
    const opts = generateBgOptions(candidateCardColors);
    selectedBgColor = opts[0];
    bgOptionsEl.innerHTML = '';
    opts.forEach(color => {
        const btn = document.createElement('div');
        btn.className = 'bg-option' + (color === selectedBgColor ? ' selected' : '');
        btn.style.background = color;
        btn.title = color;
        btn.addEventListener('click', () => {
            bgOptionsEl.querySelectorAll('.bg-option').forEach(o => o.classList.remove('selected'));
            btn.classList.add('selected');
            selectedBgColor = color;
        });
        bgOptionsEl.appendChild(btn);
    });
}

buildBgOptions();
document.getElementById('numColors').addEventListener('input', buildBgOptions);

// ─── Init Game ───────────────────────────────────────────────────────────────
function initGame() {
    const bgColor = selectedBgColor;
    const numColors = parseInt(document.getElementById('numColors').value);
    const totalPieces = parseInt(document.getElementById('totalPieces').value);
    const numRounds = parseInt(document.getElementById('numRounds').value);

    const baseCount = Math.floor(totalPieces / numColors);
    const remainder = totalPieces % numColors;

    // Card colors: derived from preview but ensure min distance from background
    let cardColors = shuffle([...candidateCardColors]);
    cardColors = cardColors.map(c => {
        if (colorDist(c, bgColor) < 40) {
            // Shift away from background
            let [r,g,b] = parseHex(c);
            const [br,bg,bb] = parseHex(bgColor);
            const factor = 0.6;
            r = Math.round(r + (r < 128 ? 80 : -80) * factor);
            g = Math.round(g + (g < 128 ? 80 : -80) * factor);
            b = Math.round(b + (b < 128 ? 80 : -80) * factor);
            return toHex(r, g, b);
        }
        return c;
    });

    // History: array of snapshots, each snapshot = {label, counts: {color: count}}
    state = {
        bgColor, cardColors, numRounds,
        currentRound: 0,
        originalTotal: totalPieces,
        history: [],        // [{label, counts: {color: count}}, ...]
        replicated: false,  // whether replicate has happened this game
    };

    // Distribute pieces
    let distribution = cardColors.map(() => baseCount);
    for (let i = 0; i < remainder; i++) {
        distribution[Math.floor(Math.random() * numColors)]++;
    }

    pieces = [];
    cardColors.forEach((color, ci) => {
        for (let i = 0; i < distribution[ci]; i++) {
            pieces.push({ id: paperId++, color, x: 0, y: 0, w: 0, h: 0, alive: true });
        }
    });

    chartContainer.style.display = 'none';
    settingsPanel.style.display = 'none';
    document.getElementById('timerBar').style.display = 'block';
    gameArea.style.background = bgColor;

    // Record initial state
    recordSnapshot('初始');

    startRound();
}

function recordSnapshot(label) {
    const counts = {};
    state.cardColors.forEach(c => {
        counts[c] = pieces.filter(p => p.alive && p.color === c).length;
    });
    state.history.push({ label, counts });
}

// ─── Place & Render ──────────────────────────────────────────────────────────
function placePieces() {
    const W = gameArea.clientWidth;
    const H = gameArea.clientHeight;
    const size = Math.max(22, Math.min(34, W * H / 2500));

    pieces.forEach(p => {
        if (!p.alive) return;
        let x, y, tries = 0;
        do {
            x = Math.random() * (W - size);
            y = Math.random() * (H - size);
            tries++;
        } while (tries < 40 && pieces.some(other =>
            other.alive && other.id !== p.id &&
            Math.abs(other.x - x) < size * 0.8 && Math.abs(other.y - y) < size * 0.8
        ));
        p.x = x; p.y = y; p.w = size; p.h = size;
    });
}

function renderPieces() {
    gameArea.innerHTML = '';
    pieces.forEach(p => {
        if (!p.alive) return;
        const el = document.createElement('div');
        el.className = 'paper';
        el.style.cssText = `left:${p.x}px;top:${p.y}px;width:${p.w}px;height:${p.h}px;background:${p.color};opacity:0.9;`;
        el.dataset.id = p.id;
        el.addEventListener('click', () => onPaperClick(p.id));
        gameArea.appendChild(el);
    });
}

// ─── Round Flow ──────────────────────────────────────────────────────────────
function startRound() {
    const alive = pieces.filter(p => p.alive);

    if (alive.length === 0) { endGame(); return; }
    if (state.currentRound >= state.numRounds) { endGame(); return; }

    state.currentRound++;
    roundActive = true;

    roundInfo.textContent = `第 ${state.currentRound} / ${state.numRounds} 轮 | 剩余 ${alive.length} 张`;

    placePieces();
    renderPieces();
    startTimer();
}

function startTimer() {
    let timeLeft = 3;
    timerFill.style.width = '100%';
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        timeLeft -= 0.05;
        timerFill.style.width = Math.max(0, (timeLeft / 3 * 100)) + '%';
        if (timeLeft <= 0) {
            clearInterval(timerInterval);
            if (roundActive) {
                roundActive = false;
                // Time's up: remove a random piece
                const alive = pieces.filter(p => p.alive);
                if (alive.length > 0) {
                    alive[Math.floor(Math.random() * alive.length)].alive = false;
                    renderPieces();
                }
                setTimeout(() => afterRound(false), 300);
            }
        }
    }, 50);
}

function onPaperClick(id) {
    if (!roundActive) return;
    roundActive = false;
    clearInterval(timerInterval);
    const p = pieces.find(x => x.id === id);
    if (p && p.alive) { p.alive = false; renderPieces(); }
    setTimeout(() => afterRound(true), 250);
}

function afterRound(clicked) {
    const alive = pieces.filter(p => p.alive);
    const threshold = Math.floor(state.originalTotal * 0.25);

    // Record state BEFORE possible replicate
    recordSnapshot(`R${state.currentRound}`);

    if (alive.length <= threshold && alive.length > 0 && !state.replicated) {
        // ── REPLICATE ──────────────────────────────────────────────────────
        state.replicated = true;
        document.querySelectorAll('.paper').forEach(el => el.classList.add('replicating'));
        roundInfo.textContent = `🎉 幸存者复制3份！`;

        setTimeout(() => {
            const W = gameArea.clientWidth;
            const H = gameArea.clientHeight;
            const size = Math.max(22, Math.min(34, W * H / 2500));
            const newPieces = [];

            state.cardColors.forEach(color => {
                const survivors = alive.filter(p => p.color === color);
                survivors.forEach(s => {
                    for (let i = 0; i < 3; i++) {
                        let x, y, tries = 0;
                        do {
                            x = Math.random() * (W - size);
                            y = Math.random() * (H - size);
                            tries++;
                        } while (tries < 25 && newPieces.some(np =>
                            Math.abs(np.x - x) < size && Math.abs(np.y - y) < size
                        ));
                        newPieces.push({ id: paperId++, color, x, y, w: size, h: size, alive: true });
                    }
                });
            });

            pieces = [...alive, ...newPieces];
            placePieces();
            renderPieces();

            // Record state AFTER replicate
            recordSnapshot(`复制后`);

            const count = pieces.filter(p => p.alive).length;
            roundInfo.textContent = `🎉 幸存者复制3份！| 现在 ${count} 张`;
            setTimeout(() => startRound(), 1800);
        }, 500);
    } else {
        // Normal next round (or end if done)
        const nextRound = state.currentRound + 1;
        if (nextRound > state.numRounds || pieces.filter(p=>p.alive).length === 0) {
            setTimeout(() => endGame(), 400);
        } else {
            setTimeout(() => startRound(), 400);
        }
    }
}

function endGame() {
    roundInfo.textContent = '实验结束！';
    document.getElementById('timerBar').style.display = 'none';
    gameArea.innerHTML = '';

    drawChart();
    chartContainer.style.display = 'block';

    // Final counts from last history entry
    const last = state.history[state.history.length - 1];
    statsSummary.innerHTML = state.cardColors.map((c, i) => {
        const count = last ? last.counts[c] : 0;
        return `<div class="stat-item"><div class="stat-dot" style="background:${c}"></div>${i+1}号色: ${count}张</div>`;
    }).join('');

    settingsPanel.style.display = 'flex';

    requestAnimationFrame(() => requestAnimationFrame(() => {
        requestAnimationFrame(drawChart);
    }));
}

// ─── Chart ───────────────────────────────────────────────────────────────────
function drawChart() {
    const canvas = document.getElementById('chartCanvas');
    if (!canvas) return;
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;
    const rect = canvas.getBoundingClientRect();
    if (rect.width === 0) return;

    canvas.width = rect.width * dpr;
    canvas.height = rect.height * dpr;
    ctx.scale(dpr, dpr);
    const W = rect.width, H = rect.height;
    ctx.clearRect(0, 0, W, H);

    const history = state.history;
    const cardColors = state.cardColors;
    if (history.length === 0 || cardColors.length === 0) return;

    const n = history.length;
    const allCounts = history.flatMap(h => Object.values(h.counts));
    const maxVal = Math.max(...allCounts, 1);

    const padL = 42, padR = 80, padT = 30, padB = 42;
    const chartW = W - padL - padR;
    const chartH = H - padT - padB;

    // Grid
    ctx.strokeStyle = '#21262d';
    ctx.lineWidth = 1;
    for (let i = 0; i <= 4; i++) {
        const y = padT + (chartH / 4) * i;
        ctx.beginPath(); ctx.moveTo(padL, y); ctx.lineTo(padL + chartW, y); ctx.stroke();
        ctx.fillStyle = '#8b949e';
        ctx.font = '11px Segoe UI';
        ctx.textAlign = 'right';
        ctx.fillText(Math.round(maxVal * (1 - i / 4)), padL - 5, y + 4);
    }

    // X labels
    ctx.textAlign = 'center';
    history.forEach((h, i) => {
        const x = padL + (chartW / (n - 1)) * i;
        ctx.fillText(h.label, x, H - padB + 16);
    });

    // Lines
    cardColors.forEach(color => {
        ctx.strokeStyle = color;
        ctx.lineWidth = 2.5;
        ctx.lineJoin = 'round';
        ctx.beginPath();
        history.forEach((h, i) => {
            const x = padL + (chartW / (n - 1)) * i;
            const y = padT + chartH - (h.counts[color] / maxVal) * chartH;
            i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
        });
        ctx.stroke();

        // Dots
        history.forEach((h, i) => {
            const x = padL + (chartW / (n - 1)) * i;
            const y = padT + chartH - (h.counts[color] / maxVal) * chartH;
            ctx.beginPath();
            ctx.arc(x, y, 4, 0, Math.PI * 2);
            ctx.fillStyle = color;
            ctx.fill();
        });
    });

    // Legend (right side)
    const legendX = padL + chartW + 12;
    ctx.font = '12px Segoe UI';
    cardColors.forEach((color, i) => {
        const ly = padT + 14 + i * 18;
        ctx.fillStyle = color;
        ctx.fillRect(legendX, ly - 9, 10, 10);
        ctx.fillStyle = '#ccc';
        ctx.textAlign = 'left';
        ctx.fillText(`${i+1}号`, legendX + 14, ly);
    });
}

// ─── Start ───────────────────────────────────────────────────────────────────
document.getElementById('btnStart').addEventListener('click', () => {
    const numColors = parseInt(document.getElementById('numColors').value);
    const totalPieces = parseInt(document.getElementById('totalPieces').value);
    const numRounds = parseInt(document.getElementById('numRounds').value);
    if (numColors < 2) { alert('颜色种类至少2种'); return; }
    if (totalPieces < numColors) { alert('纸片总数至少等于颜色种类数'); return; }
    if (!selectedBgColor) { alert('请先选择背景颜色'); return; }
    initGame();
});
</script>
</body>
</html>
