<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘词本 - 教学工具</title>
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --bg-color: #010409;
            --card-bg: #0d1117;
            --card-border: #30363d;
            --text-color: #ffffff;
            --text-muted: #8b949e;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            padding: 0 20px;
            background: rgba(1, 4, 9, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .back-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--text-color); }

        .page-title { flex: 1; text-align: center; font-size: 1rem; font-weight: 500; }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px 12px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .settings-btn:hover { background: rgba(255, 255, 255, 0.1); color: var(--secondary-color); }

        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 80px 20px 20px;
            max-width: 400px;
            margin: 0 auto;
        }

        .mode-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            padding: 25px 20px;
            cursor: pointer;
            text-align: center;
            transition: all 0.3s;
        }

        .mode-card:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-2px);
        }

        .mode-card .icon { font-size: 2rem; margin-bottom: 10px; }
        .mode-card .name { font-size: 0.95rem; font-weight: 500; }

        .mode-panel { display: none; padding: 80px 20px 20px; max-width: 500px; margin: 0 auto; }
        .mode-panel.active { display: block; }

        .container {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 20px;
        }

        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 0.85rem; color: var(--text-muted); margin-bottom: 6px; }
        .input-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.95rem;
        }

        .input-group input:focus { outline: none; border-color: var(--secondary-color); }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 0.95rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add { background: var(--primary-color); color: #fff; }
        .btn-add:active { background: #1e4a8a; }

        .word-list { max-height: 280px; overflow-y: auto; margin-top: 16px; }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .word-item .word { font-size: 0.95rem; font-weight: 500; }
        .word-item .translation { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
        .word-item .delete-btn {
            background: #c9302c;
            color: #fff;
            border: none;
            border-radius: 6px;
            padding: 6px 12px;
            font-size: 0.8rem;
            cursor: pointer;
        }

        .empty-state { text-align: center; color: var(--text-muted); padding: 30px; font-size: 0.9rem; }

        .filter-bar { display: flex; gap: 8px; margin-bottom: 12px; }
        .filter-bar select {
            flex: 1;
            padding: 10px 12px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 0.85rem;
        }

        .view-list { max-height: 380px; overflow-y: auto; }

        .view-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            margin-bottom: 8px;
        }

        .view-item .word-info { flex: 1; }
        .view-item .word { font-size: 0.95rem; font-weight: 500; }
        .view-item .translation { font-size: 0.85rem; color: var(--text-muted); margin-top: 2px; }
        .view-item .meta { font-size: 0.75rem; color: #666; margin-top: 2px; }
        .view-item .status { padding: 4px 10px; border-radius: 4px; font-size: 0.75rem; color: #fff; }
        .status.new { background: var(--primary-color); }
        .status.learning { background: #ff9500; }
        .status.mastered { background: #34c759; }

        .recite-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            padding: 24px;
            text-align: center;
            margin-bottom: 16px;
        }

        .recite-hint { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 12px; }
        .recite-chinese { font-size: 1.4rem; font-weight: 500; color: var(--secondary-color); margin-bottom: 20px; }

        .recite-input {
            width: 100%;
            padding: 12px;
            border: 1px solid var(--card-border);
            border-radius: 8px;
            background: var(--bg-color);
            color: var(--text-color);
            font-size: 1.1rem;
            text-align: center;
        }

        .recite-input:focus { outline: none; border-color: var(--secondary-color); }
        .recite-input.correct { border-color: #34c759; background: rgba(52, 199, 89, 0.1); }
        .recite-input.incorrect { border-color: #ff3b30; background: rgba(255, 59, 48, 0.1); }

        .recite-result { margin-top: 12px; font-size: 0.95rem; font-weight: 500; }
        .recite-result.correct { color: #34c759; }
        .recite-result.incorrect { color: #ff3b30; }

        .recite-answer { margin-top: 8px; font-size: 0.85rem; color: var(--text-muted); }

        .recite-progress {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .recite-progress .count { min-width: 50px; }
        .recite-progress .progress-bar {
            flex: 1;
            height: 6px;
            background: var(--card-border);
            border-radius: 3px;
            margin: 0 12px;
            overflow: hidden;
        }

        .recite-progress .progress-fill {
            height: 100%;
            background: var(--secondary-color);
            transition: width 0.3s;
        }

        .review-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 16px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
        }

        .review-info .stat-label { font-size: 0.8rem; color: var(--text-muted); }
        .review-info .stat-value { font-size: 1.3rem; font-weight: 600; color: var(--secondary-color); }

        .settings-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 200;
            display: none;
        }

        .settings-modal.open { display: flex; }

        .settings-content {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            padding: 24px;
            width: 280px;
        }

        .settings-content h3 { font-size: 1rem; margin-bottom: 16px; color: var(--secondary-color); }

        .setting-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .setting-row label { font-size: 0.9rem; color: var(--text-muted); }
        .setting-row input {
            width: 60px;
            padding: 8px;
            border: 1px solid var(--card-border);
            border-radius: 6px;
            background: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            font-size: 0.9rem;
        }

        .btn-save { background: var(--primary-color); color: #fff; margin-top: 12px; }

        /* Login prompt */
        .login-prompt {
            text-align: center;
            padding: 60px 20px;
        }

        .login-prompt h3 { margin-bottom: 15px; color: var(--text-color); }
        .login-prompt p { color: var(--text-muted); margin-bottom: 20px; }
        .login-prompt .btn-login {
            background: var(--primary-color);
            color: #fff;
            padding: 12px 30px;
            border-radius: 8px;
            text-decoration: none;
            display: inline-block;
        }
    </style>

<body>
    <header class="top-bar">
        <button class="back-btn" id="backBtn" style="display:none">←</button>
        <div class="page-title" id="pageTitle">摘词本</div>
        <button class="settings-btn" id="settingsBtn" onclick="openSettings()">⚙</button>
    </header>

    <div class="main-menu" id="mainMenu">
        <div class="mode-card" onclick="switchMode('input')">
            <div class="icon">✏️</div><div class="name">录入</div>
        </div>
        <div class="mode-card" onclick="switchMode('view')">
            <div class="icon">📖</div><div class="name">总览</div>
        </div>
        <div class="mode-card" onclick="switchMode('recite')">
            <div class="icon">🎯</div><div class="name">背诵</div>
        </div>
        <div class="mode-card" onclick="switchMode('review')">
            <div class="icon">🧠</div><div class="name">复习</div>
        </div>
    </div>

    <div class="mode-panel" id="inputPanel">
        <div class="container">
            <div class="input-group">
                <label>单词</label>
                <input type="text" id="wordInput" placeholder="English word">
            </div>
            <div class="input-group">
                <label>释义</label>
                <input type="text" id="transInput" placeholder="中文释义">
            </div>
            <button class="btn btn-add" onclick="addWord()">添加</button>
            <div class="word-list" id="wordList"></div>
        </div>
    </div>

    <div class="mode-panel" id="viewPanel">
        <div class="container">
            <div class="filter-bar">
                <select id="filterStatus">
                    <option value="all">全部</option>
                    <option value="new">未学习</option>
                    <option value="learning">学习中</option>
                    <option value="mastered">已掌握</option>
                </select>
                <select id="filterSort">
                    <option value="date-desc">新→旧</option>
                    <option value="date-asc">旧→新</option>
                    <option value="alpha">字母</option>
                </select>
            </div>
            <div class="view-list" id="viewList"></div>
        </div>
    </div>

    <div class="mode-panel" id="recitePanel">
        <div class="container">
            <div class="recite-progress">
                <span class="count" id="reciteCount">0/0</span>
                <div class="progress-bar"><div class="progress-fill" id="reciteProgress"></div></div>
                <span id="reciteRemaining">剩余 0</span>
            </div>
            <div class="recite-card">
                <div class="recite-hint">请写出单词</div>
                <div class="recite-chinese" id="reciteChinese"></div>
                <input type="text" class="recite-input" id="reciteInput" placeholder="输入英文" autocomplete="off">
                <div class="recite-result" id="reciteResult"></div>
                <div class="recite-answer" id="reciteAnswer"></div>
            </div>
            <button class="btn btn-add" id="reciteNextBtn" onclick="nextRecite()" style="display:none">下一个</button>
        </div>
    </div>

    <div class="mode-panel" id="reviewPanel">
        <div class="container">
            <div class="review-info">
                <div class="stat">
                    <div class="stat-value" id="reviewDue">0</div>
                    <div class="stat-label">待复习</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="reviewTotal">0</div>
                    <div class="stat-label">总单词</div>
                </div>
            </div>
            <div class="recite-progress">
                <span class="count" id="reviewCount">0/0</span>
                <div class="progress-bar"><div class="progress-fill" id="reviewProgress"></div></div>
                <span id="reviewRemaining">剩余 0</span>
            </div>
            <div class="recite-card">
                <div class="recite-hint">请写出单词</div>
                <div class="recite-chinese" id="reviewChinese"></div>
                <input type="text" class="recite-input" id="reviewInput" placeholder="输入英文" autocomplete="off">
                <div class="recite-result" id="reviewResult"></div>
                <div class="recite-answer" id="reviewAnswer"></div>
            </div>
            <button class="btn btn-add" id="reviewNextBtn" onclick="nextReview()" style="display:none">下一个</button>
        </div>
    </div>

    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h3>每日背诵数量</h3>
            <div class="setting-row">
                <label>数量:</label>
                <input type="number" id="dailyCount" value="10" min="1" max="50">
            </div>
            <button class="btn btn-save" onclick="closeSettings()">确定</button>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.oscarstudio.cn';
        const REVIEW_INTERVALS = [24, 48, 96, 168].map(h => h * 3600000);

        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }

        let token = localStorage.getItem('userToken');
        if (!token) token = getCookie('userToken');
        let words = [];
        let settings = JSON.parse(localStorage.getItem('wordbook_settings') || '{"dailyCount":10}');
        let reciteQueue = [], reciteIndex = 0;
        let reviewQueue = [], reviewIndex = 0;

        document.getElementById('dailyCount').value = settings.dailyCount;
        document.getElementById('backBtn').addEventListener('click', () => switchMode('menu'));

        function getHeaders() {
            return { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token };
        }

        async function fetchWords() {
            const res = await fetch(API_BASE + '/api/wordbook', { headers: getHeaders() });
            const data = await res.json();
            if (data.success) words = data.words;
            else if (res.status === 401) { token = null; localStorage.removeItem('userToken'); }
        }

        async function addWordAPI(word, translation) {
            const res = await fetch(API_BASE + '/api/wordbook', {
                method: 'POST',
                headers: getHeaders(),
                body: JSON.stringify({ word, translation })
            });
            return res.json();
        }

        async function deleteWordAPI(id) {
            const res = await fetch(API_BASE + '/api/wordbook/' + id, {
                method: 'DELETE',
                headers: getHeaders()
            });
            return res.json();
        }

        async function updateWordAPI(id, data) {
            const res = await fetch(API_BASE + '/api/wordbook/' + id, {
                method: 'PUT',
                headers: getHeaders(),
                body: JSON.stringify(data)
            });
            return res.json();
        }

        function openSettings() {
            document.getElementById('settingsModal').classList.add('open');
        }

        function closeSettings() {
            settings.dailyCount = parseInt(document.getElementById('dailyCount').value) || 10;
            localStorage.setItem('wordbook_settings', JSON.stringify(settings));
            document.getElementById('settingsModal').classList.remove('open');
        }

        async function switchMode(mode) {
            if (!token && mode !== 'menu') {
                alert('请先登录后再使用');
                return;
            }

            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            document.getElementById('mainMenu').style.display = mode === 'menu' ? 'grid' : 'none';
            document.getElementById('backBtn').style.display = mode === 'menu' ? 'none' : 'block';
            document.getElementById('settingsBtn').style.display = mode === 'menu' ? 'block' : 'none';
            document.getElementById('pageTitle').textContent = mode === 'menu' ? '摘词本' : {input:'录入',view:'总览',recite:'背诵',review:'复习'}[mode];

            if (mode !== 'menu') {
                document.getElementById(mode + 'Panel').classList.add('active');
                await loadModeData(mode);
            }
        }

        async function loadModeData(mode) {
            await fetchWords();
            if (mode === 'view') renderViewList();
            if (mode === 'recite') initRecite();
            if (mode === 'review') initReview();
            if (mode === 'input') renderWordList();
        }

        async function addWord() {
            const word = document.getElementById('wordInput').value.trim();
            const trans = document.getElementById('transInput').value.trim();
            if (!word || !trans) return alert('请填写单词和释义');

            const result = await addWordAPI(word, trans);
            if (result.success) {
                words.unshift(result.word);
                document.getElementById('wordInput').value = '';
                document.getElementById('transInput').value = '';
                document.getElementById('wordInput').focus();
                renderWordList();
            } else {
                alert(result.message || '添加失败');
            }
        }

        async function deleteWord(id) {
            if (!confirm('确定删除？')) return;
            const result = await deleteWordAPI(id);
            if (result.success) {
                words = words.filter(w => w.id !== id);
                renderWordList();
            }
        }

        function renderWordList() {
            const list = document.getElementById('wordList');
            if (!words.length) { list.innerHTML = '<div class="empty-state">暂无生词</div>'; return; }
            list.innerHTML = words.map(w => `<div class="word-item"><div><div class="word">${w.word}</div><div class="translation">${w.translation}</div></div><button class="delete-btn" onclick="deleteWord(${w.id})">删除</button></div>`).join('');
        }

        function renderViewList() {
            const list = document.getElementById('viewList');
            const fs = document.getElementById('filterStatus').value;
            const ft = document.getElementById('filterSort').value;
            let filtered = words.filter(w => {
                if (fs === 'all') return true;
                if (fs === 'new') return w.status === 'new';
                if (fs === 'learning') return w.status !== 'new';
                if (fs === 'mastered') return w.status === 'mastered';
                return true;
            });
            filtered.sort((a, b) => {
                if (ft === 'alpha') return a.word.localeCompare(b.word);
                if (ft === 'date-asc') return new Date(a.created_at) - new Date(b.created_at);
                return new Date(b.created_at) - new Date(a.created_at);
            });
            if (!filtered.length) { list.innerHTML = '<div class="empty-state">没有单词</div>'; return; }
            const statusText = {new:'未学习',learning:'学习中',mastered:'已掌握'};
            const statusCss = {new:'new',learning:'learning',mastered:'mastered'};
            list.innerHTML = filtered.map(w => `<div class="view-item"><div class="word-info"><div class="word">${w.word}</div><div class="translation">${w.translation}</div><div class="meta">复习 ${w.review_count || 0} 次</div></div><span class="status ${statusCss[w.status]}">${statusText[w.status]}</span></div>`).join('');
        }

        function initRecite() {
            reciteQueue = words.filter(w => w.status !== 'mastered').slice(0, settings.dailyCount);
            reciteIndex = 0;
            updateReciteProgress();
            if (!reciteQueue.length) { document.getElementById('reciteChinese').textContent = '已全部背完'; document.getElementById('reciteInput').style.display = 'none'; document.getElementById('reciteNextBtn').style.display = 'none'; return; }
            showReciteWord();
        }

        function showReciteWord() {
            if (reciteIndex >= reciteQueue.length) { document.getElementById('reciteChinese').textContent = '完成'; document.getElementById('reciteInput').style.display = 'none'; document.getElementById('reciteResult').textContent = ''; document.getElementById('reciteAnswer').textContent = ''; document.getElementById('reciteNextBtn').style.display = 'none'; return; }
            const w = reciteQueue[reciteIndex];
            document.getElementById('reciteChinese').textContent = w.translation;
            document.getElementById('reciteInput').value = '';
            document.getElementById('reciteInput').style.display = 'block';
            document.getElementById('reciteInput').className = 'recite-input';
            document.getElementById('reciteResult').textContent = '';
            document.getElementById('reciteAnswer').textContent = '';
            document.getElementById('reciteNextBtn').style.display = 'none';
            setTimeout(() => document.getElementById('reciteInput').focus(), 50);
        }

        async function checkRecite(e) {
            if (e.key !== 'Enter') return;
            const w = reciteQueue[reciteIndex];
            const ans = document.getElementById('reciteInput').value.trim();
            if (!ans) return;
            const ok = ans.toLowerCase() === w.word.toLowerCase();
            document.getElementById('reciteInput').classList.add(ok ? 'correct' : 'incorrect');
            document.getElementById('reciteResult').textContent = ok ? '✓' : '✗';
            document.getElementById('reciteResult').className = 'recite-result ' + (ok ? 'correct' : 'incorrect');
            document.getElementById('reciteAnswer').textContent = ok ? '' : '答案: ' + w.word;

            if (ok) {
                const prevCount = w.review_count || 0;
                const newCount = prevCount + 1;
                const newStatus = newCount >= 5 ? 'mastered' : 'learning';
                const nextReview = new Date(Date.now() + REVIEW_INTERVALS[Math.min(newCount - 1, 3)]).toISOString();
                await updateWordAPI(w.id, { status: newStatus, review_count: newCount, last_review: new Date().toISOString(), next_review: nextReview });
                w.status = newStatus;
                w.review_count = newCount;
                // 同时更新 words 数组中对应单词的状态
                const wordInList = words.find(x => x.id === w.id);
                if (wordInList) {
                    wordInList.status = newStatus;
                    wordInList.review_count = newCount;
                }
            }

            updateReciteProgress();
            document.getElementById('reciteNextBtn').style.display = 'block';
        }

        function nextRecite() { reciteIndex++; updateReciteProgress(); showReciteWord(); }
        function updateReciteProgress() { const t = reciteQueue.length, c = reciteIndex; document.getElementById('reciteCount').textContent = c + '/' + t; document.getElementById('reciteRemaining').textContent = '剩余 ' + Math.max(0, t-c); document.getElementById('reciteProgress').style.width = t ? (c/t*100) + '%' : '0%'; }

        function initReview() {
            const now = Date.now();
            reviewQueue = words.filter(w => w.status !== 'new' && (!w.next_review || new Date(w.next_review).getTime() <= now));
            reviewIndex = 0;
            document.getElementById('reviewDue').textContent = reviewQueue.length;
            document.getElementById('reviewTotal').textContent = words.filter(w => w.status !== 'new').length;
            updateReviewProgress();
            if (!reviewQueue.length) { document.getElementById('reviewChinese').textContent = '无需复习'; document.getElementById('reviewInput').style.display = 'none'; document.getElementById('reviewNextBtn').style.display = 'none'; return; }
            showReviewWord();
        }

        function showReviewWord() {
            if (reviewIndex >= reviewQueue.length) { document.getElementById('reviewChinese').textContent = '完成'; document.getElementById('reviewInput').style.display = 'none'; document.getElementById('reviewResult').textContent = ''; document.getElementById('reviewAnswer').textContent = ''; document.getElementById('reviewNextBtn').style.display = 'none'; return; }
            const w = reviewQueue[reviewIndex];
            document.getElementById('reviewChinese').textContent = w.translation;
            document.getElementById('reviewInput').value = '';
            document.getElementById('reviewInput').style.display = 'block';
            document.getElementById('reviewInput').className = 'recite-input';
            document.getElementById('reviewResult').textContent = '';
            document.getElementById('reviewAnswer').textContent = '';
            document.getElementById('reviewNextBtn').style.display = 'none';
            setTimeout(() => document.getElementById('reviewInput').focus(), 50);
        }

        async function checkReview(e) {
            if (e.key !== 'Enter') return;
            const w = reviewQueue[reviewIndex];
            const ans = document.getElementById('reviewInput').value.trim();
            if (!ans) return;
            const ok = ans.toLowerCase() === w.word.toLowerCase();
            document.getElementById('reviewInput').classList.add(ok ? 'correct' : 'incorrect');
            document.getElementById('reviewResult').textContent = ok ? '✓' : '✗';
            document.getElementById('reviewResult').className = 'recite-result ' + (ok ? 'correct' : 'incorrect');
            document.getElementById('reviewAnswer').textContent = ok ? '' : '答案: ' + w.word;

            const lastReview = new Date().toISOString();
            if (ok) {
                const newCount = (w.review_count || 0) + 1;
                const nextReview = new Date(Date.now() + REVIEW_INTERVALS[Math.min(newCount - 1, 3)]).toISOString();
                const newStatus = newCount >= 5 ? 'mastered' : 'learning';
                await updateWordAPI(w.id, { status: newStatus, review_count: newCount, last_review: lastReview, next_review: nextReview });
                w.status = newStatus;
                w.review_count = newCount;
                const wordInList = words.find(x => x.id === w.id);
                if (wordInList) {
                    wordInList.status = newStatus;
                    wordInList.review_count = newCount;
                }
            } else {
                await updateWordAPI(w.id, { status: 'learning', review_count: 0, last_review: lastReview, next_review: new Date(Date.now() + REVIEW_INTERVALS[0]).toISOString() });
                w.status = 'learning';
                w.review_count = 0;
                const wordInList = words.find(x => x.id === w.id);
                if (wordInList) {
                    wordInList.status = 'learning';
                    wordInList.review_count = 0;
                }
            }

            updateReviewProgress();
            initReview();
            document.getElementById('reviewNextBtn').style.display = 'block';
        }

        function nextReview() { reviewIndex++; updateReviewProgress(); showReviewWord(); }
        function updateReviewProgress() { const t = reviewQueue.length, c = reviewIndex; document.getElementById('reviewCount').textContent = c + '/' + t; document.getElementById('reviewRemaining').textContent = '剩余 ' + Math.max(0, t-c); document.getElementById('reviewProgress').style.width = t ? (c/t*100) + '%' : '0%'; }

        document.getElementById('reciteInput').addEventListener('keydown', checkRecite);
        document.getElementById('reviewInput').addEventListener('keydown', checkReview);
        document.getElementById('filterStatus').addEventListener('change', renderViewList);
        document.getElementById('filterSort').addEventListener('change', renderViewList);
    </script>
</body>
</html>
