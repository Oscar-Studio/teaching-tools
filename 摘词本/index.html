<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>摘词本 - 教学工具</title>
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --success-color: #28a745;
            --warning-color: #f59e0b;
            --danger-color: #e74c3c;
            --gradient-1: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --gradient-2: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            --gradient-3: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            --gradient-4: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            min-height: 100vh;
            color: var(--dark-color);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            background: var(--card-bg);
            border-bottom: var(--card-border);
            gap: 15px;
        }

        .back-btn {
            background: none;
            border: none;
            color: var(--dark-color);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s;
        }

        .back-btn:hover {
            background: rgba(255,255,255,0.1);
        }

        .page-title {
            flex: 1;
            font-size: 1.1rem;
            color: var(--dark-color);
        }

        .settings-btn {
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: all 0.2s;
        }

        .settings-btn:hover {
            background: rgba(255,255,255,0.1);
            color: var(--dark-color);
        }

        /* Main Menu */
        .main-menu {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            padding: 20px;
            max-width: 500px;
            margin: 0 auto;
        }

        .mode-card {
            aspect-ratio: 1;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: transform 0.3s, box-shadow 0.3s;
            position: relative;
            overflow: hidden;
        }

        .mode-card:hover {
            transform: translateY(-5px);
        }

        .mode-card::before {
            content: '';
            position: absolute;
            inset: 0;
            opacity: 0.15;
        }

        .mode-card .icon {
            font-size: 3rem;
            z-index: 1;
        }

        .mode-card .name {
            font-size: 1.1rem;
            font-weight: 600;
            z-index: 1;
        }

        .mode-card .desc {
            font-size: 0.75rem;
            opacity: 0.8;
            z-index: 1;
            text-align: center;
            padding: 0 15px;
        }

        .card-input { background: var(--gradient-1); color: white; box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3); }
        .card-input::before { background: var(--gradient-1); }
        .card-view { background: var(--gradient-2); color: white; box-shadow: 0 8px 25px rgba(245, 87, 108, 0.3); }
        .card-view::before { background: var(--gradient-2); }
        .card-recite { background: var(--gradient-3); color: white; box-shadow: 0 8px 25px rgba(79, 172, 254, 0.3); }
        .card-recite::before { background: var(--gradient-3); }
        .card-review { background: var(--gradient-4); color: white; box-shadow: 0 8px 25px rgba(67, 233, 123, 0.3); }
        .card-review::before { background: var(--gradient-4); }

        /* Mode Panel */
        .mode-panel {
            display: none;
            padding: 20px;
            max-width: 600px;
            margin: 0 auto;
        }

        .mode-panel.active {
            display: block;
        }

        .container {
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            border: var(--card-border);
            box-shadow: var(--card-shadow);
        }

        /* Input Panel */
        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: var(--text-secondary);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .btn {
            padding: 14px 25px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
        }

        .btn-add {
            width: 100%;
            background: var(--gradient-1);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-2px);
        }

        .word-list {
            max-height: 300px;
            overflow-y: auto;
            margin-top: 20px;
        }

        .word-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 10px;
            transition: background 0.2s;
        }

        .word-item:hover {
            background: rgba(0, 0, 0, 0.4);
        }

        .word-item .word {
            font-size: 1.1rem;
            font-weight: 500;
        }

        .word-item .translation {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-top: 4px;
        }

        .word-item .delete-btn {
            background: var(--danger-color);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: opacity 0.2s;
        }

        .word-item .delete-btn:hover {
            opacity: 0.8;
        }

        .empty-state {
            text-align: center;
            color: var(--text-secondary);
            padding: 40px 20px;
            font-size: 0.95rem;
        }

        /* View Panel */
        .filter-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        .filter-bar select {
            flex: 1;
            min-width: 100px;
            padding: 12px;
            border-radius: 10px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            font-size: 0.9rem;
        }

        .view-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .view-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .view-item .word-info {
            flex: 1;
        }

        .view-item .word {
            font-size: 1.1rem;
            font-weight: 500;
            margin-bottom: 4px;
        }

        .view-item .translation {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .view-item .meta {
            font-size: 0.75rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        .view-item .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status.new {
            background: var(--primary-color);
            color: white;
        }

        .status.learning {
            background: var(--warning-color);
            color: white;
        }

        .status.mastered {
            background: var(--success-color);
            color: white;
        }

        /* Recite/Review Panel */
        .recite-card {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            margin-bottom: 20px;
        }

        .recite-hint {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .recite-chinese {
            font-size: 1.6rem;
            color: var(--secondary-color);
            margin-bottom: 25px;
            font-weight: 500;
        }

        .recite-input {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            font-size: 1.2rem;
            text-align: center;
            transition: border-color 0.3s;
        }

        .recite-input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .recite-input.correct {
            border-color: var(--success-color);
            background: rgba(40, 167, 69, 0.1);
        }

        .recite-input.incorrect {
            border-color: var(--danger-color);
            background: rgba(231, 76, 60, 0.1);
        }

        .recite-result {
            margin-top: 15px;
            font-size: 1.1rem;
            font-weight: 500;
        }

        .recite-result.correct {
            color: var(--success-color);
        }

        .recite-result.incorrect {
            color: var(--danger-color);
        }

        .recite-answer {
            margin-top: 10px;
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .recite-progress {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .recite-progress .count {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .recite-progress .progress-bar {
            flex: 1;
            height: 8px;
            background: var(--card-border);
            border-radius: 4px;
            margin: 0 15px;
            overflow: hidden;
        }

        .recite-progress .progress-fill {
            height: 100%;
            background: var(--gradient-3);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Review Info */
        .review-info {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
        }

        .review-info .stat {
            text-align: center;
        }

        .review-info .stat-value {
            font-size: 1.6rem;
            font-weight: 600;
            background: var(--gradient-4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .review-info .stat-label {
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 4px;
        }

        /* Settings Modal */
        .settings-modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none;
        }

        .settings-modal.open {
            display: flex;
        }

        .settings-content {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 30px;
            max-width: 350px;
            width: 90%;
            border: var(--card-border);
        }

        .settings-content h3 {
            color: var(--secondary-color);
            margin-bottom: 25px;
            text-align: center;
            font-size: 1.2rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 20px 0;
        }

        .setting-row label {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        .setting-row input {
            width: 80px;
            padding: 10px;
            border-radius: 8px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            text-align: center;
            font-size: 1rem;
        }

        .btn-save {
            width: 100%;
            background: var(--gradient-3);
            color: white;
            margin-top: 10px;
        }

        footer {
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.85rem;
            padding: 20px;
        }
    </style>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <button class="back-btn" id="backBtn" style="display:none">← 返回</button>
        <div class="page-title" id="pageTitle">摘词本</div>
        <button class="settings-btn" id="settingsBtn" onclick="openSettings()">⚙</button>
    </header>

    <!-- Main Menu -->
    <div class="main-menu" id="mainMenu">
        <button class="mode-card card-input" onclick="switchMode('input')">
            <span class="icon">✏️</span>
            <span class="name">录入</span>
            <span class="desc">添加新单词</span>
        </button>
        <button class="mode-card card-view" onclick="switchMode('view')">
            <span class="icon">📖</span>
            <span class="name">总览</span>
            <span class="desc">查看所有单词</span>
        </button>
        <button class="mode-card card-recite" onclick="switchMode('recite')">
            <span class="icon">🎯</span>
            <span class="name">背诵</span>
            <span class="desc">每日定量背诵</span>
        </button>
        <button class="mode-card card-review" onclick="switchMode('review')">
            <span class="icon">🧠</span>
            <span class="name">复习</span>
            <span class="desc">艾宾浩斯复习</span>
        </button>
    </div>

    <!-- Input Panel -->
    <div class="mode-panel" id="inputPanel">
        <div class="container">
            <div class="input-group">
                <label>单词 (English)</label>
                <input type="text" id="wordInput" placeholder="输入英语单词">
            </div>
            <div class="input-group">
                <label>中文释义</label>
                <input type="text" id="transInput" placeholder="输入中文释义">
            </div>
            <button class="btn btn-add" onclick="addWord()">添加生词</button>
            <div class="word-list" id="wordList"></div>
        </div>
    </div>

    <!-- View Panel -->
    <div class="mode-panel" id="viewPanel">
        <div class="container">
            <div class="filter-bar">
                <select id="filterStatus">
                    <option value="all">全部状态</option>
                    <option value="new">未学习</option>
                    <option value="learning">学习中</option>
                    <option value="mastered">已掌握</option>
                </select>
                <select id="filterSort">
                    <option value="date-desc">按时间 (新→旧)</option>
                    <option value="date-asc">按时间 (旧→新)</option>
                    <option value="alpha">按字母顺序</option>
                </select>
            </div>
            <div class="view-list" id="viewList"></div>
        </div>
    </div>

    <!-- Recite Panel -->
    <div class="mode-panel" id="recitePanel">
        <div class="container">
            <div class="recite-progress">
                <span class="count" id="reciteCount">0/0</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="reciteProgress"></div>
                </div>
                <span class="count" id="reciteRemaining">剩余: 0</span>
            </div>
            <div class="recite-card">
                <div class="recite-hint">请写出单词</div>
                <div class="recite-chinese" id="reciteChinese"></div>
                <input type="text" class="recite-input" id="reciteInput" placeholder="输入英文单词" autocomplete="off">
                <div class="recite-result" id="reciteResult"></div>
                <div class="recite-answer" id="reciteAnswer"></div>
            </div>
            <button class="btn btn-add" id="reciteNextBtn" onclick="nextRecite()" style="display:none">下一个 →</button>
        </div>
    </div>

    <!-- Review Panel -->
    <div class="mode-panel" id="reviewPanel">
        <div class="container">
            <div class="review-info">
                <div class="stat">
                    <div class="stat-value" id="reviewDue">0</div>
                    <div class="stat-label">待复习</div>
                </div>
                <div class="stat">
                    <div class="stat-value" id="reviewTotal">0</div>
                    <div class="stat-label">总单词</div>
                </div>
            </div>
            <div class="recite-progress">
                <span class="count" id="reviewCount">0/0</span>
                <div class="progress-bar">
                    <div class="progress-fill" id="reviewProgress"></div>
                </div>
                <span class="count" id="reviewRemaining">剩余: 0</span>
            </div>
            <div class="recite-card">
                <div class="recite-hint">请写出单词</div>
                <div class="recite-chinese" id="reviewChinese"></div>
                <input type="text" class="recite-input" id="reviewInput" placeholder="输入英文单词" autocomplete="off">
                <div class="recite-result" id="reviewResult"></div>
                <div class="recite-answer" id="reviewAnswer"></div>
            </div>
            <button class="btn btn-add" id="reviewNextBtn" onclick="nextReview()" style="display:none">下一个 →</button>
        </div>
    </div>

    <!-- Settings Modal -->
    <div class="settings-modal" id="settingsModal">
        <div class="settings-content">
            <h3>⚙️ 设置</h3>
            <div class="setting-row">
                <label>每日背诵数量:</label>
                <input type="number" id="dailyCount" value="10" min="1" max="50">
            </div>
            <button class="btn btn-save" onclick="closeSettings()">确定</button>
        </div>
    </div>

    <footer>
        <p>摘词本 &copy; 2026 - Designed by Oscar</p>
    </footer>

    <script>
        let words = JSON.parse(localStorage.getItem('wordbook') || '[]');
        let settings = JSON.parse(localStorage.getItem('wordbook_settings') || '{"dailyCount":10}');
        const STORAGE_KEY = 'wordbook';
        const SETTINGS_KEY = 'wordbook_settings';

        const REVIEW_INTERVALS = {
            1: 1 * 60 * 60 * 1000,
            2: 12 * 60 * 60 * 1000,
            3: 1 * 24 * 60 * 60 * 1000,
            4: 2 * 24 * 60 * 60 * 1000,
            5: 4 * 24 * 60 * 60 * 1000,
            6: 7 * 24 * 60 * 60 * 1000,
            7: 15 * 24 * 60 * 60 * 1000
        };

        let currentMode = 'menu';
        let reciteQueue = [];
        let reciteIndex = 0;
        let reviewQueue = [];
        let reviewIndex = 0;

        const backBtn = document.getElementById('backBtn');
        const pageTitle = document.getElementById('pageTitle');
        const mainMenu = document.getElementById('mainMenu');
        const settingsBtn = document.getElementById('settingsBtn');

        document.getElementById('dailyCount').value = settings.dailyCount;

        backBtn.addEventListener('click', () => switchMode('menu'));

        function openSettings() {
            document.getElementById('settingsModal').classList.add('open');
        }

        function closeSettings() {
            settings.dailyCount = parseInt(document.getElementById('dailyCount').value) || 10;
            localStorage.setItem(SETTINGS_KEY, JSON.stringify(settings));
            document.getElementById('settingsModal').classList.remove('open');
        }

        function switchMode(mode) {
            currentMode = mode;

            // Reset panels
            document.querySelectorAll('.mode-panel').forEach(p => p.classList.remove('active'));
            mainMenu.style.display = 'none';

            if (mode === 'menu') {
                mainMenu.style.display = 'grid';
                backBtn.style.display = 'none';
                pageTitle.textContent = '摘词本';
                settingsBtn.style.display = 'block';
            } else {
                backBtn.style.display = 'block';
                settingsBtn.style.display = 'none';
                const titles = { input: '录入', view: '总览', recite: '背诵', review: '复习' };
                pageTitle.textContent = titles[mode];
                document.getElementById(`${mode}Panel`).classList.add('active');

                if (mode === 'view') renderViewList();
                if (mode === 'recite') initRecite();
                if (mode === 'review') initReview();
            }
        }

        function addWord() {
            const wordInput = document.getElementById('wordInput');
            const transInput = document.getElementById('transInput');
            const word = wordInput.value.trim();
            const translation = transInput.value.trim();

            if (!word || !translation) {
                alert('请填写单词和中文释义');
                return;
            }

            if (words.some(w => w.word.toLowerCase() === word.toLowerCase())) {
                alert('该单词已存在');
                return;
            }

            words.push({
                id: Date.now(),
                word: word,
                translation: translation,
                status: 'new',
                reviewCount: 0,
                lastReview: null,
                nextReview: null,
                createdAt: new Date().toISOString()
            });

            saveWords();
            wordInput.value = '';
            transInput.value = '';
            wordInput.focus();
            renderWordList();
        }

        function deleteWord(id) {
            words = words.filter(w => w.id !== id);
            saveWords();
            renderWordList();
        }

        function saveWords() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(words));
        }

        function renderWordList() {
            const list = document.getElementById('wordList');
            if (words.length === 0) {
                list.innerHTML = '<div class="empty-state">暂无生词，添加一个吧 ✨</div>';
                return;
            }

            list.innerHTML = words.slice().reverse().map(w => `
                <div class="word-item">
                    <div>
                        <div class="word">${escapeHtml(w.word)}</div>
                        <div class="translation">${escapeHtml(w.translation)}</div>
                    </div>
                    <button class="delete-btn" onclick="deleteWord(${w.id})">删除</button>
                </div>
            `).join('');
        }

        function renderViewList() {
            const list = document.getElementById('viewList');
            const filterStatus = document.getElementById('filterStatus').value;
            const filterSort = document.getElementById('filterSort').value;

            let filtered = words.filter(w => {
                if (filterStatus === 'all') return true;
                return w.status === filterStatus;
            });

            filtered.sort((a, b) => {
                if (filterSort === 'alpha') return a.word.localeCompare(b.word);
                if (filterSort === 'date-asc') return new Date(a.createdAt) - new Date(b.createdAt);
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            if (filtered.length === 0) {
                list.innerHTML = '<div class="empty-state">没有符合条件的单词</div>';
                return;
            }

            list.innerHTML = filtered.map(w => `
                <div class="view-item">
                    <div class="word-info">
                        <div class="word">${escapeHtml(w.word)}</div>
                        <div class="translation">${escapeHtml(w.translation)}</div>
                        <div class="meta">添加时间: ${formatDate(w.createdAt)}</div>
                    </div>
                    <span class="status ${w.status}">${getStatusText(w.status)}</span>
                </div>
            `).join('');
        }

        function getStatusText(status) {
            const map = { new: '未学习', learning: '学习中', mastered: '已掌握' };
            return map[status] || status;
        }

        function formatDate(dateStr) {
            const d = new Date(dateStr);
            return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')}`;
        }

        // Recite Mode
        function initRecite() {
            const notMastered = words.filter(w => w.status !== 'mastered');
            reciteQueue = notMastered.slice(0, settings.dailyCount);
            reciteIndex = 0;
            updateReciteProgress();

            if (reciteQueue.length === 0) {
                document.getElementById('reciteChinese').textContent = '🎉 恭喜！所有单词已背完';
                document.getElementById('reciteInput').style.display = 'none';
                document.getElementById('reciteNextBtn').style.display = 'none';
                return;
            }

            showReciteWord();
        }

        function showReciteWord() {
            if (reciteIndex >= reciteQueue.length) {
                document.getElementById('reciteChinese').textContent = '🎉 今日任务完成！';
                document.getElementById('reciteInput').style.display = 'none';
                document.getElementById('reciteResult').textContent = '';
                document.getElementById('reciteAnswer').textContent = '';
                document.getElementById('reciteNextBtn').style.display = 'none';
                return;
            }

            const word = reciteQueue[reciteIndex];
            document.getElementById('reciteChinese').textContent = word.translation;
            document.getElementById('reciteInput').value = '';
            document.getElementById('reciteInput').style.display = 'block';
            document.getElementById('reciteInput').classList.remove('correct', 'incorrect');
            document.getElementById('reciteResult').textContent = '';
            document.getElementById('reciteResult').className = 'recite-result';
            document.getElementById('reciteAnswer').textContent = '';
            document.getElementById('reciteNextBtn').style.display = 'none';

            setTimeout(() => document.getElementById('reciteInput').focus(), 50);
        }

        function checkRecite(e) {
            if (e.key !== 'Enter') return;

            const input = document.getElementById('reciteInput');
            const word = reciteQueue[reciteIndex];
            const userAnswer = input.value.trim();
            if (!userAnswer) return;

            const isCorrect = userAnswer.toLowerCase() === word.word.toLowerCase();
            input.classList.add(isCorrect ? 'correct' : 'incorrect');

            const result = document.getElementById('reciteResult');
            result.textContent = isCorrect ? '✓ 正确！' : '✗ 错误';
            result.className = 'recite-result ' + (isCorrect ? 'correct' : 'incorrect');
            document.getElementById('reciteAnswer').textContent = word.word;

            if (isCorrect) {
                word.status = 'learning';
                word.reviewCount++;
                word.lastReview = new Date().toISOString();
                word.nextReview = new Date(Date.now() + (REVIEW_INTERVALS[word.reviewCount] || REVIEW_INTERVALS[7])).toISOString();
                if (word.reviewCount >= 4) word.status = 'mastered';
            }

            saveWords();
            updateReciteProgress();
            document.getElementById('reciteNextBtn').style.display = 'block';
        }

        function nextRecite() {
            reciteIndex++;
            updateReciteProgress();
            showReciteWord();
        }

        function updateReciteProgress() {
            const total = reciteQueue.length;
            const current = reciteIndex;
            document.getElementById('reciteCount').textContent = `${current}/${total}`;
            document.getElementById('reciteRemaining').textContent = `剩余: ${Math.max(0, total - current)}`;
            document.getElementById('reciteProgress').style.width = total > 0 ? `${(current / total) * 100}%` : '0%';
        }

        // Review Mode
        function initReview() {
            const now = new Date().getTime();
            const dueWords = words.filter(w => {
                if (w.status === 'new') return false;
                if (!w.nextReview) return true;
                return new Date(w.nextReview).getTime() <= now;
            });

            reviewQueue = dueWords;
            reviewIndex = 0;

            const totalCount = words.filter(w => w.status !== 'new').length;
            document.getElementById('reviewDue').textContent = dueWords.length;
            document.getElementById('reviewTotal').textContent = totalCount;
            updateReviewProgress();

            if (reviewQueue.length === 0) {
                document.getElementById('reviewChinese').textContent = '✨ 暂无需要复习的单词';
                document.getElementById('reviewInput').style.display = 'none';
                document.getElementById('reviewNextBtn').style.display = 'none';
                return;
            }

            showReviewWord();
        }

        function showReviewWord() {
            if (reviewIndex >= reviewQueue.length) {
                document.getElementById('reviewChinese').textContent = '🎉 复习完成！';
                document.getElementById('reviewInput').style.display = 'none';
                document.getElementById('reviewResult').textContent = '';
                document.getElementById('reviewAnswer').textContent = '';
                document.getElementById('reviewNextBtn').style.display = 'none';
                return;
            }

            const word = reviewQueue[reviewIndex];
            document.getElementById('reviewChinese').textContent = word.translation;
            document.getElementById('reviewInput').value = '';
            document.getElementById('reviewInput').style.display = 'block';
            document.getElementById('reviewInput').classList.remove('correct', 'incorrect');
            document.getElementById('reviewResult').textContent = '';
            document.getElementById('reviewResult').className = 'recite-result';
            document.getElementById('reviewAnswer').textContent = '';
            document.getElementById('reviewNextBtn').style.display = 'none';

            setTimeout(() => document.getElementById('reviewInput').focus(), 50);
        }

        function checkReview(e) {
            if (e.key !== 'Enter') return;

            const input = document.getElementById('reviewInput');
            const word = reviewQueue[reviewIndex];
            const userAnswer = input.value.trim();
            if (!userAnswer) return;

            const isCorrect = userAnswer.toLowerCase() === word.word.toLowerCase();
            input.classList.add(isCorrect ? 'correct' : 'incorrect');

            const result = document.getElementById('reviewResult');
            result.textContent = isCorrect ? '✓ 正确！' : '✗ 错误';
            result.className = 'recite-result ' + (isCorrect ? 'correct' : 'incorrect');
            document.getElementById('reviewAnswer').textContent = word.word;

            word.lastReview = new Date().toISOString();
            if (isCorrect) {
                word.reviewCount++;
                word.nextReview = new Date(Date.now() + REVIEW_INTERVALS[Math.min(word.reviewCount, 7)]).toISOString();
                if (word.reviewCount >= 4) word.status = 'mastered';
            } else {
                word.reviewCount = 0;
                word.nextReview = new Date(Date.now() + REVIEW_INTERVALS[1]).toISOString();
                word.status = 'learning';
            }

            saveWords();
            updateReviewProgress();
            initReview();
            document.getElementById('reviewNextBtn').style.display = 'block';
        }

        function nextReview() {
            reviewIndex++;
            updateReviewProgress();
            showReviewWord();
        }

        function updateReviewProgress() {
            const total = reviewQueue.length;
            const current = reviewIndex;
            document.getElementById('reviewCount').textContent = `${current}/${total}`;
            document.getElementById('reviewRemaining').textContent = `剩余: ${Math.max(0, total - current)}`;
            document.getElementById('reviewProgress').style.width = total > 0 ? `${(current / total) * 100}%` : '0%';
        }

        document.getElementById('reciteInput').addEventListener('keydown', checkRecite);
        document.getElementById('reviewInput').addEventListener('keydown', checkReview);
        document.getElementById('filterStatus').addEventListener('change', renderViewList);
        document.getElementById('filterSort').addEventListener('change', renderViewList);

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }
    </script>
</body>
</html>
