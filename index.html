<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学工具 - Oscar Studio</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <div class="breadcrumb">Oscar Studio > <span>teaching-tools</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索工具...">
        </div>
        <button class="settings-btn" id="settingsBtn">⚙</button>
        <div class="settings-dropdown" id="settingsDropdown">
            <h4>画质设置</h4>
            <label class="settings-option">
                <input type="radio" name="quality" value="low">
                <span class="radio"></span>
                <span>低（去除动画）</span>
            </label>
            <label class="settings-option">
                <input type="radio" name="quality" value="normal" checked>
                <span class="radio"></span>
                <span>正常</span>
            </label>
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-icon">📚</div>
        <h1>教学工具</h1>
        <p>丰富的 HTML 演示工具，专为教师和学生设计。包含函数图像绘制、几何图形演示、化学方程式配平、计时器、抽签器等多种实用工具，让抽象的知识变得直观可见，使课堂教学更加生动有趣，提升学习效率。</p>
    </section>

    <!-- Card Container -->
    <main class="card-container" id="cardContainer"></main>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop"></div>

    <script src="script.js"></script>
</body>
</html>
