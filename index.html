<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>教学工具 - Oscar Studio</title>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --bg-color: #010409;
            --card-bg: #0d1117;
            --card-border: #30363d;
            --text-color: #ffffff;
            --text-muted: #8b949e;
            --elastic-bezier: cubic-bezier(0.34, 1.56, 0.64, 1);
            --smooth-bezier: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', 'Arial', sans-serif;
        }

        body {
            background: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            overflow-x: hidden;
            padding-top: 60px;
        }

        /* Top Bar */
        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            background: rgba(1, 4, 9, 0.95);
            backdrop-filter: blur(10px);
            z-index: 100;
            border-bottom: 1px solid var(--card-border);
        }

        .breadcrumb {
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .breadcrumb span {
            color: var(--secondary-color);
        }

        .search-box input {
            width: 280px;
            padding: 10px 20px;
            border-radius: 20px;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            color: var(--text-color);
            font-size: 0.9rem;
            outline: none;
            transition: all 0.3s ease;
        }

        .search-box input:focus {
            border-color: var(--secondary-color);
            box-shadow: 0 0 0 3px rgba(0, 229, 255, 0.15);
        }

        .search-box input::placeholder {
            color: var(--text-muted);
        }

        /* Hero Section */
        .hero {
            padding-top: 100px;
            padding-bottom: 80px;
            text-align: center;
            background: linear-gradient(180deg, rgba(42, 92, 170, 0.15) 0%, rgba(1, 4, 9, 1) 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .hero-icon {
            font-size: 5rem;
            margin-bottom: 25px;
        }

        .hero h1 {
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 25px;
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .hero p {
            max-width: 700px;
            margin: 0 auto;
            font-size: 1.15rem;
            color: var(--text-muted);
            line-height: 1.9;
            padding: 0 20px;
        }

        /* Card Container */
        .card-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
            gap: 20px;
            padding: 40px;
            max-width: 1100px;
            margin: 0 auto;
        }

        /* Category Header */
        .category-section {
            grid-column: 1 / -1;
            margin: 30px 0 15px 0;
            padding-bottom: 10px;
            border-bottom: 2px solid var(--card-border);
        }

        .category-section:first-child {
            margin-top: 0;
        }

        .category-title {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--secondary-color);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .category-title::before {
            content: '';
            width: 4px;
            height: 20px;
            background: linear-gradient(180deg, var(--primary-color), var(--secondary-color));
            border-radius: 2px;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 12px;
            min-height: 90px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            justify-content: center;
            gap: 8px;
            padding: 15px 20px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: transform 0.3s ease, border-color 0.3s ease, box-shadow 0.3s ease;
        }

        .card-icon {
            font-size: 1.8rem;
            flex-shrink: 0;
        }

        .card-header {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .card-name {
            flex: 1;
        }

        .card-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
        }

        .card-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(42, 92, 170, 0.2);
            border: 1px solid rgba(42, 92, 170, 0.4);
            color: var(--secondary-color);
            border-radius: 10px;
        }

        .card:hover {
            border-color: var(--secondary-color);
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(0, 229, 255, 0.15);
        }

        .card.hiding {
            animation: slideDown 900ms var(--smooth-bezier) forwards;
        }

        .card.returning {
            animation: slideDownFromTop 700ms var(--elastic-bezier) forwards;
        }

        @keyframes slideDown {
            to {
                transform: translateY(120vh);
                opacity: 0;
            }
        }

        @keyframes slideDownFromTop {
            0% {
                transform: translateY(-100vh);
                opacity: 0;
            }
            60% {
                transform: translateY(10px);
                opacity: 1;
            }
            80% {
                transform: translateY(-5px);
                opacity: 1;
            }
            100% {
                transform: translateY(0);
                opacity: 1;
            }
        }

        /* Floating Morphing Card */
        .morph-card {
            position: fixed;
            z-index: 300;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
            cursor: default;
            pointer-events: auto;
            overflow: hidden;
        }

        /* Compact state (initial) */
        .morph-card.compact {
            width: 240px;
            min-height: 90px;
            padding: 15px 20px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .morph-card .morph-header {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .morph-card .morph-icon {
            font-size: 1.8rem;
        }

        .morph-card .morph-name {
            flex: 1;
            font-size: 1rem;
            font-weight: 500;
        }

        .morph-card .morph-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            width: 100%;
        }

        .morph-card .morph-tag {
            font-size: 0.7rem;
            padding: 2px 8px;
            background: rgba(42, 92, 170, 0.2);
            border: 1px solid rgba(42, 92, 170, 0.4);
            color: var(--secondary-color);
            border-radius: 10px;
        }

        /* Expanded state */
        .morph-card.expanded {
            width: 450px;
            min-height: auto;
            padding: 40px;
            text-align: center;
            border-color: var(--secondary-color);
            box-shadow: 0 20px 60px rgba(0, 229, 255, 0.2);
        }

        .morph-card.expanded .morph-header,
        .morph-card.expanded .morph-tags {
            display: none;
        }

        .morph-card.expanded .morph-content {
            display: block;
        }

        .morph-card .morph-content {
            display: none;
        }

        .morph-card.expanded .morph-content .morph-big-icon {
            font-size: 4.5rem;
            margin-bottom: 20px;
        }

        .morph-card.expanded .morph-content h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--text-color);
        }

        .morph-card.expanded .morph-content p {
            color: var(--text-muted);
            font-size: 1rem;
            line-height: 1.7;
            margin-bottom: 25px;
        }

        .morph-card.expanded .morph-content .btn-explore {
            display: inline-block;
            padding: 12px 40px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 1rem;
            font-weight: 600;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .morph-card.expanded .morph-content .btn-explore:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(106, 0, 255, 0.3);
        }

        .morph-card .close-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 32px;
            height: 32px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: var(--text-muted);
            font-size: 1.3rem;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.3s ease;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .morph-card.expanded .close-btn {
            display: flex;
        }

        .morph-card .close-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            color: var(--text-color);
        }

        /* Backdrop */
        .backdrop {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 250;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.3s ease, visibility 0.3s ease;
        }

        .backdrop.active {
            opacity: 1;
            visibility: visible;
        }

        /* No results */
        .no-results {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
            font-size: 1.2rem;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .top-bar {
                padding: 0 20px;
            }

            .search-box input {
                width: 160px;
            }

            .hero {
                padding-top: 80px;
                padding-bottom: 60px;
                min-height: auto;
            }

            .hero-icon {
                font-size: 3.5rem;
            }

            .hero h1 {
                font-size: 2.2rem;
            }

            .hero p {
                font-size: 1rem;
            }

            .card-container {
                grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
                gap: 15px;
                padding: 20px;
            }

            .card {
                min-height: 80px;
                padding: 12px 15px;
                font-size: 0.95rem;
            }

            .card-icon {
                font-size: 1.5rem;
            }

            .category-section {
                margin: 20px 0 10px 0;
            }

            .category-title {
                font-size: 1rem;
            }

            .morph-card.expanded {
                width: 90vw;
                padding: 30px 20px;
            }

            .morph-card.expanded .morph-content h2 {
                font-size: 1.4rem;
            }

            .morph-card.expanded .morph-content p {
                font-size: 0.9rem;
            }
        }
    </style>
</head>

<body>
    <!-- Top Bar -->
    <header class="top-bar">
        <div class="breadcrumb">Oscar Studio > <span>teaching-tools</span></div>
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="搜索工具...">
        </div>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-icon">📚</div>
        <h1>教学工具</h1>
        <p>丰富的 HTML 演示工具，专为教师和学生设计。包含函数图像绘制、几何图形演示、化学方程式配平、计时器、抽签器等多种实用工具，让抽象的知识变得直观可见，使课堂教学更加生动有趣，提升学习效率。</p>
    </section>

    <!-- Card Container -->
    <main class="card-container" id="cardContainer"></main>

    <!-- Backdrop -->
    <div class="backdrop" id="backdrop"></div>

    <script>
        const cardContainer = document.getElementById('cardContainer');
        const backdrop = document.getElementById('backdrop');

        let tools = [];
        let morphCard = null;
        let selectedTool = null;
        let selectedCard = null;

        // Load tools
        fetch('tools-config.json')
            .then(response => response.json())
            .then(data => {
                tools = data.tools || [];
                tools.sort((a, b) => {
                    if (a.featured !== b.featured) return b.featured ? 1 : -1;
                    return a.name.localeCompare(b.name);
                });
                renderCards(tools);
            })
            .catch(error => {
                cardContainer.innerHTML = '<p class="no-results">加载工具失败</p>';
            });

        const subjectNames = {
            '数学': '数学', '物理': '物理', '化学': '化学', '生物': '生物',
            '语文': '语文', '英语': '英语', '地理': '地理', '历史': '历史',
            '道法': '道法', '通用': '通用工具'
        };

        function renderCards(toolsToRender) {
            cardContainer.innerHTML = '';
            if (toolsToRender.length === 0) {
                cardContainer.innerHTML = '<p class="no-results">没有找到匹配的工具</p>';
                return;
            }

            const grouped = {};
            toolsToRender.forEach(tool => {
                const subject = (tool.subject && tool.subject[0]) || '通用';
                if (!grouped[subject]) grouped[subject] = [];
                grouped[subject].push(tool);
            });

            Object.keys(grouped).sort((a, b) => grouped[b].length - grouped[a].length).forEach(subject => {
                const section = document.createElement('div');
                section.className = 'category-section';
                section.innerHTML = `<div class="category-title">${subjectNames[subject] || subject}</div>`;
                cardContainer.appendChild(section);

                grouped[subject].forEach(tool => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.dataset.tool = tool.name;
                    card.innerHTML = `
                        <div class="card-header">
                            <span class="card-icon">${tool.icon || '📄'}</span>
                            <span class="card-name">${tool.name}</span>
                        </div>
                        <div class="card-tags">
                            ${tool.tags ? tool.tags.slice(0, 3).map(t => `<span class="card-tag">${t}</span>`).join('') : ''}
                        </div>
                    `;
                    card.addEventListener('click', () => selectCard(card, tool));
                    cardContainer.appendChild(card);
                });
            });
        }

        function selectCard(cardElement, tool) {
            if (morphCard) return;
            selectedTool = tool;
            selectedCard = cardElement;

            const rect = cardElement.getBoundingClientRect();

            // Create morph card at card's position
            morphCard = document.createElement('div');
            morphCard.className = 'morph-card compact';
            morphCard.innerHTML = `
                <div class="morph-header">
                    <span class="morph-icon">${tool.icon || '📄'}</span>
                    <span class="morph-name">${tool.name}</span>
                </div>
                <div class="morph-tags">
                    ${tool.tags ? tool.tags.slice(0, 3).map(t => `<span class="morph-tag">${t}</span>`).join('') : ''}
                </div>
                <div class="morph-content">
                    <div class="morph-big-icon">${tool.icon || '📄'}</div>
                    <h2>${tool.name}</h2>
                    <p>${tool.description}</p>
                    <a href="${tool.name}/index.html" class="btn-explore">Explore</a>
                </div>
                <button class="close-btn">&times;</button>
            `;

            morphCard.style.left = rect.left + 'px';
            morphCard.style.top = rect.top + 'px';
            morphCard.style.width = rect.width + 'px';
            morphCard.style.minHeight = rect.height + 'px';
            document.body.appendChild(morphCard);

            // Hide original card
            cardElement.style.visibility = 'hidden';

            // Show backdrop
            backdrop.classList.add('active');

            // Calculate target position
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;
            const targetWidth = Math.min(450, viewportWidth * 0.9);
            const targetHeight = 340;
            const targetLeft = (viewportWidth - targetWidth) / 2;
            const targetTop = (viewportHeight - targetHeight) / 2;

            // Animate to center
            requestAnimationFrame(() => {
                morphCard.style.transition = 'all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1)';
                morphCard.style.left = targetLeft + 'px';
                morphCard.style.top = targetTop + 'px';
                morphCard.style.width = targetWidth + 'px';
                morphCard.style.minHeight = targetHeight + 'px';
            });

            // Other cards hide
            const allCards = Array.from(cardContainer.querySelectorAll('.card'));
            allCards.forEach(card => {
                if (card === cardElement) return;
                const cardRect = card.getBoundingClientRect();
                const delay = Math.max(0, ((viewportHeight - cardRect.top) / viewportHeight) * 120);
                card.style.animationDelay = `${delay}ms`;
                card.classList.add('hiding');
            });

            // Expand to show content
            setTimeout(() => {
                morphCard.classList.add('expanded');
            }, 200);

            // Close handlers
            morphCard.querySelector('.close-btn').addEventListener('click', closeMorphCard);
            backdrop.addEventListener('click', closeMorphCard);
        }

        function closeMorphCard() {
            if (!morphCard || !selectedCard) return;

            const originalRect = selectedCard.getBoundingClientRect();

            // Get all hiding cards
            const hidingCards = Array.from(cardContainer.querySelectorAll('.card.hiding'));

            // Shrink morphCard back to original position
            morphCard.classList.remove('expanded');
            morphCard.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)';
            morphCard.style.left = originalRect.left + 'px';
            morphCard.style.top = originalRect.top + 'px';
            morphCard.style.width = originalRect.width + 'px';
            morphCard.style.minHeight = originalRect.height + 'px';

            // Start returning all cards (from bottom to top)
            requestAnimationFrame(() => {
                hidingCards.reverse().forEach((card, i) => {
                    card.classList.remove('hiding');
                    card.style.transform = 'translateY(-100vh)';
                    card.style.opacity = '0';
                    card.getBoundingClientRect();
                    setTimeout(() => {
                        card.classList.add('returning');
                    }, i * 40);
                });
            });

            setTimeout(() => {
                if (morphCard) {
                    morphCard.remove();
                    morphCard = null;
                }
                backdrop.classList.remove('active');

                if (selectedCard) {
                    selectedCard.style.visibility = 'visible';
                }

                // Clean up after animation
                setTimeout(() => {
                    hidingCards.forEach(card => {
                        card.classList.remove('returning');
                        card.style.transform = '';
                        card.style.opacity = '';
                    });
                }, 800);

                selectedCard = null;
                selectedTool = null;
            }, 400);
        }

        // Keyboard escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape' && morphCard) closeMorphCard();
        });

        // Search
        searchInput.addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase().trim();
            if (term) {
                renderCards(tools.filter(t => t.name.toLowerCase().includes(term)));
            } else {
                renderCards(tools);
            }
        });
    </script>
</body>
</html>
