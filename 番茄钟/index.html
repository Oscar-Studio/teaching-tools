<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>专注计时器 (番茄钟) - 教学工具</title>
    <script defer src="https://cloud.umami.is/script.js"

    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --success-color: #28a745;
            --warning-color: #f59e0b;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: var(--dark-color);
        }

        .container {
            width: 100%;
            max-width: 500px;
            background-color: var(--card-bg);
            border-radius: 20px;
            padding: 40px;
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        h1 {
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .subtitle {
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .timer-ring {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px;
        }

        .timer-ring svg {
            transform: rotate(-90deg);
            width: 100%;
            height: 100%;
        }

        .timer-ring circle {
            fill: none;
            stroke-width: 8;
        }

        .timer-ring .bg {
            stroke: var(--card-border);
        }

        .timer-ring .progress {
            stroke: var(--secondary-color);
            stroke-linecap: round;
            transition: stroke-dashoffset 1s linear;
        }

        .timer-ring .progress.break {
            stroke: var(--success-color);
        }

        .timer-ring.break-mode .progress {
            stroke: var(--success-color);
        }

        .timer-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }

        .timer-time {
            font-size: 3.5rem;
            font-weight: bold;
            font-family: 'Courier New', monospace;
            color: var(--dark-color);
        }

        .timer-mode {
            font-size: 1rem;
            color: var(--text-secondary);
            margin-top: 5px;
        }

        .pomodoro-count {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .pomodoro-dot {
            width: 15px;
            height: 15px;
            border-radius: 50%;
            background-color: var(--card-border);
        }

        .pomodoro-dot.completed {
            background-color: var(--success-color);
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-start {
            background-color: var(--success-color);
            color: white;
        }

        .btn-start:hover {
            background-color: #2ea043;
        }

        .btn-pause {
            background-color: var(--warning-color);
            color: white;
        }

        .btn-pause:hover {
            background-color: #d97706;
        }

        .btn-reset {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-reset:hover {
            background-color: #c0392b;
        }

        .btn-skip {
            background-color: var(--primary-color);
            color: white;
        }

        .settings {
            margin-top: 30px;
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
        }

        .settings h3 {
            color: var(--text-secondary);
            margin-bottom: 15px;
            font-size: 1rem;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 10px 0;
        }

        .setting-row label {
            color: var(--text-secondary);
        }

        .setting-row input {
            width: 70px;
            padding: 8px;
            border-radius: 6px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            text-align: center;
        }

        .sound-toggle {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
        }

        footer {
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>

<body>
    <div class="container">
        <h1>🍅 番茄钟</h1>
        <p class="subtitle">专注计时器</p>

        <div class="pomodoro-count" id="pomodoroCount">
            <div class="pomodoro-dot" id="dot0"></div>
            <div class="pomodoro-dot" id="dot1"></div>
            <div class="pomodoro-dot" id="dot2"></div>
            <div class="pomodoro-dot" id="dot3"></div>
        </div>

        <div class="timer-ring" id="timerRing">
            <svg>
                <circle class="bg" cx="140" cy="140" r="130"></circle>
                <circle class="progress" id="progress" cx="140" cy="140" r="130" 
                    stroke-dasharray="816.81" stroke-dashoffset="0"></circle>
            </svg>
            <div class="timer-text">
                <div class="timer-time" id="timerTime">25:00</div>
                <div class="timer-mode" id="timerMode">专注时间</div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-start" id="startBtn" onclick="startTimer()">开始</button>
            <button class="btn btn-pause" id="pauseBtn" onclick="pauseTimer()" style="display:none">暂停</button>
            <button class="btn btn-reset" onclick="resetTimer()">重置</button>
            <button class="btn btn-skip" onclick="skipPhase()">跳过</button>
        </div>

        <div class="settings">
            <h3>⚙️ 设置（分钟）</h3>
            <div class="setting-row">
                <label>专注时长:</label>
                <input type="number" id="workTime" value="25" min="1" max="60" onchange="updateSettings()">
            </div>
            <div class="setting-row">
                <label>短休息:</label>
                <input type="number" id="shortBreak" value="5" min="1" max="30" onchange="updateSettings()">
            </div>
            <div class="setting-row">
                <label>长休息:</label>
                <input type="number" id="longBreak" value="15" min="1" max="60" onchange="updateSettings()">
            </div>
            <div class="sound-toggle">
                <input type="checkbox" id="soundToggle" checked>
                <label for="soundToggle">声音提示</label>
            </div>
        </div>
    </div>

    <footer>
        <p>番茄钟 &copy; 2026 - Designed by Oscar</p>
    </footer>

    <script>
        let workTime = 25;
        let shortBreakTime = 5;
        let longBreakTime = 15;
        
        let timeLeft = workTime * 60;
        let timerInterval = null;
        let isRunning = false;
        let isBreak = false;
        let pomodoroCount = 0;

        const circumference = 2 * Math.PI * 130; // r=130

        const timerTime = document.getElementById('timerTime');
        const timerMode = document.getElementById('timerMode');
        const progress = document.getElementById('progress');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const timerRing = document.getElementById('timerRing');

        function updateDisplay() {
            const minutes = Math.floor(timeLeft / 60);
            const seconds = timeLeft % 60;
            timerTime.textContent = `${String(minutes).padStart(2, '0')}:${String(seconds).padStart(2, '0')}`;
            
            // 更新进度条
            const totalTime = isBreak ? (pomodoroCount % 4 === 3 ? longBreakTime : shortBreakTime) * 60 : workTime * 60;
            const progressValue = (totalTime - timeLeft) / totalTime;
            progress.style.strokeDashoffset = circumference * progressValue;
        }

        function updateSettings() {
            workTime = parseInt(document.getElementById('workTime').value) || 25;
            shortBreakTime = parseInt(document.getElementById('shortBreak').value) || 5;
            longBreakTime = parseInt(document.getElementById('longBreak').value) || 15;
            
            if (!isRunning) {
                timeLeft = workTime * 60;
                updateDisplay();
            }
        }

        function startTimer() {
            if (isRunning) return;
            
            isRunning = true;
            startBtn.style.display = 'none';
            pauseBtn.style.display = 'inline-block';
            
            timerInterval = setInterval(() => {
                timeLeft--;
                updateDisplay();
                
                if (timeLeft <= 0) {
                    timerFinished();
                }
            }, 1000);
        }

        function pauseTimer() {
            if (!isRunning) return;
            
            isRunning = false;
            clearInterval(timerInterval);
            startBtn.style.display = 'inline-block';
            pauseBtn.style.display = 'none';
        }

        function resetTimer() {
            pauseTimer();
            isBreak = false;
            timeLeft = workTime * 60;
            timerMode.textContent = '专注时间';
            timerRing.classList.remove('break-mode');
            updateDisplay();
        }

        function timerFinished() {
            pauseTimer();
            
            // 播放声音
            if (document.getElementById('soundToggle').checked) {
                playBeep();
            }
            
            if (!isBreak) {
                // 专注完成
                pomodoroCount++;
                updatePomodoroDots();
                
                if (pomodoroCount % 4 === 0) {
                    timeLeft = longBreakTime * 60;
                    timerMode.textContent = '长休息';
                } else {
                    timeLeft = shortBreakTime * 60;
                    timerMode.textContent = '短休息';
                }
                isBreak = true;
                timerRing.classList.add('break-mode');
            } else {
                // 休息完成
                timeLeft = workTime * 60;
                timerMode.textContent = '专注时间';
                isBreak = false;
                timerRing.classList.remove('break-mode');
            }
            
            updateDisplay();
            
            // 自动开始下一个阶段
            setTimeout(() => {
                startTimer();
            }, 1000);
        }

        function skipPhase() {
            timerFinished();
        }

        function updatePomodoroDots() {
            for (let i = 0; i < 4; i++) {
                const dot = document.getElementById(`dot${i}`);
                if (i < pomodoroCount % 4) {
                    dot.classList.add('completed');
                } else {
                    dot.classList.remove('completed');
                }
            }
        }

        function playBeep() {
            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                for (let i = 0; i < 3; i++) {
                    setTimeout(() => {
                        const oscillator = audioContext.createOscillator();
                        const gainNode = audioContext.createGain();
                        
                        oscillator.connect(gainNode);
                        gainNode.connect(audioContext.destination);
                        
                        oscillator.frequency.value = isBreak ? 600 : 800;
                        oscillator.type = 'sine';
                        
                        gainNode.gain.setValueAtTime(0.3, audioContext.currentTime);
                        gainNode.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.3);
                        
                        oscillator.start(audioContext.currentTime);
                        oscillator.stop(audioContext.currentTime + 0.3);
                    }, i * 300);
                }
            } catch (e) {}
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (isRunning) pauseTimer();
                else startTimer();
            } else if (e.code === 'KeyR') {
                resetTimer();
            } else if (e.code === 'KeyS') {
                skipPhase();
            }
        });

        updateDisplay();
    </script>
</body>

</html>
