<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>记分板 - 教学工具</title>
    <script defer src="https://cloud.umami.is/script.js"
        data-website-id="d6ee6da5-3779-4551-a754-7f63fdf95dbb"></script>
    <style>
        :root {
            --primary-color: #2A5CAA;
            --secondary-color: #00E5FF;
            --accent-color: #6A00FF;
            --light-color: #010409;
            --dark-color: #ffffff;
            --card-bg: #0d1117;
            --card-border: 1px solid #30363d;
            --card-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            --text-secondary: #8b949e;
            --success-color: #28a745;
            --danger-color: #e74c3c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--light-color);
            min-height: 100vh;
            padding: 20px;
            color: var(--dark-color);
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: var(--secondary-color);
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: var(--text-secondary);
            margin-bottom: 30px;
        }

        .teams {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .team-card {
            background-color: var(--card-bg);
            border-radius: 15px;
            padding: 25px;
            border: var(--card-border);
            box-shadow: var(--card-shadow);
            text-align: center;
        }

        .team-name {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 15px;
            color: var(--secondary-color);
        }

        .team-name input {
            background: transparent;
            border: none;
            border-bottom: 2px solid var(--card-border);
            color: var(--secondary-color);
            font-size: 1.5rem;
            text-align: center;
            width: 80%;
            padding: 5px;
        }

        .team-name input:focus {
            outline: none;
            border-color: var(--secondary-color);
        }

        .score {
            font-size: 5rem;
            font-weight: bold;
            color: var(--dark-color);
            margin: 20px 0;
            font-family: 'Courier New', monospace;
        }

        .score-controls {
            display: flex;
            justify-content: center;
            gap: 10px;
        }

        .score-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 10px;
            font-size: 1.5rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .score-btn.minus {
            background-color: var(--danger-color);
            color: white;
        }

        .score-btn.plus {
            background-color: var(--success-color);
            color: white;
        }

        .score-btn:hover {
            transform: scale(1.1);
        }

        .custom-score {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 15px;
        }

        .custom-score input {
            width: 60px;
            padding: 8px;
            border-radius: 6px;
            border: 2px solid var(--card-border);
            background: var(--light-color);
            color: var(--dark-color);
            text-align: center;
            font-size: 1rem;
        }

        .custom-score button {
            padding: 8px 15px;
            border: none;
            border-radius: 6px;
            background-color: var(--primary-color);
            color: white;
            cursor: pointer;
        }

        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-top: 20px;
        }

        .btn {
            padding: 12px 25px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-reset {
            background-color: var(--danger-color);
            color: white;
        }

        .btn-reset:hover {
            background-color: #c0392b;
        }

        .btn-add-team {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-add-team:hover {
            background-color: var(--secondary-color);
        }

        .btn-fullscreen {
            background-color: var(--text-secondary);
            color: white;
        }

        .btn-fullscreen:hover {
            background-color: #6b7280;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
    </style>
<script charset="UTF-8" id="LA_COLLECT" src="//sdk.51.la/js-sdk-pro.min.js"></script>
<script>LA.init({id:"3ObMo9NLgqBCvJ53",ck:"3ObMo9NLgqBCvJ53"})</script>
</head>

<body>
    <div class="container">
        <h1>🏆 记分板</h1>
        <p class="subtitle">课堂竞赛、答题比赛专用</p>

        <div class="teams" id="teams">
            <div class="team-card">
                <div class="team-name">
                    <input type="text" value="队伍 1" onchange="updateTeamName(0, this.value)">
                </div>
                <div class="score" id="score0">0</div>
                <div class="score-controls">
                    <button class="score-btn minus" onclick="changeScore(0, -1)">−</button>
                    <button class="score-btn plus" onclick="changeScore(0, 1)">+</button>
                </div>
                <div class="custom-score">
                    <input type="number" id="custom0" placeholder="自定义">
                    <button onclick="setCustomScore(0)">设置</button>
                </div>
            </div>

            <div class="team-card">
                <div class="team-name">
                    <input type="text" value="队伍 2" onchange="updateTeamName(1, this.value)">
                </div>
                <div class="score" id="score1">0</div>
                <div class="score-controls">
                    <button class="score-btn minus" onclick="changeScore(1, -1)">−</button>
                    <button class="score-btn plus" onclick="changeScore(1, 1)">+</button>
                </div>
                <div class="custom-score">
                    <input type="number" id="custom1" placeholder="自定义">
                    <button onclick="setCustomScore(1)">设置</button>
                </div>
            </div>
        </div>

        <div class="controls">
            <button class="btn btn-add-team" onclick="addTeam()">+ 添加队伍</button>
            <button class="btn btn-reset" onclick="resetAll()">重置所有</button>
            <button class="btn btn-fullscreen" onclick="toggleFullscreen()">全屏</button>
        </div>
    </div>

    <footer>
        <p>记分板 &copy; 2026 - Designed by Oscar</p>
    </footer>

    <script>
        let scores = [0, 0];
        let teamCount = 2;

        function changeScore(teamIndex, delta) {
            scores[teamIndex] += delta;
            if (scores[teamIndex] < 0) scores[teamIndex] = 0;
            document.getElementById(`score${teamIndex}`).textContent = scores[teamIndex];
        }

        function setCustomScore(teamIndex) {
            const input = document.getElementById(`custom${teamIndex}`);
            const value = parseInt(input.value);
            if (!isNaN(value) && value >= 0) {
                scores[teamIndex] = value;
                document.getElementById(`score${teamIndex}`).textContent = value;
                input.value = '';
            }
        }

        function updateTeamName(teamIndex, name) {
            // 名称已通过 onchange 更新
        }

        function addTeam() {
            if (teamCount >= 6) {
                alert('最多添加6支队伍');
                return;
            }

            const teamsContainer = document.getElementById('teams');
            const newTeam = document.createElement('div');
            newTeam.className = 'team-card';
            newTeam.innerHTML = `
                <div class="team-name">
                    <input type="text" value="队伍 ${teamCount + 1}" onchange="updateTeamName(${teamCount}, this.value)">
                </div>
                <div class="score" id="score${teamCount}">0</div>
                <div class="score-controls">
                    <button class="score-btn minus" onclick="changeScore(${teamCount}, -1)">−</button>
                    <button class="score-btn plus" onclick="changeScore(${teamCount}, 1)">+</button>
                </div>
                <div class="custom-score">
                    <input type="number" id="custom${teamCount}" placeholder="自定义">
                    <button onclick="setCustomScore(${teamCount})">设置</button>
                </div>
            `;

            teamsContainer.appendChild(newTeam);
            scores.push(0);
            teamCount++;
        }

        function resetAll() {
            if (!confirm('确定要重置所有分数吗？')) return;
            
            scores = scores.map(() => 0);
            for (let i = 0; i < teamCount; i++) {
                document.getElementById(`score${i}`).textContent = '0';
            }
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen();
            } else {
                document.exitFullscreen();
            }
        }

        // 键盘快捷键
        document.addEventListener('keydown', (e) => {
            if (e.key === '1') changeScore(0, 1);
            else if (e.key === 'q') changeScore(0, -1);
            else if (e.key === '2') changeScore(1, 1);
            else if (e.key === 'w') changeScore(1, -1);
            else if (e.key === 'r') resetAll();
            else if (e.key === 'f') toggleFullscreen();
        });
    </script>
</body>

</html>
