<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>中文句子成分分析工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
        }
        
        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .container {
            max-width: 800px;
            width: 100%;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            margin-top: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 30px;
        }
        
        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 2.2rem;
        }
        
        .description {
            color: #7f8c8d;
            font-size: 1.1rem;
            line-height: 1.5;
        }
        
        .input-section {
            margin-bottom: 30px;
        }
        
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #2c3e50;
        }
        
        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            border: 2px solid #e1e8ed;
            border-radius: 8px;
            font-size: 16px;
            resize: vertical;
            transition: border-color 0.3s;
        }
        
        textarea:focus {
            outline: none;
            border-color: #3498db;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }
        
        button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        #analyze-btn {
            background-color: #3498db;
            color: white;
        }
        
        #analyze-btn:hover {
            background-color: #2980b9;
            transform: translateY(-2px);
        }
        
        #clear-btn {
            background-color: #e74c3c;
            color: white;
        }
        
        #clear-btn:hover {
            background-color: #c0392b;
            transform: translateY(-2px);
        }
        
        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }
        
        .result-section {
            display: none;
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
            border-left: 4px solid #3498db;
        }
        
        .result-title {
            font-weight: 600;
            margin-bottom: 15px;
            color: #2c3e50;
            font-size: 1.2rem;
        }
        
        .analysis-result {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #2c3e50;
            padding: 15px;
            background-color: white;
            border-radius: 6px;
            border: 1px solid #e1e8ed;
        }
        
        .error-section {
            display: none;
            margin-top: 20px;
            padding: 15px;
            background-color: #fdecea;
            border-radius: 8px;
            border-left: 4px solid #e74c3c;
            color: #c0392b;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin-top: 20px;
        }
        
        .spinner {
            border: 4px solid rgba(0, 0, 0, 0.1);
            border-left-color: #3498db;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 15px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        .example-section {
            margin-top: 30px;
            padding: 20px;
            background-color: #f8f9fa;
            border-radius: 8px;
        }
        
        .example-title {
            font-weight: 600;
            margin-bottom: 10px;
            color: #2c3e50;
        }
        
        .example-text {
            color: #7f8c8d;
            font-style: italic;
            margin-bottom: 10px;
        }
        
        .rate-limit-info {
            margin-top: 10px;
            padding: 10px;
            background-color: #f0f7ff;
            border-radius: 6px;
            font-size: 0.9rem;
            color: #3498db;
            text-align: center;
        }
        
        footer {
            margin-top: 30px;
            text-align: center;
            color: #7f8c8d;
            font-size: 0.9rem;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }
            
            h1 {
                font-size: 1.8rem;
            }
            
            .button-group {
                flex-direction: column;
            }
        }
        
        .highlight {
            background-color: #fff3cd;
            padding: 2px 4px;
            border-radius: 3px;
            font-weight: bold;
        }
        
        .limit-reached {
            color: #e74c3c;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>中文句子成分分析工具</h1>
            <p class="description">输入中文句子，AI将分析其句子成分（主语、谓语、宾语等），并以直观的方式展示结果。</p>
        </header>
        
        <div class="input-section">
            <label for="sentence-input">请输入要分析的中文句子：</label>
            <textarea id="sentence-input" placeholder="例如：我喜欢在阳光明媚的下午读书。"></textarea>
            
            <div class="button-group">
                <button id="analyze-btn">分析句子</button>
                <button id="clear-btn">清空</button>
            </div>
            
            <div class="rate-limit-info">
                <p>频率限制：<span class="highlight">20秒</span>内只能发送一次请求，<span class="highlight">1小时</span>内最多发送<span class="highlight">20次</span>请求</p>
                <p id="usage-info">今日已使用: <span id="usage-count">0</span>/20 次</p>
            </div>
        </div>
        
        <div class="loading">
            <div class="spinner"></div>
            <p>正在分析句子成分，请稍候...</p>
        </div>
        
        <div class="result-section" id="result-section">
            <div class="result-title">分析结果：</div>
            <div class="analysis-result" id="analysis-result"></div>
        </div>
        
        <div class="error-section" id="error-section">
            <div class="error-message" id="error-message"></div>
        </div>
        
        <div class="example-section">
            <div class="example-title">使用示例：</div>
            <div class="example-text">输入：小明昨天在公园里开心地踢足球。</div>
            <div class="example-text">输出：小明（主语）昨天（状语）在公园里（状语）开心地（状语）踢（谓语）足球（宾语）。</div>
        </div>
    </div>
    
    <footer>
        <p>© 2023 中文句子成分分析工具 | 基于DeepSeek AI</p>
    </footer>

    <script>
        // 预留API密钥变量 - 请将您的Base64编码后的DeepSeek API密钥填入下方引号内
        const encodedApiKey = "c2stYzgyOWZmN2VjYjliNDFjMTlkMjZhYzVlNmViNzBhYzU="; // 例如："c2t-eC1h...（请替换为您的Base64编码API密钥）"
        
        // DOM元素
        const sentenceInput = document.getElementById('sentence-input');
        const analyzeBtn = document.getElementById('analyze-btn');
        const clearBtn = document.getElementById('clear-btn');
        const resultSection = document.getElementById('result-section');
        const analysisResult = document.getElementById('analysis-result');
        const errorSection = document.getElementById('error-section');
        const errorMessage = document.getElementById('error-message');
        const loading = document.querySelector('.loading');
        const usageCountElement = document.getElementById('usage-count');
        const usageInfoElement = document.getElementById('usage-info');
        
        // 频率限制相关变量
        const RATE_LIMIT_INTERVAL = 20 * 1000; // 20秒间隔
        const RATE_LIMIT_HOURLY_MAX = 20; // 每小时最多20次
        const STORAGE_KEYS = {
            LAST_REQUEST_TIME: 'last_request_time',
            REQUEST_COUNT: 'request_count',
            REQUEST_TIMESTAMP: 'request_timestamp'
        };
        
        // 初始化使用情况显示
        updateUsageDisplay();
        
        // 分析句子
        analyzeBtn.addEventListener('click', async () => {
            const sentence = sentenceInput.value.trim();
            
            if (!sentence) {
                showError('请输入要分析的中文句子。');
                return;
            }
            
            if (!encodedApiKey) {
                showError('请先在代码中配置您的DeepSeek API密钥。');
                return;
            }
            
            // 检查频率限制
            const rateLimitCheck = checkRateLimit();
            if (!rateLimitCheck.allowed) {
                showError(rateLimitCheck.message);
                return;
            }
            
            // 显示加载状态
            loading.style.display = 'block';
            resultSection.style.display = 'none';
            errorSection.style.display = 'none';
            analyzeBtn.disabled = true;
            
            try {
                // 记录请求时间
                recordRequest();
                
                // 解码API密钥
                const apiKey = atob(encodedApiKey);
                
                // 调用DeepSeek API
                const response = await fetch('https://api.deepseek.com/v1/chat/completions', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify({
                        model: "deepseek-chat",
                        messages: [
                            {
                                role: "system",
                                content: "你是一个中文语法分析专家。请严格按照以下格式分析句子成分：\n主语[主语]谓语[谓语]宾语[宾语]状语[状语]补语[补语]定语[定语]\n示例：昨天下午[状语]我[主语]开心地[状语]吃[谓语]一个红彤彤的[定语]苹果[宾语]，吃得津津有味[补语]。\n只返回分析结果，不添加解释。"
                            },
                            {
                                role: "user",
                                content: `请分析这个句子的句子成分："${sentence}"`
                            }
                        ],
                        temperature: 0.7,
                        max_tokens: 200
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`API请求失败: ${response.status}`);
                }
                
                const data = await response.json();
                const analysis = data.choices[0].message.content;
                
                // 显示结果
                analysisResult.textContent = analysis;
                resultSection.style.display = 'block';
                
            } catch (error) {
                console.error('分析句子时出错:', error);
                showError(`分析失败: ${error.message}`);
            } finally {
                loading.style.display = 'none';
                analyzeBtn.disabled = false;
            }
        });
        
        // 清空输入
        clearBtn.addEventListener('click', () => {
            sentenceInput.value = '';
            resultSection.style.display = 'none';
            errorSection.style.display = 'none';
        });
        
        // 显示错误信息
        function showError(message) {
            errorMessage.textContent = message;
            errorSection.style.display = 'block';
            resultSection.style.display = 'none';
        }
        
        // 检查频率限制
        function checkRateLimit() {
            const now = Date.now();
            const lastRequestTime = parseInt(localStorage.getItem(STORAGE_KEYS.LAST_REQUEST_TIME) || '0');
            const requestCount = parseInt(localStorage.getItem(STORAGE_KEYS.REQUEST_COUNT) || '0');
            const requestTimestamp = parseInt(localStorage.getItem(STORAGE_KEYS.REQUEST_TIMESTAMP) || '0');
            
            // 检查是否在20秒间隔内
            if (now - lastRequestTime < RATE_LIMIT_INTERVAL) {
                const remainingSeconds = Math.ceil((RATE_LIMIT_INTERVAL - (now - lastRequestTime)) / 1000);
                return {
                    allowed: false,
                    message: `请求过于频繁，请等待 ${remainingSeconds} 秒后再试。`
                };
            }
            
            // 检查是否在同一天内
            const today = new Date().toDateString();
            const lastRequestDate = new Date(requestTimestamp).toDateString();
            
            // 如果日期不同，重置计数器
            if (today !== lastRequestDate) {
                localStorage.setItem(STORAGE_KEYS.REQUEST_COUNT, '0');
                localStorage.setItem(STORAGE_KEYS.REQUEST_TIMESTAMP, now.toString());
                return { allowed: true };
            }
            
            // 检查是否超过每小时限制
            if (requestCount >= RATE_LIMIT_HOURLY_MAX) {
                const nextResetTime = new Date(requestTimestamp);
                nextResetTime.setHours(nextResetTime.getHours() + 1);
                const remainingTime = Math.ceil((nextResetTime - now) / 1000 / 60);
                
                return {
                    allowed: false,
                    message: `今日使用次数已达上限，请 ${remainingTime} 分钟后再试。`
                };
            }
            
            return { allowed: true };
        }
        
        // 记录请求
        function recordRequest() {
            const now = Date.now();
            const today = new Date().toDateString();
            const lastRequestDate = new Date(parseInt(localStorage.getItem(STORAGE_KEYS.REQUEST_TIMESTAMP) || '0')).toDateString();
            
            // 如果日期不同，重置计数器
            if (today !== lastRequestDate) {
                localStorage.setItem(STORAGE_KEYS.REQUEST_COUNT, '1');
            } else {
                const currentCount = parseInt(localStorage.getItem(STORAGE_KEYS.REQUEST_COUNT) || '0');
                localStorage.setItem(STORAGE_KEYS.REQUEST_COUNT, (currentCount + 1).toString());
            }
            
            localStorage.setItem(STORAGE_KEYS.LAST_REQUEST_TIME, now.toString());
            localStorage.setItem(STORAGE_KEYS.REQUEST_TIMESTAMP, now.toString());
            
            // 更新使用情况显示
            updateUsageDisplay();
        }
        
        // 更新使用情况显示
        function updateUsageDisplay() {
            const requestCount = parseInt(localStorage.getItem(STORAGE_KEYS.REQUEST_COUNT) || '0');
            usageCountElement.textContent = requestCount;
            
            if (requestCount >= RATE_LIMIT_HOURLY_MAX) {
                usageInfoElement.classList.add('limit-reached');
            } else {
                usageInfoElement.classList.remove('limit-reached');
            }
        }
        
        // 示例：输入框获得焦点时清空示例文本
        sentenceInput.addEventListener('focus', function() {
            if (this.value === '例如：我喜欢在阳光明媚的下午读书。') {
                this.value = '';
            }
        });
    </script>
</body>
</html>
